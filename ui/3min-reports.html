<!doctype html>

  <body>
    <header>
      <div class="logo">Supertrend<span>Monitor</span></div>
      <a class="nav-link" href="/supertrend-reports">&#x2190; Reports</a>
      <a class="nav-link" href="/">&#x2190; Dashboard</a>
      <div class="divider"></div>
      <div class="hdr-title">&#x1F4CB; 3-Min Strategy Reports</div>
      <div class="spacer"></div>
      <button class="new-day-btn" onclick="showNewDayForm()">+ Add Trade Day</button>
    </header>

    <div class="new-day-form" id="new-day-form" style="display: none">
      <label>Date</label>
      <input type="date" id="new-day-date" />
      <label>Instrument</label>
      <select id="new-day-instr">
        <option value="NIFTY">NIFTY</option>
        <option value="SENSEX">SENSEX</option>
      </select>
      <button class="go-btn" onclick="createNewDay()">+ Create</button>
      <button class="cancel-btn" onclick="hideNewDayForm()">Cancel</button>
    </div>

    <div id="month-bar" class="month-bar"></div>
    <div id="panels-container"></div>
    <div id="save-bar" style="display: none"></div>

    <script>
      const DATA_URL = '/api/3min-report/data';
      const SAVE_URL = '/api/3min-report/save';

      const LOT_SIZES = { NIFTY: 65, SENSEX: 20 };
      const SL_PTS = { NIFTY: 15, SENSEX: 35 };
      const TGT_G = { NIFTY: 50, SENSEX: 100 };
      const TGT_L = { NIFTY: 31, SENSEX: 70 };
      const INITIAL_CAPITAL = 200000;

      let allData = {};
      let nextId = 1000;
      let activeMonth = null;
      let monthFilters = {};
      let monthTimeFilters = {};
      let monthNoteFilters = {};
      let monthReachFilter = {};
      let monthCandleFilter = {};
      let monthDateFilter = {};
      let monthVixFilter = {}; // { field:'close'|'open'|'high'|'low', min, max } per month
      let NSE_HOLIDAYS = new Set();

      // Parse a day's VIX from its free-text day note, e.g.
      //   "vix open: 12.67 low: 12.07 high: 13.64 close: 12.77"
      // Returns { open, high, low, close } (any missing field = null), or null if no VIX.
      function parseVix(note) {
        if (!note || !/vix/i.test(note)) return null;
        const grab = (kw) => {
          const m = note.match(new RegExp(kw + '\\s*[:=]?\\s*(-?\\d+(?:\\.\\d+)?)', 'i'));
          return m ? parseFloat(m[1]) : null;
        };
        const v = {
          open: grab('open'),
          high: grab('high'),
          low: grab('low'),
          close: grab('close'),
        };
        return v.open === null && v.high === null && v.low === null && v.close === null ? null : v;
      }

      // Day-level VIX filter: true if the day's selected VIX field is within [min,max].
      // Days with no parseable VIX are excluded while the filter is active.
      function dayPassesVix(dateStr, monthKey) {
        const f = monthVixFilter[monthKey];
        if (!f || (f.min === null && f.max === null)) return true;
        const vix = parseVix(allData[dateStr]?.note);
        const val = vix ? vix[f.field] : null;
        if (val === null || val === undefined) return false;
        if (f.min !== null && val < f.min) return false;
        if (f.max !== null && val > f.max) return false;
        return true;
      }

      async function loadData() {
        try {
          const [data, holidays] = await Promise.all([
            fetch(DATA_URL).then((r) => r.json()),
            fetch('/api/holidays').then((r) => r.json()),
          ]);
          NSE_HOLIDAYS = new Set(Object.values(holidays).flat());
          allData = data;
          for (const day of Object.values(allData)) {
            for (const t of day.trades || []) {
              if (t.id == null) t.id = nextId++;
            }
          }
          renderPage();
        } catch (e) {
          document.getElementById('panels-container').innerHTML =
            `<div class="empty-msg">Failed to load data: ${e.message}</div>`;
        }
      }

      function isWorkingDay(ds) {
        const day = new Date(ds + 'T00:00:00Z').getUTCDay();
        return day !== 0 && day !== 6 && !NSE_HOLIDAYS.has(ds);
      }
      function nextWorkingDay(fromDs) {
        const d = new Date(fromDs + 'T00:00:00Z');
        d.setUTCDate(d.getUTCDate() + 1);
        while (true) {
          const ds = d.toISOString().slice(0, 10);
          if (isWorkingDay(ds)) return ds;
          d.setUTCDate(d.getUTCDate() + 1);
        }
      }
      function instrForDate(ds) {
        const day = new Date(ds + 'T00:00:00Z').getUTCDay();
        return day === 3 || day === 4 ? 'SENSEX' : 'NIFTY';
      }

      function showNewDayForm() {
        const dates = Object.keys(allData).sort();
        let base;
        if (dates.length > 0) {
          base = dates[dates.length - 1];
        } else {
          const y = new Date();
          y.setDate(y.getDate() - 1);
          base = y.toISOString().slice(0, 10);
        }
        const next = nextWorkingDay(base);
        const instr = instrForDate(next);
        document.getElementById('new-day-date').value = next;
        document.getElementById('new-day-instr').value = instr;
        document.getElementById('new-day-form').style.display = 'flex';
      }
      function hideNewDayForm() {
        document.getElementById('new-day-form').style.display = 'none';
      }
      async function createNewDay() {
        const date = document.getElementById('new-day-date').value;
        const instr = document.getElementById('new-day-instr').value;
        if (!date) return;
        if (allData[date]) {
          hideNewDayForm();
          const [y, m] = date.split('-');
          switchMonth(`${y}-${m}`);
          return;
        }
        allData[date] = { date, instrument: instr, trades: [] };
        await persistDay(date);
        hideNewDayForm();
        activeMonth = null;
        renderPage();
        const [y, m] = date.split('-');
        switchMonth(`${y}-${m}`);
      }

      function groupByMonth() {
        const months = {};
        for (const date of Object.keys(allData).sort().reverse()) {
          const [y, m] = date.split('-');
          const key = `${y}-${m}`;
          if (!months[key]) months[key] = [];
          months[key].push(date);
        }
        return months;
      }

      const MONTH_NAMES = [
        'Jan',
        'Feb',
        'Mar',
        'Apr',
        'May',
        'Jun',
        'Jul',
        'Aug',
        'Sep',
        'Oct',
        'Nov',
        'Dec',
      ];
      function monthLabel(key) {
        const [y, m] = key.split('-');
        return `${MONTH_NAMES[parseInt(m) - 1]} ${y}`;
      }

      function renderPage() {
        const months = groupByMonth();
        const keys = Object.keys(months);
        const bar = document.getElementById('month-bar');
        const con = document.getElementById('panels-container');
        bar.innerHTML = '';
        con.innerHTML = '';
        if (keys.length === 0) {
          con.innerHTML =
            '<div class="empty-msg">No 3-min trade records yet. Click "+ Add Trade Day" to start.</div>';
          return;
        }
        if (!activeMonth || !months[activeMonth]) activeMonth = keys[0];
        keys.forEach((key) => {
          const tab = document.createElement('div');
          tab.className = 'month-tab' + (key === activeMonth ? ' active' : '');
          tab.textContent = monthLabel(key);
          tab.onclick = () => switchMonth(key);
          bar.appendChild(tab);
          const panel = document.createElement('div');
          panel.className = 'month-panel' + (key === activeMonth ? ' active' : '');
          panel.id = `panel-${key}`;
          panel.innerHTML = buildMonthHTML(key, months[key]);
          con.appendChild(panel);
        });
      }

      function buildMonthHTML(monthKey, dates) {
        const tradeDays = dates.map((d) => allData[d]).filter(Boolean);
        if (!monthFilters[monthKey]) monthFilters[monthKey] = 'ALL';
        return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0 0;flex-wrap:wrap;gap:8px;">
      <div style="flex:1;min-width:0;">
        <div class="filter-bar" style="flex-wrap:wrap;gap:6px;">
          <span style="font-size:10px;color:#6b7280;font-weight:700;margin-right:2px;">INSTRUMENT</span>
          <button class="filter-btn active"  id="fb-${monthKey}-ALL"    onclick="applyFilter('${monthKey}','ALL')">All</button>
          <button class="filter-btn nifty"   id="fb-${monthKey}-NIFTY"  onclick="applyFilter('${monthKey}','NIFTY')">NIFTY</button>
          <button class="filter-btn sensex"  id="fb-${monthKey}-SENSEX" onclick="applyFilter('${monthKey}','SENSEX')">SENSEX</button>
          <span style="font-size:10px;color:#6b7280;font-weight:700;margin-left:12px;">DATE</span>
          <select class="date-filter-select" id="df-${monthKey}" onchange="applyDateFilter('${monthKey}', this.value)">
            <option value="">All dates</option>
            ${dates
              .filter((d) => (allData[d]?.trades || []).length > 0)
              .map((d) => {
                const dateObj = new Date(d + 'T00:00:00');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                const mon = MONTH_NAMES[dateObj.getMonth()];
                return `<option value="${d}">${dd} ${mon}</option>`;
              })
              .join('')}
          </select>
        </div>
        <div class="time-section">
          <span class="time-section-label">TIME RANGES</span>
          <div class="time-ranges" id="tf-ranges-${monthKey}"></div>
          <button class="add-range-btn" onclick="addTimeRange('${monthKey}')">+ Add Range</button>
          <button class="add-range-btn" id="tf-apply-${monthKey}" style="display:none" onclick="applyTimeRanges('${monthKey}')">&#x25BA; Apply</button>
          <button class="time-clear-all" id="tf-clear-${monthKey}" style="display:none" onclick="clearAllRanges('${monthKey}')">&#x2715; Clear All</button>
        </div>
        <div class="time-section">
          <span class="time-section-label">NOTES</span>
          <label class="note-chip" id="nc-${monthKey}-sl"><input type="checkbox" id="nc-cb-${monthKey}-sl"> SL HIT</label>
          <label class="note-chip" id="nc-${monthKey}-pine"><input type="checkbox" id="nc-cb-${monthKey}-pine"> PINE SCRIPT SL</label>
          <span class="reach-label" style="margin-left:8px;">REACH &ge;</span>
          <input type="number" class="reach-input" id="rf-${monthKey}" min="0" step="1" placeholder="pts">
          <span class="reach-label" style="margin-left:8px;">CANDLE &ge;</span>
          <input type="number" class="reach-input" id="cf-${monthKey}" min="0" step="0.5" placeholder="pts">
          <button class="add-range-btn" onclick="applyNotesFilter('${monthKey}')">&#x25BA; Apply</button>
          <button class="time-clear-all" id="nf-clear-${monthKey}" onclick="clearNotesFilter('${monthKey}')">&#x2715; Clear</button>
        </div>
        <div class="time-section">
          <span class="time-section-label" title="Parsed from the day note, e.g. 'vix open: 12.67 low: 12.07 high: 13.64 close: 12.77'">VIX</span>
          <select class="date-filter-select" id="vf-field-${monthKey}" title="Which VIX value to filter on">
            <option value="close">Close</option>
            <option value="open">Open</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
          <span class="reach-label" style="margin-left:8px;">MIN</span>
          <input type="number" class="reach-input" id="vf-min-${monthKey}" step="0.01" placeholder="vix">
          <span class="reach-label" style="margin-left:8px;">MAX</span>
          <input type="number" class="reach-input" id="vf-max-${monthKey}" step="0.01" placeholder="vix">
          <button class="add-range-btn" onclick="applyVixFilter('${monthKey}')">&#x25BA; Apply</button>
          <button class="time-clear-all" id="vf-clear-${monthKey}" onclick="clearVixFilter('${monthKey}')">&#x2715; Clear</button>
        </div>
      </div>
      <button class="dl-btn" onclick="downloadExcel('${monthKey}')">&#x2B07; Download Excel</button>
    </div>
    <div id="summary-${monthKey}"></div>
    <div id="days-${monthKey}">
      ${tradeDays.map((d) => buildDayBlock(d)).join('')}
    </div>`;
      }

      function renderSummary(monthKey) {
        const filter = monthFilters[monthKey] || 'ALL';
        const months = groupByMonth();
        const selectedDate = monthDateFilter[monthKey] || null;
        const dates = (months[monthKey] || [])
          .map((d) => allData[d])
          .filter(Boolean)
          .filter((d) => {
            return (
              (filter === 'ALL' || (d.instrument || '').toUpperCase() === filter) &&
              (!selectedDate || d.date === selectedDate) &&
              dayPassesVix(d.date, monthKey)
            );
          });
        const el = document.getElementById(`summary-${monthKey}`);
        if (!el) return;
        if (dates.length === 0) {
          el.innerHTML = '';
          return;
        }
        const dayPnl = { sl: [], nsl: [], tgt: [] };
        let totalTrades = 0,
          winSL = 0,
          winNSL = 0,
          winTgt = 0;
        const dayDates = [];
        let totalBrokerage = 0,
          brokNIFTY = 0,
          brokSENSEX = 0;
        for (const day of dates.sort((a, b) => (a.date < b.date ? -1 : 1))) {
          let dSL = 0,
            dNSL = 0,
            dTgt = 0;
          const filteredTrades = (day.trades || []).filter((t) => tradePassesFilters(t, monthKey));
          // Per-day brokerage (₹200 × trades, or an explicit override), split by instrument.
          const dayBrok = brokerageFor(day, filteredTrades.length);
          totalBrokerage += dayBrok;
          if ((day.instrument || '').toUpperCase() === 'SENSEX') brokSENSEX += dayBrok;
          else brokNIFTY += dayBrok;
          for (const t of filteredTrades) {
            const tq = qty(day.instrument, t.lots);
            if (t.exitSL !== null && t.entryPrice !== null) dSL += (t.exitSL - t.entryPrice) * tq;
            if (t.exitNSL !== null && t.entryPrice !== null)
              dNSL += (t.exitNSL - t.entryPrice) * tq;
            if (t.tgtPts !== null) dTgt += t.tgtPts * tq;
            totalTrades++;
            if (t.exitSL !== null && t.entryPrice !== null && t.exitSL - t.entryPrice > 0) winSL++;
            if (t.exitNSL !== null && t.entryPrice !== null && t.exitNSL - t.entryPrice > 0)
              winNSL++;
            if (t.tgtPts !== null && t.tgtPts > 0) winTgt++;
          }
          dayPnl.sl.push(Math.round(dSL));
          dayPnl.nsl.push(Math.round(dNSL));
          dayPnl.tgt.push(Math.round(dTgt));
          dayDates.push(day.date);
        }
        const netSL = dayPnl.sl.reduce((a, b) => a + b, 0),
          netNSL = dayPnl.nsl.reduce((a, b) => a + b, 0),
          netTgt = dayPnl.tgt.reduce((a, b) => a + b, 0);
        const {
          maxDown: ddSL,
          maxUp: duSL,
          maxDownDate: ddSLDate,
          maxUpDate: duSLDate,
        } = calcMonthPeaks(dayPnl.sl, dayDates);
        const {
          maxDown: ddNSL,
          maxUp: duNSL,
          maxDownDate: ddNSLDate,
          maxUpDate: duNSLDate,
        } = calcMonthPeaks(dayPnl.nsl, dayDates);
        const {
          maxDown: ddTgt,
          maxUp: duTgt,
          maxDownDate: ddTgtDate,
          maxUpDate: duTgtDate,
        } = calcMonthPeaks(dayPnl.tgt, dayDates);
        const wrSL = totalTrades ? Math.round((winSL / totalTrades) * 100) : 0;
        const wrNSL = totalTrades ? Math.round((winNSL / totalTrades) * 100) : 0;
        const wrTgt = totalTrades ? Math.round((winTgt / totalTrades) * 100) : 0;
        // Brokerage reduces every P&L type: Net (after) = gross net − total brokerage.
        const netSLAfter = netSL - totalBrokerage,
          netNSLAfter = netNSL - totalBrokerage,
          netTgtAfter = netTgt - totalBrokerage;
        const capSL = INITIAL_CAPITAL + netSLAfter,
          capNSL = INITIAL_CAPITAL + netNSLAfter,
          capTgt = INITIAL_CAPITAL + netTgtAfter;
        el.innerHTML = `
    <div class="summary">
      <div class="scard"><div class="scard-lbl">Capital</div><div class="scard-val c-white">${fmtCapital(INITIAL_CAPITAL)}</div><div class="scard-sub">Opening this month</div><div style="margin-top:10px;">${statRow('Trades', `${totalTrades}`, 'c-white', `${dates.length} day(s)`)}</div><div style="margin-top:8px;border-top:1px solid #2a2a3a;padding-top:8px;">${statRow('Brokerage', fmtRs(-totalBrokerage), 'c-orange', `₹${BROKERAGE_PER_TRADE}/trade`)}${statRow('· NIFTY', fmtRs(-brokNIFTY), 'c-orange')}${statRow('· SENSEX', fmtRs(-brokSENSEX), 'c-orange')}</div></div>
      <div class="scard"><div class="scard-lbl">Exit w/ SL</div>${statRow('Net P&amp;L', fmtRs(netSL), pnlClass(netSL))}${statRow('Brokerage', fmtRs(-totalBrokerage), 'c-orange')}${statRow('Net (after)', fmtRs(netSLAfter), pnlClass(netSLAfter))}${statRow('Net Capital', fmtCapital(capSL), pnlClass(capSL - INITIAL_CAPITAL))}${statRow('Win Rate', `${wrSL}%`, 'c-purple', `${winSL} of ${totalTrades}`)}${statRow('Max Drawdown', ddSL < 0 ? fmtRs(ddSL) : '—', 'c-orange', ddSLDate ? fmtDateShort(ddSLDate) : '')}${statRow('Max Run-Up', duSL > 0 ? fmtRs(duSL) : '—', 'c-green', duSLDate ? fmtDateShort(duSLDate) : '')}</div>
      <div class="scard"><div class="scard-lbl">Exit w/o SL</div>${statRow('Net P&amp;L', fmtRs(netNSL), pnlClass(netNSL))}${statRow('Brokerage', fmtRs(-totalBrokerage), 'c-orange')}${statRow('Net (after)', fmtRs(netNSLAfter), pnlClass(netNSLAfter))}${statRow('Net Capital', fmtCapital(capNSL), pnlClass(capNSL - INITIAL_CAPITAL))}${statRow('Win Rate', `${wrNSL}%`, 'c-purple', `${winNSL} of ${totalTrades}`)}${statRow('Max Drawdown', ddNSL < 0 ? fmtRs(ddNSL) : '—', 'c-orange', ddNSLDate ? fmtDateShort(ddNSLDate) : '')}${statRow('Max Run-Up', duNSL > 0 ? fmtRs(duNSL) : '—', 'c-green', duNSLDate ? fmtDateShort(duNSLDate) : '')}</div>
      <div class="scard"><div class="scard-lbl">Target Pts</div>${statRow('Net P&amp;L', fmtRs(netTgt), pnlClass(netTgt))}${statRow('Brokerage', fmtRs(-totalBrokerage), 'c-orange')}${statRow('Net (after)', fmtRs(netTgtAfter), pnlClass(netTgtAfter))}${statRow('Net Capital', fmtCapital(capTgt), pnlClass(capTgt - INITIAL_CAPITAL))}${statRow('Win Rate', `${wrTgt}%`, 'c-purple', `${winTgt} of ${totalTrades}`)}${statRow('Max Drawdown', ddTgt < 0 ? fmtRs(ddTgt) : '—', 'c-orange', ddTgtDate ? fmtDateShort(ddTgtDate) : '')}${statRow('Max Run-Up', duTgt > 0 ? fmtRs(duTgt) : '—', 'c-green', duTgtDate ? fmtDateShort(duTgtDate) : '')}</div>
    </div>`;
      }

      function statRow(key, val, cls, sub = '') {
        return `<div class="stat-row"><span class="stat-key">${key}</span><div><div class="stat-val ${cls}">${val}</div>${sub ? `<div class="stat-sub">${sub}</div>` : ''}</div></div>`;
      }

      function buildDayBlock(day) {
        const dateStr = day.date;
        const dayKey = dateStr.replace(/-/g, '');
        const dateObj = new Date(dateStr + 'T00:00:00');
        const weekDay = [
          'Sunday',
          'Monday',
          'Tuesday',
          'Wednesday',
          'Thursday',
          'Friday',
          'Saturday',
        ][dateObj.getDay()];
        const dd = String(dateObj.getDate()).padStart(2, '0');
        const mon = MONTH_NAMES[dateObj.getMonth()];
        const dateLabel = `${dd} ${mon} ${dateObj.getFullYear()} — ${weekDay}`;
        return `
    <div class="day-block" id="dayblock-${dayKey}" data-instrument="${(day.instrument || '').toUpperCase()}" data-date="${dateStr}">
      <div class="day-header open" onclick="toggleDay(this)">
        <span class="day-chevron">&#x25BA;</span>
        <span class="day-date">${dateLabel}</span>
        <span class="day-badge">${day.instrument || ''}</span>
        <span class="day-badge">${(day.trades || []).length} trade(s)</span>
        <span class="day-pnl" id="day-pnl-${dayKey}"></span>
      </div>
      <div class="day-body open">
        <div class="day-note-bar" id="note-bar-${dayKey}">
          <span class="note-text${day.note ? '' : ' empty'}" id="note-text-${dayKey}">${day.note ? escHtml(day.note) : 'Add a day note…'}</span>
          <button class="note-edit-btn" onclick="editDayNote('${dateStr}');event.stopPropagation()">&#x270E; Edit</button>
        </div>
        <table>
          <thead><tr>
            <th>Time</th><th style="text-align:left">Symbol</th><th>Lots</th>
            <th>Entry</th><th>Exit w/SL</th><th>Exit w/Tgt</th><th>Exit w/oSL</th>
            <th>Tgt Pts</th><th>Candle</th><th style="text-align:left">Notes</th>
            <th>P&amp;L w/SL &#x20B9;</th><th>P&amp;L w/Tgt &#x20B9;</th><th>P&amp;L w/oSL &#x20B9;</th>
            <th style="text-align:center">Actions</th>
          </tr></thead>
          <tbody id="tbody-${dayKey}"></tbody>
        </table>
      </div>
    </div>`;
      }

      function renderDay(dateStr) {
        const day = allData[dateStr];
        const dayKey = dateStr.replace(/-/g, '');
        const tbody = document.getElementById(`tbody-${dayKey}`);
        if (!tbody || !day) return;
        (day.trades || []).sort((a, b) => {
          // Sort by entry time, but keep blank-time rows (e.g. a freshly added
          // row being filled in) at the BOTTOM instead of floating to the top.
          const ta = a.entryTime || a.time || '';
          const tb = b.entryTime || b.time || '';
          if (!ta && !tb) return 0;
          if (!ta) return 1;
          if (!tb) return -1;
          return ta.localeCompare(tb);
        });
        tbody.innerHTML = '';
        const monthKey = dateStr.slice(0, 7);
        const trades = (day.trades || []).filter((t) => tradePassesFilters(t, monthKey));
        let totSL = 0,
          totNSL = 0,
          totTgt = 0;
        const seriesSL = [],
          seriesNSL = [],
          seriesTgt = [];
        trades.forEach((t, idx) => {
          const tq = qty(day.instrument, t.lots);
          const pSL =
            t.exitSL !== null && t.entryPrice !== null
              ? Math.round((t.exitSL - t.entryPrice) * tq)
              : null;
          const pTgt = t.tgtPts !== null ? Math.round(t.tgtPts * tq) : null;
          const pNSL =
            t.exitNSL !== null && t.entryPrice !== null
              ? Math.round((t.exitNSL - t.entryPrice) * tq)
              : null;
          if (pSL !== null) {
            totSL += pSL;
            seriesSL.push(pSL);
          }
          if (pTgt !== null) {
            totTgt += pTgt;
            seriesTgt.push(pTgt);
          }
          if (pNSL !== null) {
            totNSL += pNSL;
            seriesNSL.push(pNSL);
          }

          const addTr = document.createElement('tr');
          addTr.className = 'add-row-tr';
          addTr.innerHTML = `<td colspan="14" style="position:relative;height:6px;"><button class="add-row-btn" onclick="insertRow('${dateStr}', ${idx})">+ Add Row Here</button></td>`;
          tbody.appendChild(addTr);

          const tr = document.createElement('tr');
          tr.dataset.id = t.id;
          tr.innerHTML = `
      <td>${(t.entryTime || t.time || '').slice(0, 5)}</td>
      <td class="sym-text">${t.entrySymbol || '—'}</td>
      <td>${t.lots}</td>
      <td>${fmt(t.entryPrice)}</td>
      <td>${fmt(t.exitSL)}</td>
      <td>${fmt(t.entryPrice !== null && t.tgtPts !== null ? parseFloat((t.entryPrice + t.tgtPts).toFixed(2)) : null)}</td>
      <td>${fmt(t.exitNSL)}</td>
      <td class="${pnlClass(t.tgtPts)}">${t.tgtPts !== null && t.tgtPts !== undefined ? fmtPts(t.tgtPts) : '—'}</td>
      <td style="color:#94a3b8">${t.candleRange !== null && t.candleRange !== undefined ? fmtPts(t.candleRange) : '—'}</td>
      <td class="notes-cell ${notesClass(t.notes)}" title="${t.notes || ''}">${t.notes || '—'}</td>
      <td class="${pnlClass(pSL)}">${pSL !== null ? fmtRs(pSL) : '—'}</td>
      <td class="${pnlClass(pTgt)}">${pTgt !== null ? fmtRs(pTgt) : '—'}</td>
      <td class="${pnlClass(pNSL)}">${pNSL !== null ? fmtRs(pNSL) : '—'}</td>
      <td style="text-align:center">
        <button class="act-btn" onclick="editRow('${dateStr}', '${t.id}', this)">&#x270F; Edit</button>
        <button class="act-btn del" onclick="deleteRow('${dateStr}', '${t.id}')">&#x2715;</button>
      </td>`;
          tbody.appendChild(tr);
        });

        const addTrEnd = document.createElement('tr');
        addTrEnd.className = 'add-row-tr';
        addTrEnd.innerHTML = `<td colspan="14" style="position:relative;height:6px;"><button class="add-row-btn" onclick="insertRow('${dateStr}', ${trades.length})">+ Add Row Here</button></td>`;
        tbody.appendChild(addTrEnd);

        const { maxDown: dSL, maxUp: uSL } = calcDayPeaks(seriesSL);
        const { maxDown: dTgt, maxUp: uTgt } = calcDayPeaks(seriesTgt);
        const { maxDown: dNSL, maxUp: uNSL } = calcDayPeaks(seriesNSL);

        const totTr = document.createElement('tr');
        totTr.className = 'total-row';
        totTr.innerHTML = `<td colspan="10">Day Total</td><td class="${pnlClass(totSL)}">${fmtRs(totSL)}</td><td class="${pnlClass(totTgt)}">${fmtRs(totTgt)}</td><td class="${pnlClass(totNSL)}">${fmtRs(totNSL)}</td><td></td>`;
        tbody.appendChild(totTr);

        // Per-day brokerage (editable) — default ₹200 × trades, deducted from every P&L column.
        const dayBrok = brokerageFor(day, trades.length);
        const brokOverridden = Number.isFinite(day.brokerage);
        const brokTr = document.createElement('tr');
        brokTr.className = 'total-row';
        brokTr.innerHTML = `<td colspan="10" style="color:#fbbf24;">Brokerage
          <input type="number" value="${dayBrok}" min="0" step="50" title="Default ₹${BROKERAGE_PER_TRADE} × ${trades.length} trades — edit to override"
            onchange="saveBrokerage('${dateStr}', this.value, ${trades.length})"
            style="width:96px;margin-left:8px;background:#1e1e2e;color:#fbbf24;border:1px solid #4b3d22;border-radius:4px;padding:2px 6px;font-size:12px">
          ${brokOverridden ? '<span style="color:#64748b;font-size:10px;margin-left:6px">edited · ₹' + BROKERAGE_PER_TRADE + '×' + trades.length + '=' + fmtRs(BROKERAGE_PER_TRADE * trades.length) + ' default</span>' : ''}</td>
          <td class="c-orange">${fmtRs(-dayBrok)}</td><td class="c-orange">${fmtRs(-dayBrok)}</td><td class="c-orange">${fmtRs(-dayBrok)}</td><td></td>`;
        tbody.appendChild(brokTr);

        const netTr = document.createElement('tr');
        netTr.className = 'total-row';
        netTr.innerHTML = `<td colspan="10" style="font-weight:700">Net after Brokerage</td><td class="${pnlClass(totSL - dayBrok)}">${fmtRs(totSL - dayBrok)}</td><td class="${pnlClass(totTgt - dayBrok)}">${fmtRs(totTgt - dayBrok)}</td><td class="${pnlClass(totNSL - dayBrok)}">${fmtRs(totNSL - dayBrok)}</td><td></td>`;
        tbody.appendChild(netTr);

        const ddTr = document.createElement('tr');
        ddTr.className = 'total-row';
        ddTr.innerHTML = `<td colspan="10" style="color:#fb923c;">Max Drawdown</td><td class="c-orange">${dSL < 0 ? fmtRs(dSL) : '—'}</td><td class="c-orange">${dTgt < 0 ? fmtRs(dTgt) : '—'}</td><td class="c-orange">${dNSL < 0 ? fmtRs(dNSL) : '—'}</td><td></td>`;

      function recalcEditRow() {
        const entry = parseFloat(document.getElementById('e-entry')?.value);
        const exitNSL = parseFloat(document.getElementById('e-exitNSL')?.value);
        const lots = parseInt(document.getElementById('e-lots')?.value);
        if (isNaN(entry) || isNaN(exitNSL)) return;
        const tr = document.getElementById('e-entry')?.closest('tr');
        const instr = tr?.dataset?.editInstr || 'NIFTY';
        const slPts = SL_PTS[instr] || 15,
          tgG = TGT_G[instr] || 50,
          tgL = TGT_L[instr] || 31,
          lotSz = LOT_SIZES[instr] || 65;
        const nLots = isNaN(lots) ? 10 : lots;
        const exitSL = parseFloat(
          Math.max(entry - slPts, Math.min(entry + tgG, exitNSL)).toFixed(2)
        );
        const tgtRaw = parseFloat(document.getElementById('e-tgt')?.value);
        const tgtPts = isNaN(tgtRaw)
          ? parseFloat(Math.max(-slPts, Math.min(tgL, exitNSL - entry)).toFixed(2))
          : tgtRaw;
        const exitTgt = parseFloat((entry + tgtPts).toFixed(2));
        const pSL = Math.round((exitSL - entry) * nLots * lotSz),
          pTgt = Math.round(tgtPts * nLots * lotSz),
          pNSL = Math.round((exitNSL - entry) * nLots * lotSz);
        const set = (id, v) => {
          const el = document.getElementById(id);
          if (el) el.value = v;
        };
        set('e-exitSL', exitSL);
        set('e-exitTgt', exitTgt);
        const pnl = document.getElementById('e-pnl-cell');
        if (pnl) {
          const c = (v) => (v >= 0 ? 'c-green' : 'c-red');
          pnl.innerHTML = `<span class="${c(pSL)}">${fmtRs(pSL)}</span><span style="color:#374151"> | </span><span class="${c(pTgt)}">${fmtRs(pTgt)}</span><span style="color:#374151"> | </span><span class="${c(pNSL)}">${fmtRs(pNSL)}</span>`;
        }
      }

      async function saveRow(dateStr, id, btn) {
        const day = allData[dateStr];
        const t = (day.trades || []).find((x) => String(x.id) === String(id));
        if (!t) return;
        t.entryTime = document.getElementById('e-time').value.trim();
        t.time = t.entryTime;
        t.entrySymbol = document.getElementById('e-sym').value.trim();
        t.lots = parseInt(document.getElementById('e-lots').value) || t.lots;
        t.entryPrice = parseFloat(document.getElementById('e-entry').value) || null;
        t.exitSL = parseFloat(document.getElementById('e-exitSL').value) || null;
        t.exitTgt = parseFloat(document.getElementById('e-exitTgt').value) || null;
        t.exitNSL = parseFloat(document.getElementById('e-exitNSL').value) || null;
        t.tgtPts = parseFloat(document.getElementById('e-tgt').value) || null;
        const cr = parseFloat(document.getElementById('e-candle').value);
        t.candleRange = isNaN(cr) ? null : cr;
        t.notes = document.getElementById('e-notes').value.trim();

        renderDay(dateStr);
        renderSummary(activeMonth);
      }

      // Leave edit mode. A brand-new row that was never saved is discarded
      // (so cancelling an "Add Row" doesn't leave an empty row behind);

      function cancelEdit(dateStr, id) {
        const day = allData[dateStr];
        const t = (day?.trades || []).find((x) => String(x.id) === String(id));
        if (t && t._unsaved) {
          day.trades = day.trades.filter((x) => String(x.id) !== String(id));
        }
        renderDay(dateStr);
      }

      function insertRow(dateStr, atIndex) {
        const day = allData[dateStr];
        const newTrade = {
          id: nextId++,
          side: 'CE',
          entrySymbol: '',
          symbol: '',
          entryTime: '',
          time: '',
          lots: day.instrument === 'SENSEX' ? 15 : 10,
          entryPrice: null,
          exitPrice: null,
          exitSL: null,
          exitNSL: null,
          tgtPts: null,
          candleRange: null,
          notes: '',
          _unsaved: true, // transient — discarded if the user cancels before saving
        };
        // Insert at the clicked position (renderDay re-sorts by entry time, but
        // splicing here keeps a sensible order for rows that share/lack a time).
        day.trades.splice(atIndex, 0, newTrade);
        renderDay(dateStr);
        // Open the NEW row for editing — locate it by its id, not by DOM position.
        // renderDay sorts by entry time, so a blank-time row does NOT land last;

      // Per-day brokerage (paper-trading cost). Default ₹200 per trade; an explicit
      // numeric override on the day record wins. `n` is the trade count to charge.
      const BROKERAGE_PER_TRADE = 200;
      function brokerageFor(day, n) {
        return day && Number.isFinite(day.brokerage) ? day.brokerage : BROKERAGE_PER_TRADE * n;
      }

      // Edit handler for the per-day Brokerage input in the day footer.
      async function saveBrokerage(dateStr, raw, defaultCount) {
        const day = allData[dateStr];
        if (!day) return;
        const v = parseFloat(raw);
        if (raw === '' || !Number.isFinite(v) || v === BROKERAGE_PER_TRADE * defaultCount) {
          delete day.brokerage;

      async function persistDay(dateStr) {
        try {
          const r = await fetch(SAVE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              date: dateStr,
              // Drop any never-saved placeholder rows and strip the transient flag
              // so it never reaches the JSON on disk.
              trades: (allData[dateStr].trades || [])
                .filter((t) => !t._unsaved)
                .map(({ _unsaved, ...rest }) => rest),
              instrument: allData[dateStr].instrument,
              note: allData[dateStr].note || '',
              brokerage: Number.isFinite(allData[dateStr].brokerage)
                ? allData[dateStr].brokerage
                : null,
            }),
          });
          const j = await r.json();
          if (j.ok) showToast('Saved');
          else showToast('Save failed: ' + (j.error || 'unknown'), true);
        } catch (e) {
          showToast('Save error: ' + e.message, true);

      function qty(instrument, lots) {
        return (lots || 1) * (LOT_SIZES[instrument] || 65);
      }
      function fmt(v) {
        return v !== null && v !== undefined ? Number(v).toFixed(2) : '—';
      }

      function calcDayPeaks(series) {
        let cum = 0,
          peak = 0,
          minSoFar = 0,
          maxDD = 0,
          maxRU = 0;
        for (const v of series) {
          cum += v;
          if (cum > peak) peak = cum;
          if (cum < minSoFar) minSoFar = cum;
          const dd = peak - cum,
            ru = cum - minSoFar;
          if (dd > maxDD) maxDD = dd;
          if (ru > maxRU) maxRU = ru;
        }
        return { maxDown: maxDD > 0 ? -maxDD : 0, maxUp: maxRU };
      }
      function calcMonthPeaks(series, dates) {
        let cum = 0,
          peak = 0,
          minSoFar = 0,
          maxDD = 0,
          maxRU = 0,
          maxDownDate = null,
          maxUpDate = null;
        for (let i = 0; i < series.length; i++) {
          cum += series[i];
          if (cum > peak) peak = cum;
          if (cum < minSoFar) minSoFar = cum;
          const dd = peak - cum,
            ru = cum - minSoFar;
          if (dd > maxDD) {
            maxDD = dd;
            maxDownDate = dates[i];
          }
          if (ru > maxRU) {
            maxRU = ru;
            maxUpDate = dates[i];
          }
        }
        return { maxDown: maxDD > 0 ? -maxDD : 0, maxDownDate, maxUp: maxRU, maxUpDate };
      }
      function fmtDateShort(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr + 'T00:00:00');
        return `${String(d.getDate()).padStart(2, '0')} ${MONTH_NAMES[d.getMonth()]}`;
      }
      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }
      function fmtRs(v) {
        if (v === null || v === undefined) return '—';
        const abs = Math.abs(Math.round(v)).toLocaleString('en-IN');
        return v > 0 ? `+₹${abs}` : v < 0 ? `-₹${abs}` : `₹${abs}`;
      }
      function fmtCapital(v) {
        if (v === null || v === undefined) return '—';
        return `₹${Math.round(v).toLocaleString('en-IN')}`;
      }
      function fmtPts(v) {
        if (v === null || v === undefined) return '—';
        return (v >= 0 ? '+' : '') + Number(v).toFixed(2);
      }
      function pnlClass(v) {
        if (v === null || v === undefined) return 'c-gray';
        return v > 0 ? 'c-green' : v < 0 ? 'c-red' : 'c-gray';
      }
      function showToast(msg, err = false) {
        const t = document.createElement('div');
        t.style.cssText = `position:fixed;bottom:70px;right:24px;background:${err ? '#7f1d1d' : '#052e16'};color:${err ? '#fca5a5' : '#4ade80'};border:1px solid ${err ? '#991b1b' : '#166534'};border-radius:8px;padding:10px 18px;font-size:12px;font-weight:700;z-index:999;`;
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
      }

      function loadSheetJS() {
        return new Promise((resolve, reject) => {
          if (typeof XLSX !== 'undefined') return resolve();
          const s = document.createElement('script');
          s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
          s.onload = resolve;
          s.onerror = () => reject(new Error('Failed to load SheetJS'));
          document.head.appendChild(s);
        });
      }
      async function downloadExcel(monthKey) {
        try {
          await loadSheetJS();
        } catch (e) {
          showToast('Could not load Excel library', true);
          return;
        }
        const months = groupByMonth(),
          dates = (months[monthKey] || []).sort();
        if (!dates.length) {
          showToast('No trades to export', true);
          return;
        }
        const HEADERS = [
          'Date',
          'Instrument',
          'Entry Time',
          'Lots',
          'Entry',
          'Exit w/SL',
          'Exit w/oSL',
          'Tgt Pts',
          'P&L w/SL (₹)',
          'P&L w/oSL (₹)',
          'P&L Tgt (₹)',
        ];
        const rows = [HEADERS];
        let totSL = 0,
          totNSL = 0,
          totTgt = 0,
          totalCount = 0,
          winSL = 0,
          winNSL = 0,
          winTgt = 0;
        for (const date of dates) {
          const day = allData[date];
          if (!day) continue;
          for (const t of day.trades || []) {
            const tq = qty(day.instrument, t.lots);
            const pSL =
              t.exitSL !== null && t.entryPrice !== null
                ? Math.round((t.exitSL - t.entryPrice) * tq)
                : '';
            const pNSL =
              t.exitNSL !== null && t.entryPrice !== null
                ? Math.round((t.exitNSL - t.entryPrice) * tq)
                : '';
            const pTgt = t.tgtPts !== null ? Math.round(t.tgtPts * tq) : '';
            rows.push([
              date,
              day.instrument || '',
              (t.entryTime || t.time || '').slice(0, 5),
              t.lots,
              t.entryPrice ?? '',
              t.exitSL ?? '',
              t.exitNSL ?? '',
              t.tgtPts ?? '',
              pSL,
              pNSL,
              pTgt,
            ]);
            if (pSL !== '') {
              totSL += pSL;
              if (pSL > 0) winSL++;
            }
            if (pNSL !== '') {
              totNSL += pNSL;
              if (pNSL > 0) winNSL++;
            }
            if (pTgt !== '') {
              totTgt += pTgt;
              if (pTgt > 0) winTgt++;
            }
            totalCount++;
          }
        }
        rows.push([]);
        rows.push(['TOTAL', '', '', '', '', '', '', '', totSL, totNSL, totTgt]);
        const wrFmt = (w) =>
          totalCount ? `${Math.round((w / totalCount) * 100)}% (${w}/${totalCount})` : '—';
        rows.push([
          'WIN RATE',
          '',
          '',
          '',
          '',
          '',
          '',
          '',
          wrFmt(winSL),
          wrFmt(winNSL),
          wrFmt(winTgt),
        ]);
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [
          { wch: 12 },
          { wch: 10 },
          { wch: 10 },
          { wch: 6 },
          { wch: 8 },
          { wch: 10 },
          { wch: 11 },
          { wch: 8 },
          { wch: 14 },
          { wch: 14 },
          { wch: 12 },
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, monthLabel(monthKey));
        const fileName = `3Min_Trades_${monthKey}.xlsx`;
        XLSX.writeFile(wb, fileName);
        showToast(`Downloaded ${fileName}`);
      }

      function tradeInAnyRange(entryTime, ranges) {
        if (!ranges || ranges.length === 0) return true;
        const t = (entryTime || '').slice(0, 5);
        if (!t) return true;
        return ranges.some(({ from, to }) => {
          if (!from && !to) return true;
          if (from && t < from) return false;
          if (to && t > to) return false;
          return true;
        });
      }
      function getEffectiveMaxReach(t) {
        if (t.maxReach !== undefined && t.maxReach !== null) return t.maxReach;
        const m = (t.notes || '').match(/reach\s+(?:up\s*to\s+)?(\d+(?:\.\d+)?)/i);
        return m ? parseFloat(m[1]) : 0;
      }
      function tradePassesFilters(t, monthKey) {
        if (!tradeInAnyRange(t.entryTime || t.time, monthTimeFilters[monthKey] || [])) return false;
        const nf = monthNoteFilters[monthKey] || {};
        if (nf.slHit || nf.pineSL) {
          const n = (t.notes || '').toUpperCase();
          if (
            !(
              (nf.slHit && n.includes('SL HIT') && !n.includes('PINE SCRIPT')) ||
              (nf.pineSL && n.includes('PINE SCRIPT'))
            )
          )
            return false;
        }
        const minReach = monthReachFilter[monthKey];
        if (
          minReach !== null &&
          minReach !== undefined &&
          minReach > 0 &&
          getEffectiveMaxReach(t) < minReach
        )
          return false;
        const minCandle = monthCandleFilter[monthKey];
        if (
          minCandle !== null &&
          minCandle !== undefined &&
          minCandle > 0 &&
          (t.candleRange ?? 0) < minCandle
        )
          return false;
        return true;
      }
      function addTimeRange(monthKey) {
        if (!monthTimeFilters[monthKey]) monthTimeFilters[monthKey] = [];
        monthTimeFilters[monthKey].push({ from: '', to: '' });
        renderTimeRanges(monthKey);
      }
      function removeTimeRange(monthKey, idx) {
        if (!monthTimeFilters[monthKey]) return;
        monthTimeFilters[monthKey].splice(idx, 1);
        renderTimeRanges(monthKey);
      }
      function updateTimeRange(monthKey, idx, field, value) {
        if (!monthTimeFilters[monthKey]) monthTimeFilters[monthKey] = [];
        if (!monthTimeFilters[monthKey][idx])
          monthTimeFilters[monthKey][idx] = { from: '', to: '' };
        monthTimeFilters[monthKey][idx][field] = value;
        renderTimeRangeActiveState(monthKey, idx);
      }
      function applyTimeRanges(monthKey) {
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }
      function renderTimeRangeActiveState(monthKey, idx) {
        const rangesEl = document.getElementById(`tf-ranges-${monthKey}`);
        if (!rangesEl) return;
        const rows = rangesEl.querySelectorAll('.time-range-row');
        if (!rows[idx]) return;
        const r = (monthTimeFilters[monthKey] || [])[idx] || {};
        rows[idx].classList.toggle('active', !!(r.from || r.to));
      }
      function clearAllRanges(monthKey) {
        monthTimeFilters[monthKey] = [];
        renderTimeRanges(monthKey);
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }
      function renderTimeRanges(monthKey) {
        const el = document.getElementById(`tf-ranges-${monthKey}`);
        if (!el) return;
        const ranges = monthTimeFilters[monthKey] || [],
          clearBtn = document.getElementById(`tf-clear-${monthKey}`);
        el.innerHTML = ranges
          .map(
            ({ from, to }, i) =>
              `<div class="time-range-row${from || to ? ' active' : ''}"><input class="time-input" type="time" value="${from || ''}" onchange="updateTimeRange('${monthKey}', ${i}, 'from', this.value)" title="From time"><span class="time-sep">–</span><input class="time-input" type="time" value="${to || ''}" onchange="updateTimeRange('${monthKey}', ${i}, 'to', this.value)" title="To time"><button class="time-del-btn" onclick="removeTimeRange('${monthKey}', ${i})" title="Remove range">✕</button></div>`
          )
          .join('');
        const applyBtn = document.getElementById(`tf-apply-${monthKey}`);
        if (applyBtn) applyBtn.style.display = ranges.length > 0 ? '' : 'none';
        if (clearBtn) clearBtn.style.display = ranges.length > 0 ? '' : 'none';
      }
      function notesClass(notes) {
        if (!notes) return '';
        const n = notes.toUpperCase();
        if (n.includes('PINE SCRIPT')) return 'pine-sl';
        if (n.includes('SL HIT')) return 'sl-hit';
        return '';
      }
      function applyNotesFilter(monthKey) {
        if (!monthNoteFilters[monthKey]) monthNoteFilters[monthKey] = {};
        const cbSL = document.getElementById(`nc-cb-${monthKey}-sl`),
          cbPine = document.getElementById(`nc-cb-${monthKey}-pine`),
          rfInput = document.getElementById(`rf-${monthKey}`),
          cfInput = document.getElementById(`cf-${monthKey}`);
        monthNoteFilters[monthKey].slHit = cbSL?.checked || false;
        monthNoteFilters[monthKey].pineSL = cbPine?.checked || false;
        const v = parseFloat(rfInput?.value);
        monthReachFilter[monthKey] = isNaN(v) ? null : v;
        const cv = parseFloat(cfInput?.value);
        monthCandleFilter[monthKey] = isNaN(cv) ? null : cv;
        document
          .getElementById(`nc-${monthKey}-sl`)
          ?.classList.toggle('active', monthNoteFilters[monthKey].slHit);
        document
          .getElementById(`nc-${monthKey}-pine`)
          ?.classList.toggle('active', monthNoteFilters[monthKey].pineSL);
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }
      function clearNotesFilter(monthKey) {
        monthNoteFilters[monthKey] = { slHit: false, pineSL: false };
        monthReachFilter[monthKey] = null;
        monthCandleFilter[monthKey] = null;
        const cbSL = document.getElementById(`nc-cb-${monthKey}-sl`),
          cbPine = document.getElementById(`nc-cb-${monthKey}-pine`),
          rfInput = document.getElementById(`rf-${monthKey}`),
          cfInput = document.getElementById(`cf-${monthKey}`);
        if (cbSL) cbSL.checked = false;
        if (cbPine) cbPine.checked = false;
        if (rfInput) rfInput.value = '';
        if (cfInput) cfInput.value = '';
        document.getElementById(`nc-${monthKey}-sl`)?.classList.remove('active');
        document.getElementById(`nc-${monthKey}-pine`)?.classList.remove('active');
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }
      function applyVixFilter(monthKey) {
        const field = document.getElementById(`vf-field-${monthKey}`)?.value || 'close';
        const minV = parseFloat(document.getElementById(`vf-min-${monthKey}`)?.value);
        const maxV = parseFloat(document.getElementById(`vf-max-${monthKey}`)?.value);
        monthVixFilter[monthKey] = {
          field,
          min: isNaN(minV) ? null : minV,
          max: isNaN(maxV) ? null : maxV,
        };
        document
          .getElementById(`vf-clear-${monthKey}`)
          ?.classList.toggle(
            'active',
            monthVixFilter[monthKey].min !== null || monthVixFilter[monthKey].max !== null
          );
        applyFilter(monthKey, monthFilters[monthKey] || 'ALL');
      }
      function clearVixFilter(monthKey) {
        monthVixFilter[monthKey] = { field: 'close', min: null, max: null };
        const fld = document.getElementById(`vf-field-${monthKey}`);
        if (fld) fld.value = 'close';
        const mn = document.getElementById(`vf-min-${monthKey}`);
        if (mn) mn.value = '';
        const mx = document.getElementById(`vf-max-${monthKey}`);
        if (mx) mx.value = '';
        applyFilter(monthKey, monthFilters[monthKey] || 'ALL');
      }
      function applyDateFilter(monthKey, dateStr) {
        monthDateFilter[monthKey] = dateStr || null;
        applyFilter(monthKey, monthFilters[monthKey] || 'ALL');
      }
      function applyFilter(monthKey, filter) {
        monthFilters[monthKey] = filter;
        ['ALL', 'NIFTY', 'SENSEX'].forEach((f) => {
          const btn = document.getElementById(`fb-${monthKey}-${f}`);
          if (!btn) return;
          btn.classList.toggle('active', f === filter);
        });
        const selectedDate = monthDateFilter[monthKey] || null,
          panel = document.getElementById(`panel-${monthKey}`);
        if (panel) {
          panel.querySelectorAll('.day-block').forEach((block) => {
            const instr = block.dataset.instrument || '',
              date = block.dataset.date || '';
            block.style.display =
              (filter === 'ALL' || instr === filter) &&
              (!selectedDate || date === selectedDate) &&
              dayPassesVix(date, monthKey)
                ? ''
                : 'none';
          });
        }
        renderSummary(monthKey);
      }

      loadData().then(() => {
        if (activeMonth) renderMonthDays(activeMonth);
      });
    </script>
  </body>
</html>
