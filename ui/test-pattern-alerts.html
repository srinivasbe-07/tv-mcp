<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Alert Test</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f1117;
        color: #d1d5db;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        background: #1a1d27;
        border-bottom: 1px solid #2a2d3a;
        padding: 0 16px;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .logo { font-size: 14px; font-weight: 700; color: #fff; }
      .logo span { color: #fb923c; }
      .nav-link {
        font-size: 11px;
        color: #6b7280;
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 5px;
        border: 1px solid #2a2d3a;
      }
      .nav-link:hover { color: #d1d5db; border-color: #4b5563; }
      .main {
        flex: 1;
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
      }
      .card {
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card-title {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .instr-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 10px;
        letter-spacing: 0.5px;
      }
      .badge-nifty  { background: #1e3a5f; color: #93c5fd; }
      .badge-sensex { background: #2e1065; color: #a78bfa; }
      .day-note { font-size: 10px; color: #6b7280; }
      label {
        display: block;
        font-size: 11px;
        color: #6b7280;
        margin-bottom: 3px;
        font-weight: 500;
      }
      input[type='number'], select {
        width: 100%;
        background: #0f1117;
        border: 1px solid #2a2d3a;
        border-radius: 6px;
        color: #d1d5db;
        font-size: 13px;
        padding: 6px 9px;
        outline: none;
      }
      input:focus, select:focus { border-color: #ea580c; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .run-btn {
        width: 100%;
        padding: 9px;
        background: #431407;
        color: #fb923c;
        border: 1px solid #ea580c;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.5px;
        transition: opacity 0.15s;
      }
      .run-btn:hover { opacity: 0.85; }
      .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .results { display: flex; flex-direction: column; gap: 6px; }
      .result-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        background: #0f1117;
        border-radius: 7px;
        font-size: 11px;
        font-family: 'Consolas', 'Courier New', monospace;
      }
      .role-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 4px;
        min-width: 48px;
        text-align: center;
      }
      .role-entry  { background: #052e16; color: #4ade80; }
      .role-sl     { background: #7f1d1d; color: #fca5a5; }
      .role-target { background: #1e3a5f; color: #93c5fd; }
      .result-name  { flex: 1; color: #9ca3af; font-size: 10px; }
      .result-level { color: #fb923c; font-size: 10px; min-width: 50px; text-align: right; }
      .result-status {
        font-size: 11px;
        font-weight: 700;
        min-width: 24px;
        text-align: center;
      }
      .s-ok      { color: #4ade80; }
      .s-fail    { color: #f87171; }
      .s-wait    { color: #6b7280; }
      .s-running { color: #facc15; animation: pulse 1s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
      .summary {
        font-size: 12px;
        text-align: center;
        padding: 6px;
        border-radius: 6px;
        font-weight: 600;
      }
      .sum-ok   { background: #052e16; color: #4ade80; }
      .sum-fail { background: #7f1d1d; color: #fca5a5; }
      .sum-idle { background: #1a1d27; color: #4b5563; }
      .log-panel {
        background: #0a0c12;
        border: 1px solid #1e2130;
        border-radius: 7px;
        padding: 8px 10px;
        max-height: 160px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .log-panel.hidden { display: none; }
      .log-line {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 10px;
        color: #6b7280;
        line-height: 1.5;
      }
      .log-line.ok  { color: #4ade80; }
      .log-line.err { color: #f87171; }
      .log-line.inf { color: #93c5fd; }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Pattern<span>Test</span></div>
      <a class="nav-link" href="/">← Dashboard</a>
      <a class="nav-link" href="/test-alerts">Supertrend Test</a>
    </header>

    <div class="main">

      <!-- NIFTY card -->
      <div class="card" id="card-nifty">
        <div class="card-title">
          <span class="instr-badge badge-nifty">NIFTY</span>
          Pattern Alerts
          <span class="day-note" id="nifty-day-note"></span>
        </div>
        <div class="form-row">
          <div>
            <label>Spot Price (blank = auto)</label>
            <input type="number" id="nifty-spot" placeholder="e.g. 23400" step="50" />
          </div>
          <div>
            <label>Bias</label>
            <select id="nifty-bias">
              <option value="up">CE (bias up)</option>
              <option value="down">PE (bias down)</option>
            </select>
          </div>
        </div>
        <div>
          <label>ITM Override</label>
          <select id="nifty-itm">
            <option value="">Auto (day rule)</option>
            <option value="0">ATM (ITM-0)</option>
            <option value="1">ITM-1</option>
            <option value="2">ITM-2</option>
          </select>
        </div>

        <button class="run-btn" id="nifty-btn" onclick="runTest('NIFTY')">
          ▶ Test NIFTY Alerts
        </button>

        <div class="results" id="nifty-results">
          <div class="result-row">
            <span class="role-badge role-entry">Entry</span>
            <span class="result-name">niftyPatternLongEntry</span>
            <span class="result-level" id="nifty-entry-lvl">—</span>
            <span class="result-status s-wait" id="nifty-entry-st">·</span>
          </div>
          <div class="result-row">
            <span class="role-badge role-sl">SL</span>
            <span class="result-name">niftyPatternLongSL</span>
            <span class="result-level" id="nifty-sl-lvl">—</span>
            <span class="result-status s-wait" id="nifty-sl-st">·</span>
          </div>
          <div class="result-row">
            <span class="role-badge role-target">Target</span>
            <span class="result-name">niftyPatternLongTarget</span>
            <span class="result-level" id="nifty-target-lvl">—</span>
            <span class="result-status s-wait" id="nifty-target-st">·</span>
          </div>
        </div>
        <div class="log-panel hidden" id="nifty-log"></div>
        <div class="summary sum-idle" id="nifty-summary">Not run yet</div>
      </div>

      <!-- SENSEX card -->
      <div class="card" id="card-sensex">
        <div class="card-title">
          <span class="instr-badge badge-sensex">SENSEX</span>
          Pattern Alerts
          <span class="day-note" id="sensex-day-note"></span>
        </div>
        <div class="form-row">
          <div>
            <label>Spot Price (blank = auto)</label>
            <input type="number" id="sensex-spot" placeholder="e.g. 80000" step="100" />
          </div>
          <div>
            <label>Bias</label>
            <select id="sensex-bias">
              <option value="up">CE (bias up)</option>
              <option value="down">PE (bias down)</option>
            </select>
          </div>
        </div>
        <div>
          <label>ITM Override</label>
          <select id="sensex-itm">
            <option value="">Auto (ITM-2)</option>
            <option value="0">ATM (ITM-0)</option>
            <option value="1">ITM-1</option>
            <option value="2">ITM-2</option>
          </select>
        </div>

        <button class="run-btn" id="sensex-btn" onclick="runTest('SENSEX')">
          ▶ Test SENSEX Alerts
        </button>

        <div class="results" id="sensex-results">
          <div class="result-row">
            <span class="role-badge role-entry">Entry</span>
            <span class="result-name">sensexPatternLongEntry</span>
            <span class="result-level" id="sensex-entry-lvl">—</span>
            <span class="result-status s-wait" id="sensex-entry-st">·</span>
          </div>
          <div class="result-row">
            <span class="role-badge role-sl">SL</span>
            <span class="result-name">sensexPatternLongSL</span>
            <span class="result-level" id="sensex-sl-lvl">—</span>
            <span class="result-status s-wait" id="sensex-sl-st">·</span>
          </div>
          <div class="result-row">
            <span class="role-badge role-target">Target</span>
            <span class="result-name">sensexPatternLongTarget</span>
            <span class="result-level" id="sensex-target-lvl">—</span>
            <span class="result-status s-wait" id="sensex-target-st">·</span>
          </div>
        </div>
        <div class="log-panel hidden" id="sensex-log"></div>
        <div class="summary sum-idle" id="sensex-summary">Not run yet</div>
      </div>

    </div>

    <script>
      const DAY_INSTR = { 1: 'NIFTY', 2: 'NIFTY', 3: 'SENSEX', 4: 'SENSEX', 5: 'NIFTY' };
      const now = new Date(Date.now() + 5.5 * 60 * 60 * 1000);
      const todayInstr = DAY_INSTR[now.getUTCDay()] || 'NIFTY';
      document.getElementById('nifty-day-note').textContent  = todayInstr === 'NIFTY'  ? '← today' : '(not today)';
      document.getElementById('sensex-day-note').textContent = todayInstr === 'SENSEX' ? '← today' : '(not today)';

      const ROLES = ['entry', 'sl', 'target'];

      function setStatus(instr, role, level, status, cls) {
        const i = instr.toLowerCase();
        document.getElementById(`${i}-${role}-lvl`).textContent = level != null ? level : '—';
        const st = document.getElementById(`${i}-${role}-st`);
        st.textContent  = status;
        st.className    = `result-status ${cls}`;
      }

      function appendLog(instr, msg) {
        const panel = document.getElementById(`${instr.toLowerCase()}-log`);
        panel.classList.remove('hidden');
        const line = document.createElement('div');
        line.className =
          'log-line' +
          (msg.includes('✓') ? ' ok'
           : msg.includes('✗') || msg.includes('ERROR') || msg.includes('FAIL') ? ' err'
           : msg.includes('Spot:') || msg.includes('Option:') ? ' inf'
           : '');
        line.textContent = msg;
        panel.appendChild(line);
        panel.scrollTop = panel.scrollHeight;
      }

      async function runTest(instr) {
        const i = instr.toLowerCase();
        const btn = document.getElementById(`${i}-btn`);
        btn.disabled = true;

        ROLES.forEach(r => setStatus(instr, r, null, '…', 's-running'));
        const logEl = document.getElementById(`${i}-log`);
        logEl.innerHTML = '';
        logEl.classList.add('hidden');
        const sumEl = document.getElementById(`${i}-summary`);
        sumEl.className = 'summary sum-idle';
        sumEl.textContent = 'Running...';

        const spot       = parseFloat(document.getElementById(`${i}-spot`).value) || null;
        const bias       = document.getElementById(`${i}-bias`).value;
        const itmVal     = document.getElementById(`${i}-itm`).value;
        const itmOverride = itmVal !== '' ? parseInt(itmVal) : null;

        try {
          const response = await fetch('/api/test/pattern', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ instr, spot, bias, itmOverride }),
          });

          const reader  = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let passed = 0, failed = 0;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            const parts = buffer.split('\n\n');
            buffer = parts.pop();

            for (const part of parts) {
              const eventMatch = part.match(/^event:\s*(.+)/m);
              const dataMatch  = part.match(/^data:\s*(.+)/m);
              if (!dataMatch) continue;
              const eventType = eventMatch?.[1]?.trim() || 'message';
              let parsed;
              try { parsed = JSON.parse(dataMatch[1]); } catch (_) { continue; }

              if (eventType === 'log') {
                appendLog(instr, parsed.msg);
              } else if (eventType === 'result') {
                const ok = parsed.success;
                setStatus(instr, parsed.role, parsed.level, ok ? '✓' : '✗', ok ? 's-ok' : 's-fail');
                ok ? passed++ : failed++;
              } else if (eventType === 'done') {
                if (parsed.error) {
                  ROLES.forEach(r => setStatus(instr, r, null, '✗', 's-fail'));
                  sumEl.className = 'summary sum-fail';
                  sumEl.textContent = parsed.error;
                } else if (failed === 0) {
                  sumEl.className = 'summary sum-ok';
                  sumEl.textContent = `All 3 alerts updated ✓  (spot: ${parsed.spot}  ATM: ${parsed.atm}  ITM-${parsed.itmDepth}  ${parsed.symbol})`;
                } else {
                  sumEl.className = 'summary sum-fail';
                  sumEl.textContent = `${passed} passed, ${failed} failed — check alert names in TradingView`;
                }
              }
            }
          }
        } catch (e) {
          ROLES.forEach(r => setStatus(instr, r, null, '✗', 's-fail'));
          sumEl.className = 'summary sum-fail';
          sumEl.textContent = 'Server error: ' + e.message;
        } finally {
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
