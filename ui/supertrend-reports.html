<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Reports — Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f1117;
        color: #d1d5db;
        min-height: 100vh;
      }
      header {
        background: #1a1d27;
        border-bottom: 1px solid #2a2d3a;
        padding: 0 24px;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }
      .logo span {
        color: #a78bfa;
      }
      .nav-link {
        font-size: 11px;
        color: #6b7280;
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 5px;
        border: 1px solid #2a2d3a;
      }
      .nav-link:hover {
        color: #d1d5db;
        border-color: #4b5563;
      }
      .spacer {
        flex: 1;
      }
      .main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 24px 80px;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        color: #f9fafb;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 24px;
      }

      /* Month bar */
      .month-bar {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }
      .section-title {
        font-size: 10px;
        font-weight: 700;
        color: #6b7280;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-right: 4px;
      }
      .month-chip {
        padding: 4px 14px;
        border-radius: 6px;
        border: 1px solid #2a2d3a;
        background: #13151f;
        color: #6b7280;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
      }
      .month-chip:hover {
        border-color: #4b5563;
        color: #d1d5db;
      }
      .month-chip.active {
        border-color: #6d28d9;
        background: #1e1b4b;
        color: #a78bfa;
      }

      /* Strategy section */
      .strategy-section {
        margin-bottom: 32px;
      }
      .strategy-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .strategy-label {
        font-size: 14px;
        font-weight: 700;
        color: #f9fafb;
      }
      .strategy-badge {
        font-size: 10px;
        color: #6b7280;
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 4px;
        padding: 2px 8px;
        font-weight: 700;
      }
      .open-btn {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 14px;
        border-radius: 7px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
        border: 1px solid;
      }
      .open-btn.green {
        background: #052e16;
        border-color: #166534;
        color: #4ade80;
      }
      .open-btn.green:hover {
        background: #14532d;
        border-color: #22c55e;
      }
      .open-btn.blue {
        background: #1e3a5f;
        border-color: #1d4ed8;
        color: #93c5fd;
      }
      .open-btn.blue:hover {
        background: #1e40af;
        border-color: #3b82f6;
      }

      /* Summary grid */
      .summary {
        display: grid;
        grid-template-columns: 160px repeat(3, 1fr);
        gap: 12px;
      }
      .scard {
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 10px;
        padding: 12px 16px;
      }
      .scard-lbl {
        font-size: 10px;
        color: #6b7280;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .scard-val {
        font-size: 20px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .scard-sub {
        font-size: 10px;
        color: #6b7280;
        margin-top: 3px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 4px 0;
        border-bottom: 1px solid #1f2937;
      }
      .stat-row:last-child {
        border-bottom: none;
      }
      .stat-key {
        font-size: 10px;
        color: #6b7280;
        font-weight: 600;
      }
      .stat-val {
        font-size: 13px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .stat-sub {
        font-size: 9px;
        color: #4b5563;
        margin-top: 1px;
        text-align: right;
      }
      .c-green {
        color: #4ade80;
      }
      .c-red {
        color: #f87171;
      }
      .c-yellow {
        color: #facc15;
      }
      .c-purple {
        color: #a78bfa;
      }
      .c-white {
        color: #f9fafb;
      }
      .c-gray {
        color: #6b7280;
      }
      .c-orange {
        color: #fb923c;
      }

      .divider {
        border: none;
        border-top: 1px solid #2a2d3a;
        margin: 28px 0;
      }

      .empty-msg {
        color: #374151;
        font-size: 13px;
        padding: 20px 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Supertrend<span>Monitor</span></div>
      <a class="nav-link" href="/">&#x2190; Dashboard</a>
      <div class="spacer"></div>
    </header>

    <div class="main">
      <h1>Trade Reports</h1>
      <p class="subtitle">
        Monthly P&amp;L summary for both strategies. Click "Open" to view trade details.
      </p>

      <div class="month-bar">
        <span class="section-title">MONTH</span>
        <div id="month-chips" style="display: flex; gap: 6px; flex-wrap: wrap"></div>
      </div>

      <!-- 1-Min -->
      <div class="strategy-section">
        <div class="strategy-header">
          <span class="strategy-label">&#x23F1; 1-Min Strategy</span>
          <span class="strategy-badge" id="badge-1min">—</span>
          <a class="open-btn green" href="/1min-reports">&#x25B6; Open Detail</a>
        </div>
        <div id="summary-1min"><div class="empty-msg">Loading…</div></div>
      </div>

      <hr class="divider" />

      <!-- 3-Min -->
      <div class="strategy-section">
        <div class="strategy-header">
          <span class="strategy-label">&#x1F4CB; 3-Min Strategy</span>
          <span class="strategy-badge" id="badge-3min">—</span>
          <a class="open-btn blue" href="/3min-reports">&#x25B6; Open Detail</a>
        </div>
        <div id="summary-3min"><div class="empty-msg">Loading…</div></div>
      </div>

      <hr class="divider" />

      <!-- Bias -->
      <div class="strategy-section">
        <div class="strategy-header">
          <span class="strategy-label">&#x1F500; Bias Strategy</span>
          <span class="strategy-badge" id="badge-bias">—</span>
          <a class="open-btn green" href="/bias-reports">&#x25B6; Open Detail</a>
        </div>
        <div id="summary-bias"><div class="empty-msg">Loading…</div></div>
      </div>
    </div>

    <script>
      const LOT_SIZES = { NIFTY: 65, SENSEX: 20 };
      const INITIAL_CAPITAL = 200000;
      const MONTH_NAMES = [
        'Jan',
        'Feb',
        'Mar',
        'Apr',
        'May',
        'Jun',
        'Jul',
        'Aug',
        'Sep',
        'Oct',
        'Nov',
        'Dec',
      ];

      let data1min = {},
        data3min = {},
        dataBias = {};
      let activeMonth = null;

      function monthLabel(key) {
        const [y, m] = key.split('-');
        return `${MONTH_NAMES[parseInt(m) - 1]} ${y}`;
      }
      function qty(instrument, lots) {
        return (lots || 1) * (LOT_SIZES[instrument] || 65);
      }

      function fmtRs(v) {
        if (v === null || v === undefined) return '—';
        const abs = Math.abs(Math.round(v)).toLocaleString('en-IN');
        return v >= 0 ? `+₹${abs}` : `-₹${abs}`;
      }
      function fmtCap(v) {
        return `₹${Math.round(v).toLocaleString('en-IN')}`;
      }
      function fmtDateShort(ds) {
        if (!ds) return '';
        const d = new Date(ds + 'T00:00:00');
        return `${String(d.getDate()).padStart(2, '0')} ${MONTH_NAMES[d.getMonth()]}`;
      }
      function pnlClass(v) {
        return v > 0 ? 'c-green' : v < 0 ? 'c-red' : 'c-gray';
      }

      function calcMonthPeaks(series, dates) {
        let cum = 0,
          peak = 0,
          minSoFar = 0,
          maxDD = 0,
          maxRU = 0,
          ddDate = null,
          ruDate = null;
        for (let i = 0; i < series.length; i++) {
          cum += series[i];
          if (cum > peak) peak = cum;
          if (cum < minSoFar) minSoFar = cum;
          const dd = peak - cum,
            ru = cum - minSoFar;
          if (dd > maxDD) {
            maxDD = dd;
            ddDate = dates[i];
          }
          if (ru > maxRU) {
            maxRU = ru;
            ruDate = dates[i];
          }
        }
        return {
          maxDown: maxDD > 0 ? -maxDD : 0,
          maxDownDate: ddDate,
          maxUp: maxRU,
          maxUpDate: ruDate,
        };
      }

      function statRow(key, val, cls, sub = '') {
        return `<div class="stat-row"><span class="stat-key">${key}</span><div><div class="stat-val ${cls}">${val}</div>${sub ? `<div class="stat-sub">${sub}</div>` : ''}</div></div>`;
      }

      function computeAndRender(id, allData, monthKey) {
        const days = Object.entries(allData)
          .filter(([date]) => date.startsWith(monthKey))
          .map(([, day]) => day)
          .sort((a, b) => (a.date < b.date ? -1 : 1));

        const el = document.getElementById(`summary-${id}`);
        const badge = document.getElementById(`badge-${id}`);

        if (days.length === 0) {
          if (el) el.innerHTML = '<div class="empty-msg">No trades this month.</div>';
          if (badge) badge.textContent = '0 days';
          return;
        }

        let totalTrades = 0;
        let winSL = 0,
          winNSL = 0,
          winTgt = 0;
        const dayPnlSL = [],
          dayPnlNSL = [],
          dayPnlTgt = [];
        const dayDates = [];

        for (const day of days) {
          let dSL = 0,
            dNSL = 0,
            dTgt = 0;
          for (const t of day.trades || []) {
            const tq = qty(day.instrument, t.lots);
            const pSL =
              t.exitSL !== null && t.entryPrice !== null ? (t.exitSL - t.entryPrice) * tq : null;
            const pNSL =
              t.exitNSL !== null && t.entryPrice !== null ? (t.exitNSL - t.entryPrice) * tq : null;
            const pTgt = t.tgtPts !== null ? t.tgtPts * tq : null;
            if (pSL !== null) {
              dSL += pSL;
              if (pSL > 0) winSL++;
            }
            if (pNSL !== null) {
              dNSL += pNSL;
              if (pNSL > 0) winNSL++;
            }
            if (pTgt !== null) {
              dTgt += pTgt;
              if (pTgt > 0) winTgt++;
            }
            totalTrades++;
          }
          dayPnlSL.push(Math.round(dSL));
          dayPnlNSL.push(Math.round(dNSL));
          dayPnlTgt.push(Math.round(dTgt));
          dayDates.push(day.date);
        }

        const netSL = dayPnlSL.reduce((a, b) => a + b, 0);
        const netNSL = dayPnlNSL.reduce((a, b) => a + b, 0);
        const netTgt = dayPnlTgt.reduce((a, b) => a + b, 0);

        const {
          maxDown: ddSL,
          maxUp: duSL,
          maxDownDate: ddSLDate,
          maxUpDate: duSLDate,
        } = calcMonthPeaks(dayPnlSL, dayDates);
        const {
          maxDown: ddNSL,
          maxUp: duNSL,
          maxDownDate: ddNSLDate,
          maxUpDate: duNSLDate,
        } = calcMonthPeaks(dayPnlNSL, dayDates);
        const {
          maxDown: ddTgt,
          maxUp: duTgt,
          maxDownDate: ddTgtDate,
          maxUpDate: duTgtDate,
        } = calcMonthPeaks(dayPnlTgt, dayDates);

        const wrSL = totalTrades ? Math.round((winSL / totalTrades) * 100) : 0;
        const wrNSL = totalTrades ? Math.round((winNSL / totalTrades) * 100) : 0;
        const wrTgt = totalTrades ? Math.round((winTgt / totalTrades) * 100) : 0;

        if (badge) badge.textContent = `${totalTrades} trades · ${days.length} day(s)`;

        if (!el) return;
        el.innerHTML = `
<div class="summary">
  <div class="scard">
    <div class="scard-lbl">Capital</div>
    <div class="scard-val c-white">${fmtCap(INITIAL_CAPITAL)}</div>
    <div class="scard-sub">Opening this month</div>
    <div style="margin-top:10px;">
      ${statRow('Trades', `${totalTrades}`, 'c-white', `${days.length} day(s)`)}
    </div>
  </div>
  <div class="scard">
    <div class="scard-lbl">Exit w/ SL</div>
    ${statRow('Net P&amp;L', fmtRs(netSL), pnlClass(netSL))}
    ${statRow('Net Capital', fmtCap(INITIAL_CAPITAL + netSL), pnlClass(netSL))}
    ${statRow('Win Rate', `${wrSL}%`, 'c-purple', `${winSL} of ${totalTrades}`)}
    ${statRow('Max Drawdown', ddSL < 0 ? fmtRs(ddSL) : '—', 'c-orange', ddSLDate ? fmtDateShort(ddSLDate) : '')}
    ${statRow('Max Run-Up', duSL > 0 ? fmtRs(duSL) : '—', 'c-green', duSLDate ? fmtDateShort(duSLDate) : '')}
  </div>
  <div class="scard">
    <div class="scard-lbl">Exit w/o SL</div>
    ${statRow('Net P&amp;L', fmtRs(netNSL), pnlClass(netNSL))}
    ${statRow('Net Capital', fmtCap(INITIAL_CAPITAL + netNSL), pnlClass(netNSL))}
    ${statRow('Win Rate', `${wrNSL}%`, 'c-purple', `${winNSL} of ${totalTrades}`)}
    ${statRow('Max Drawdown', ddNSL < 0 ? fmtRs(ddNSL) : '—', 'c-orange', ddNSLDate ? fmtDateShort(ddNSLDate) : '')}
    ${statRow('Max Run-Up', duNSL > 0 ? fmtRs(duNSL) : '—', 'c-green', duNSLDate ? fmtDateShort(duNSLDate) : '')}
  </div>
  <div class="scard">
    <div class="scard-lbl">Target Pts</div>
    ${statRow('Net P&amp;L', fmtRs(netTgt), pnlClass(netTgt))}
    ${statRow('Net Capital', fmtCap(INITIAL_CAPITAL + netTgt), pnlClass(netTgt))}
    ${statRow('Win Rate', `${wrTgt}%`, 'c-purple', `${winTgt} of ${totalTrades}`)}
    ${statRow('Max Drawdown', ddTgt < 0 ? fmtRs(ddTgt) : '—', 'c-orange', ddTgtDate ? fmtDateShort(ddTgtDate) : '')}
    ${statRow('Max Run-Up', duTgt > 0 ? fmtRs(duTgt) : '—', 'c-green', duTgtDate ? fmtDateShort(duTgtDate) : '')}
  </div>
</div>`;
      }

      function setActiveMonth(key) {
        activeMonth = key;
        document
          .querySelectorAll('.month-chip')
          .forEach((c) => c.classList.toggle('active', c.dataset.key === key));
        computeAndRender('1min', data1min, key);
        computeAndRender('3min', data3min, key);
        computeAndRender('bias', dataBias, key);
      }

      function buildMonthChips() {
        const months = new Set();
        for (const date of Object.keys(data1min)) months.add(date.slice(0, 7));
        for (const date of Object.keys(data3min)) months.add(date.slice(0, 7));
        for (const date of Object.keys(dataBias)) months.add(date.slice(0, 7));
        const allMonths = [...months].sort().reverse();
        const container = document.getElementById('month-chips');
        container.innerHTML = '';
        allMonths.forEach((key) => {
          const chip = document.createElement('button');
          chip.className = 'month-chip';
          chip.dataset.key = key;
          chip.textContent = monthLabel(key);
          chip.onclick = () => setActiveMonth(key);
          container.appendChild(chip);
        });
        if (allMonths.length > 0) {
          setActiveMonth(allMonths[0]);
        } else {
          document.getElementById('summary-1min').innerHTML =
            '<div class="empty-msg">No data yet.</div>';
          document.getElementById('summary-3min').innerHTML =
            '<div class="empty-msg">No data yet.</div>';
          document.getElementById('summary-bias').innerHTML =
            '<div class="empty-msg">No data yet.</div>';
        }
      }

      async function load() {
        try {
          const [d1, d3, db] = await Promise.all([
            fetch('/api/report/data').then((r) => r.json()),
            fetch('/api/3min-report/data').then((r) => r.json()),
            fetch('/api/bias-report/data').then((r) => r.json()),
          ]);
          data1min = d1;
          data3min = d3;
          dataBias = db;
          buildMonthChips();
        } catch (e) {
          document.getElementById('summary-1min').innerHTML =
            `<div class="empty-msg">Failed to load: ${e.message}</div>`;
          document.getElementById('summary-3min').innerHTML = '';
        }
      }

      load();
    </script>
  </body>
</html>
