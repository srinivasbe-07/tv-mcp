<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supertrend Trade Reports</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f1117;
        color: #d1d5db;
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: #1a1d27;
        border-bottom: 1px solid #2a2d3a;
        padding: 0 20px;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }
      .logo span {
        color: #a78bfa;
      }
      .nav-link {
        font-size: 11px;
        color: #6b7280;
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 5px;
        border: 1px solid #2a2d3a;
      }
      .nav-link:hover {
        color: #d1d5db;
        border-color: #4b5563;
      }
      .divider {
        width: 1px;
        height: 24px;
        background: #2a2d3a;
      }
      .hdr-title {
        font-size: 13px;
        font-weight: 700;
        color: #a78bfa;
      }
      .spacer {
        flex: 1;
      }

      /* ── Month tabs ── */
      .month-bar {
        display: flex;
        gap: 6px;
        padding: 16px 20px 0;
        flex-wrap: wrap;
      }
      .month-tab {
        padding: 7px 18px;
        border-radius: 8px 8px 0 0;
        border: 1px solid #2a2d3a;
        border-bottom: none;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #13151f;
        color: #6b7280;
        transition: all 0.15s;
      }
      .month-tab:hover {
        color: #d1d5db;
      }
      .month-tab.active {
        background: #1a1d27;
        color: #a78bfa;
        border-color: #3b3f55;
      }

      /* ── Month panel ── */
      .month-panel {
        display: none;
        padding: 0 20px 80px;
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-top: none;
        margin: 0 20px;
        border-radius: 0 8px 8px 8px;
      }
      .month-panel.active {
        display: block;
      }

      /* ── Summary grid ── */
      .summary {
        display: grid;
        grid-template-columns: 160px repeat(3, 1fr);
        gap: 12px;
        padding: 16px 0 20px;
      }
      .scard {
        background: #0f1117;
        border: 1px solid #2a2d3a;
        border-radius: 10px;
        padding: 12px 16px;
      }
      .scard-lbl {
        font-size: 10px;
        color: #6b7280;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .scard-val {
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .scard-sub {
        font-size: 10px;
        color: #6b7280;
        margin-top: 3px;
      }

      /* stat rows inside summary card */
      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 4px 0;
        border-bottom: 1px solid #1f2937;
      }
      .stat-row:last-child {
        border-bottom: none;
      }
      .stat-key {
        font-size: 10px;
        color: #6b7280;
        font-weight: 600;
      }
      .stat-val {
        font-size: 13px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .stat-sub {
        font-size: 9px;
        color: #4b5563;
        margin-top: 1px;
        text-align: right;
      }

      .c-green {
        color: #4ade80;
      }
      .c-red {
        color: #f87171;
      }
      .c-yellow {
        color: #facc15;
      }
      .c-purple {
        color: #a78bfa;
      }
      .c-white {
        color: #f9fafb;
      }
      .c-gray {
        color: #6b7280;
      }
      .c-orange {
        color: #fb923c;
      }

      /* ── Day accordion ── */
      .day-block {
        margin-bottom: 10px;
      }
      .day-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        background: #0f1117;
        border: 1px solid #2a2d3a;
        border-radius: 8px;
        cursor: pointer;
        user-select: none;
        transition: border-color 0.15s;
      }
      .day-header:hover {
        border-color: #4b5563;
      }
      .day-header.open {
        border-radius: 8px 8px 0 0;
        border-color: #3b3f55;
      }
      .day-chevron {
        font-size: 10px;
        color: #6b7280;
        transition: transform 0.2s;
      }
      .day-header.open .day-chevron {
        transform: rotate(90deg);
      }
      .day-date {
        font-size: 13px;
        font-weight: 700;
        color: #e5e7eb;
      }
      .day-badge {
        font-size: 10px;
        color: #6b7280;
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 4px;
        padding: 2px 7px;
      }
      .day-pnl {
        font-size: 12px;
        font-weight: 700;
        margin-left: auto;
      }

      .day-body {
        display: none;
        border: 1px solid #3b3f55;
        border-top: none;
        border-radius: 0 0 8px 8px;
        overflow: hidden;
      }
      .day-body.open {
        display: block;
      }

      /* ── Trade table ── */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        background: #13151f;
        font-size: 10px;
        font-weight: 700;
        color: #6b7280;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        padding: 8px 10px;
        text-align: right;
        border-bottom: 1px solid #2a2d3a;
        white-space: nowrap;
      }
      thead th:first-child {
        text-align: left;
      }

      tbody tr {
        border-bottom: 1px solid #1f2937;
        transition: background 0.1s;
      }
      tbody tr:hover {
        background: #1a1d27;
      }
      tbody td {
        padding: 8px 10px;
        font-size: 12px;
        text-align: right;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      tbody td:first-child {
        text-align: left;
      }

      .side-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
      }
      .side-ce {
        background: #052e16;
        color: #4ade80;
      }
      .side-pe {
        background: #450a0a;
        color: #fca5a5;
      }
      .sym-text {
        font-size: 11px;
        color: #9ca3af;
        font-family: 'Consolas', monospace;
      }

      /* day total row */
      .total-row td {
        background: #13151f;
        font-weight: 700;
        font-size: 11px;
        color: #9ca3af;
        border-top: 1px solid #374151;
        padding: 9px 10px;
      }
      .total-row td:first-child {
        color: #6b7280;
        text-align: left;
      }

      /* ── Instrument filter buttons ── */
      .filter-bar {
        display: flex;
        gap: 6px;
        padding: 14px 0 0;
        align-items: center;
      }
      .filter-btn {
        padding: 4px 14px;
        border-radius: 6px;
        border: 1px solid #2a2d3a;
        background: #13151f;
        color: #6b7280;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
      }
      .filter-btn:hover {
        border-color: #4b5563;
        color: #d1d5db;
      }
      .filter-btn.active {
        background: #1e1b4b;
        border-color: #6d28d9;
        color: #a78bfa;
      }
      .filter-btn.nifty.active {
        background: #052e16;
        border-color: #166534;
        color: #4ade80;
      }
      .filter-btn.sensex.active {
        background: #1e3a5f;
        border-color: #1d4ed8;
        color: #93c5fd;
      }

      /* ── Time ranges ── */
      .time-section {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 10px 0 4px;
        flex-wrap: wrap;
      }
      .time-section-label {
        font-size: 10px;
        color: #6b7280;
        font-weight: 700;
        padding-top: 5px;
        white-space: nowrap;
      }
      .time-ranges {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .time-range-row {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #13151f;
        border: 1px solid #2a2d3a;
        border-radius: 6px;
        padding: 3px 8px;
      }
      .time-range-row.active {
        border-color: #6d28d9;
        background: #1e1b4b;
      }
      .time-input {
        background: transparent;
        border: none;
        color: #d1d5db;
        font-size: 11px;
        font-weight: 600;
        width: 76px;
        outline: none;
        cursor: pointer;
      }
      .time-sep {
        font-size: 10px;
        color: #4b5563;
      }
      .time-del-btn {
        background: none;
        border: none;
        color: #4b5563;
        font-size: 12px;
        cursor: pointer;
        padding: 0 2px;
        line-height: 1;
      }
      .time-del-btn:hover {
        color: #f87171;
      }
      .add-range-btn {
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px dashed #374151;
        background: none;
        color: #6b7280;
        font-size: 10px;
        font-weight: 700;
        cursor: pointer;
      }
      .add-range-btn:hover {
        border-color: #6d28d9;
        color: #a78bfa;
      }
      .time-clear-all {
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid #374151;
        background: none;
        color: #6b7280;
        font-size: 10px;
        font-weight: 700;
        cursor: pointer;
      }
      .time-clear-all:hover {
        border-color: #f87171;
        color: #f87171;
      }

      /* note filter chips */
      .note-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: 6px;
        border: 1px solid #2a2d3a;
        background: #13151f;
        font-size: 10px;
        font-weight: 700;
        color: #6b7280;
        cursor: pointer;
        user-select: none;
      }
      .note-chip input[type='checkbox'] {
        accent-color: #a78bfa;
        cursor: pointer;
      }
      .note-chip.active {
        border-color: #6d28d9;
        background: #1e1b4b;
        color: #a78bfa;
      }
      .reach-input {
        background: #13151f;
        border: 1px solid #2a2d3a;
        color: #d1d5db;
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 11px;
        font-weight: 600;
        width: 64px;
        outline: none;
      }
      .reach-input:focus {
        border-color: #6d28d9;
      }
      .date-filter-select {
        background: #13151f;
        border: 1px solid #2a2d3a;
        color: #d1d5db;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 600;
        outline: none;
        cursor: pointer;
      }
      .date-filter-select:focus {
        border-color: #6d28d9;
      }
      .date-filter-select option {
        background: #1a1d27;
      }
      .reach-label {
        font-size: 10px;
        color: #6b7280;
        font-weight: 700;
      }
      .notes-cell {
        font-size: 10px;
        color: #9ca3af;
        max-width: 160px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .notes-cell.sl-hit {
        color: #f87171;
      }
      .notes-cell.pine-sl {
        color: #fb923c;
      }

      /* action buttons */
      .act-btn {
        background: none;
        border: 1px solid #2a2d3a;
        color: #6b7280;
        border-radius: 4px;
        padding: 3px 7px;
        font-size: 10px;
        cursor: pointer;
        transition: all 0.15s;
        margin-left: 3px;
      }
      .act-btn:hover {
        border-color: #4b5563;
        color: #d1d5db;
      }
      .act-btn.save {
        border-color: #166534;
        color: #4ade80;
      }
      .act-btn.save:hover {
        background: #052e16;
      }
      .act-btn.cancel {
        border-color: #7f1d1d;
        color: #f87171;
      }
      .act-btn.cancel:hover {
        background: #450a0a;
      }
      .act-btn.del {
        border-color: #7f1d1d;
        color: #f87171;
      }

      /* editable inputs */
      .edit-input {
        background: #0f1117;
        border: 1px solid #3b3f55;
        color: #e5e7eb;
        border-radius: 4px;
        padding: 3px 6px;
        font-size: 11px;
        width: 72px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .edit-input.wide {
        width: 120px;
      }
      .edit-input.sm {
        width: 52px;
      }
      .edit-input.reach-pts {
        width: 52px;
        margin-left: 4px;
        text-align: left;
      }
      .edit-select {
        background: #0f1117;
        border: 1px solid #3b3f55;
        color: #e5e7eb;
        border-radius: 4px;
        padding: 3px 4px;
        font-size: 11px;
        cursor: pointer;
        max-width: 130px;
      }

      /* add row button between rows */
      .add-row-tr {
        opacity: 0;
        transition: opacity 0.15s;
      }
      tbody:hover .add-row-tr {
        opacity: 1;
      }
      .add-row-tr td {
        padding: 0;
        height: 6px;
        position: relative;
      }
      .add-row-btn {
        position: absolute;
        left: 50%;
        top: -8px;
        transform: translateX(-50%);
        background: #1e3a5f;
        border: 1px solid #1d4ed8;
        color: #93c5fd;
        border-radius: 10px;
        padding: 1px 10px;
        font-size: 10px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
        z-index: 5;
      }
      .add-row-btn:hover {
        background: #1d4ed8;
        color: #fff;
      }

      /* ── Save bar ── */
      #save-bar {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1a1d27;
        border-top: 1px solid #2a2d3a;
        padding: 12px 24px;
        align-items: center;
        gap: 12px;
        z-index: 200;
      }
      .save-bar-msg {
        font-size: 12px;
        color: #facc15;
      }
      .save-bar-spacer {
        flex: 1;
      }
      .save-bar-btn {
        padding: 8px 22px;
        border-radius: 7px;
        border: none;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .save-bar-btn.primary {
        background: #4c1d95;
        color: #e9d5ff;
      }
      .save-bar-btn.primary:hover {
        background: #5b21b6;
      }
      .save-bar-btn.secondary {
        background: #374151;
        color: #d1d5db;
      }

      /* ── Download button ── */
      .dl-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 14px;
        background: #052e16;
        border: 1px solid #166534;
        color: #4ade80;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
      }
      .dl-btn:hover {
        background: #14532d;
        border-color: #22c55e;
      }

      /* ── Empty / loading ── */
      .empty-msg {
        text-align: center;
        padding: 60px;
        color: #374151;
        font-size: 14px;
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2d3a;
        border-radius: 2px;
      }

      /* ── Strategy tabs ── */
      .strategy-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px 0;
        border-bottom: 1px solid #2a2d3a;
        background: #1a1d27;
      }
      .strat-tab {
        padding: 7px 22px;
        border-radius: 8px 8px 0 0;
        border: 1px solid #2a2d3a;
        border-bottom: none;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        background: #0f1117;
        color: #6b7280;
        transition: all 0.15s;
        margin-bottom: -1px;
      }
      .strat-tab.active {
        background: #1a1d27;
        color: #a78bfa;
        border-color: #4b5563;
        border-bottom-color: #1a1d27;
      }
      .strat-tab:hover:not(.active) {
        color: #d1d5db;
        border-color: #3b3f55;
      }

      /* ── Consolidated summary strip ── */
      .consolidated-strip {
        display: flex;
        align-items: center;
        gap: 0;
        padding: 10px 20px;
        background: #12141e;
        border-bottom: 1px solid #2a2d3a;
        flex-wrap: wrap;
        gap: 6px;
      }
      .cs-label {
        font-size: 10px;
        font-weight: 700;
        color: #6b7280;
        text-transform: uppercase;
        margin-right: 10px;
      }
      .cs-card {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 6px;
        padding: 5px 12px;
        font-size: 11px;
      }
      .cs-card-lbl {
        color: #6b7280;
        font-weight: 600;
      }
      .cs-card-val {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .cs-divider {
        width: 1px;
        height: 20px;
        background: #2a2d3a;
        margin: 0 4px;
      }

      /* ── New Day button (3min) ── */
      .new-day-btn {
        background: #1e3a5f;
        border: 1px solid #1d4ed8;
        color: #93c5fd;
        border-radius: 6px;
        padding: 5px 14px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        margin-left: auto;
      }
      .new-day-btn:hover { background: #1d4ed8; color: #fff; }
      .new-day-form {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: #12141e;
        border-bottom: 1px solid #2a2d3a;
      }
      .new-day-form label { font-size: 11px; color: #9ca3af; }
      .new-day-form input[type=date], .new-day-form select {
        background: #0f1117;
        border: 1px solid #3b3f55;
        color: #e5e7eb;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 11px;
        cursor: pointer;
      }
      .new-day-form .go-btn {
        background: #16a34a;
        border: none;
        color: #fff;
        border-radius: 5px;
        padding: 5px 14px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }
      .new-day-form .go-btn:hover { background: #15803d; }
      .new-day-form .cancel-btn {
        background: transparent;
        border: 1px solid #4b5563;
        color: #9ca3af;
        border-radius: 5px;
        padding: 5px 10px;
        font-size: 11px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Supertrend<span>Monitor</span></div>
      <a class="nav-link" href="/">← Dashboard</a>
      <a class="nav-link" href="/supertrend">← Supertrend</a>
      <div class="divider"></div>
      <div class="hdr-title">&#x1F4CA; Trade Reports</div>
      <div class="spacer"></div>
    </header>

    <!-- Strategy tabs -->
    <div class="strategy-bar">
      <button class="strat-tab active" id="stab-1min" onclick="switchStrategy('1min')">1 Min</button>
      <button class="strat-tab"        id="stab-3min" onclick="switchStrategy('3min')">3 Min</button>
    </div>

    <!-- Consolidated summary strip -->
    <div class="consolidated-strip" id="consolidated-strip">
      <span class="cs-label">This Month</span>
      <div class="cs-card">
        <span class="cs-card-lbl">1 Min</span>
        <span class="cs-card-val" id="cs-1min">—</span>
      </div>
      <div class="cs-divider"></div>
      <div class="cs-card">
        <span class="cs-card-lbl">3 Min</span>
        <span class="cs-card-val" id="cs-3min">—</span>
      </div>
      <div class="cs-divider"></div>
      <div class="cs-card">
        <span class="cs-card-lbl">Combined</span>
        <span class="cs-card-val" id="cs-combined">—</span>
      </div>
    </div>

    <!-- New Day form (3min only) -->
    <div class="new-day-form" id="new-day-form" style="display:none">
      <label>Date</label>
      <input type="date" id="new-day-date">
      <label>Instrument</label>
      <select id="new-day-instr">
        <option value="NIFTY">NIFTY</option>
        <option value="SENSEX">SENSEX</option>
      </select>
      <button class="go-btn" onclick="createNewDay()">+ Create</button>
      <button class="cancel-btn" onclick="hideNewDayForm()">Cancel</button>
    </div>

    <!-- Add Trade Day button (3min only) — lives outside month-bar so renderPage() never wipes it -->
    <div id="new-day-btn-wrap" style="display:none;padding:12px 20px 0;">
      <button class="new-day-btn" onclick="showNewDayForm()">+ Add Trade Day</button>
    </div>

    <div id="month-bar" class="month-bar"></div>
    <div id="panels-container"></div>

    <div id="save-bar" style="display: none"></div>

    <script>
      // ── Constants ────────────────────────────────────────────────────────────────
      const LOT_SIZES = { NIFTY: 65, SENSEX: 20 };
      const SL_PTS = { NIFTY: 15, SENSEX: 35 };
      const TGT_G = { NIFTY: 50, SENSEX: 100 };
      const TGT_L = { NIFTY: 31, SENSEX: 70 };
      const INITIAL_CAPITAL = 200000; // ₹2,00,000

      // ── State ────────────────────────────────────────────────────────────────────
      let allData = {}; // active strategy's data
      let allData1min = {};
      let allData3min = {};
      let activeStrategy = '1min';
      let nextId = 1000;
      let activeMonth = null;
      let monthFilters = {};
      let monthTimeFilters = {};
      let monthNoteFilters = {};
      let monthReachFilter = {};
      let monthDateFilter = {};

      function apiDataUrl()  { return activeStrategy === '3min' ? '/api/3min-report/data'  : '/api/report/data'; }
      function apiSaveUrl()  { return activeStrategy === '3min' ? '/api/3min-report/save'  : '/api/report/save'; }

      // ── Load data ─────────────────────────────────────────────────────────────────
      async function loadData() {
        try {
          const [r1, r3] = await Promise.all([
            fetch('/api/report/data').then(r => r.json()),
            fetch('/api/3min-report/data').then(r => r.json()),
          ]);
          allData1min = r1;
          allData3min = r3;
          for (const store of [allData1min, allData3min]) {
            for (const day of Object.values(store)) {
              for (const t of day.trades || []) {
                if (t.id == null) t.id = nextId++;
              }
            }
          }
          allData = activeStrategy === '3min' ? allData3min : allData1min;
          renderConsolidatedSummary();
          renderPage();
        } catch (e) {
          document.getElementById('panels-container').innerHTML =
            `<div class="empty-msg">Failed to load report data: ${e.message}</div>`;
        }
      }

      // ── Strategy switch ───────────────────────────────────────────────────────────
      function switchStrategy(s) {
        activeStrategy = s;
        allData = s === '3min' ? allData3min : allData1min;
        document.getElementById('stab-1min').classList.toggle('active', s === '1min');
        document.getElementById('stab-3min').classList.toggle('active', s === '3min');
        document.getElementById('new-day-btn-wrap').style.display = s === '3min' ? 'block' : 'none';
        hideNewDayForm();
        activeMonth = null;
        monthFilters = {};
        monthTimeFilters = {};
        monthNoteFilters = {};
        monthReachFilter = {};
        monthDateFilter = {};
        renderPage();
      }

      // ── Consolidated summary strip ────────────────────────────────────────────────
      function calcNetPnl(store) {
        const now = new Date();
        const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        let net = 0;
        for (const day of Object.values(store)) {
          if (!day.date || !day.date.startsWith(curMonth)) continue;
          for (const t of day.trades || []) {
            if (t.tgtPts !== null && t.tgtPts !== undefined) {
              const tq = qty(day.instrument, t.lots);
              net += t.tgtPts * tq;
            }
          }
        }
        return Math.round(net);
      }

      function renderConsolidatedSummary() {
        const n1 = calcNetPnl(allData1min);
        const n3 = calcNetPnl(allData3min);
        const nc = n1 + n3;
        const fmt = (v) => {
          const s = v >= 0 ? '+' : '';
          const color = v >= 0 ? '#4ade80' : '#f87171';
          return `<span style="color:${color}">${s}${fmtRs(v)}</span>`;
        };
        document.getElementById('cs-1min').innerHTML = fmt(n1);
        document.getElementById('cs-3min').innerHTML = fmt(n3);
        document.getElementById('cs-combined').innerHTML = fmt(nc);
      }

      // ── Working day helpers ───────────────────────────────────────────────────────
      const NSE_HOLIDAYS = new Set([
        '2026-01-15','2026-01-26','2026-03-03','2026-03-26','2026-03-31',
        '2026-04-03','2026-04-14','2026-05-01','2026-05-28','2026-06-26',
        '2026-09-14','2026-10-02','2026-10-20','2026-11-10','2026-11-24','2026-12-25',
      ]);

      function isWorkingDay(ds) {
        const day = new Date(ds + 'T00:00:00Z').getUTCDay();
        return day !== 0 && day !== 6 && !NSE_HOLIDAYS.has(ds);
      }

      function nextWorkingDay(fromDs) {
        const d = new Date(fromDs + 'T00:00:00Z');
        d.setUTCDate(d.getUTCDate() + 1);
        while (true) {
          const ds = d.toISOString().slice(0, 10);
          if (isWorkingDay(ds)) return ds;
          d.setUTCDate(d.getUTCDate() + 1);
        }
      }

      function instrForDate(ds) {
        const day = new Date(ds + 'T00:00:00Z').getUTCDay();
        return (day === 3 || day === 4) ? 'SENSEX' : 'NIFTY'; // Wed/Thu = SENSEX
      }

      // ── New Day (3min) ────────────────────────────────────────────────────────────
      function showNewDayForm() {
        // Start from latest existing 3-min date, or yesterday if no data yet
        const dates = Object.keys(allData3min).sort();
        let base;
        if (dates.length > 0) {
          base = dates[dates.length - 1];
        } else {
          const y = new Date(); y.setDate(y.getDate() - 1);
          base = y.toISOString().slice(0, 10);
        }
        const next = nextWorkingDay(base);
        const instr = instrForDate(next);
        document.getElementById('new-day-date').value = next;
        document.getElementById('new-day-instr').value = instr;
        document.getElementById('new-day-form').style.display = 'flex';
      }
      function hideNewDayForm() {
        document.getElementById('new-day-form').style.display = 'none';
      }
      async function createNewDay() {
        const date = document.getElementById('new-day-date').value;
        const instr = document.getElementById('new-day-instr').value;
        if (!date) return;
        if (allData[date]) {
          hideNewDayForm();
          const [y, m] = date.split('-');
          switchMonth(`${y}-${m}`);
          return;
        }
        allData[date] = { date, instrument: instr, trades: [] };
        await persistDay(date);
        hideNewDayForm();
        activeMonth = null;
        renderPage();
        const [y, m] = date.split('-');
        switchMonth(`${y}-${m}`);
      }

      // ── Group dates by month ──────────────────────────────────────────────────────
      function groupByMonth() {
        const months = {};
        for (const date of Object.keys(allData).sort().reverse()) {
          const [y, m] = date.split('-');
          const key = `${y}-${m}`;
          if (!months[key]) months[key] = [];
          months[key].push(date);
        }
        return months;
      }

      const MONTH_NAMES = [
        'Jan',
        'Feb',
        'Mar',
        'Apr',
        'May',
        'Jun',
        'Jul',
        'Aug',
        'Sep',
        'Oct',
        'Nov',
        'Dec',
      ];
      function monthLabel(key) {
        const [y, m] = key.split('-');
        return `${MONTH_NAMES[parseInt(m) - 1]} ${y}`;
      }

      // ── Render full page ──────────────────────────────────────────────────────────
      function renderPage() {
        const months = groupByMonth();
        const keys = Object.keys(months);

        const bar = document.getElementById('month-bar');
        const con = document.getElementById('panels-container');
        bar.innerHTML = '';
        con.innerHTML = '';

        if (keys.length === 0) {
          con.innerHTML =
            '<div class="empty-msg">No trade records found. Run "Generate Report" after market close.</div>';
          return;
        }

        if (!activeMonth || !months[activeMonth]) activeMonth = keys[0];

        keys.forEach((key) => {
          const tab = document.createElement('div');
          tab.className = 'month-tab' + (key === activeMonth ? ' active' : '');
          tab.textContent = monthLabel(key);
          tab.onclick = () => switchMonth(key);
          bar.appendChild(tab);

          const panel = document.createElement('div');
          panel.className = 'month-panel' + (key === activeMonth ? ' active' : '');
          panel.id = `panel-${key}`;
          panel.innerHTML = buildMonthHTML(key, months[key]);
          con.appendChild(panel);
        });
      }

      // ── Build month panel HTML ────────────────────────────────────────────────────
      function buildMonthHTML(monthKey, dates) {
        const tradeDays = dates.map((d) => allData[d]).filter(Boolean);
        if (!monthFilters[monthKey]) monthFilters[monthKey] = 'ALL';

        return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0 0;flex-wrap:wrap;gap:8px;">
      <div style="flex:1;min-width:0;">
        <div class="filter-bar" style="flex-wrap:wrap;gap:6px;">
          <span style="font-size:10px;color:#6b7280;font-weight:700;margin-right:2px;">INSTRUMENT</span>
          <button class="filter-btn active"  id="fb-${monthKey}-ALL"    onclick="applyFilter('${monthKey}','ALL')">All</button>
          <button class="filter-btn nifty"   id="fb-${monthKey}-NIFTY"  onclick="applyFilter('${monthKey}','NIFTY')">NIFTY</button>
          <button class="filter-btn sensex"  id="fb-${monthKey}-SENSEX" onclick="applyFilter('${monthKey}','SENSEX')">SENSEX</button>
          <span style="font-size:10px;color:#6b7280;font-weight:700;margin-left:12px;">DATE</span>
          <select class="date-filter-select" id="df-${monthKey}" onchange="applyDateFilter('${monthKey}', this.value)">
            <option value="">All dates</option>
            ${dates
              .filter((d) => (allData[d]?.trades || []).length > 0)
              .map((d) => {
                const parts = d.split('-');
                const dateObj = new Date(d + 'T00:00:00');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                const mon = MONTH_NAMES[dateObj.getMonth()];
                return `<option value="${d}">${dd} ${mon}</option>`;
              })
              .join('')}
          </select>
        </div>
        <div class="time-section">
          <span class="time-section-label">TIME RANGES</span>
          <div class="time-ranges" id="tf-ranges-${monthKey}"></div>
          <button class="add-range-btn" onclick="addTimeRange('${monthKey}')">+ Add Range</button>
          <button class="add-range-btn" id="tf-apply-${monthKey}" style="display:none"
                  onclick="applyTimeRanges('${monthKey}')">&#x25BA; Apply</button>
          <button class="time-clear-all" id="tf-clear-${monthKey}" style="display:none"
                  onclick="clearAllRanges('${monthKey}')">&#x2715; Clear All</button>
        </div>
        <div class="time-section">
          <span class="time-section-label">NOTES</span>
          <label class="note-chip" id="nc-${monthKey}-sl">
            <input type="checkbox" id="nc-cb-${monthKey}-sl"> SL HIT
          </label>
          <label class="note-chip" id="nc-${monthKey}-pine">
            <input type="checkbox" id="nc-cb-${monthKey}-pine"> PINE SCRIPT SL
          </label>
          <span class="reach-label" style="margin-left:8px;">REACH &ge;</span>
          <input type="number" class="reach-input" id="rf-${monthKey}" min="0" step="1" placeholder="pts">
          <button class="add-range-btn" onclick="applyNotesFilter('${monthKey}')">&#x25BA; Apply</button>
          <button class="time-clear-all" id="nf-clear-${monthKey}" onclick="clearNotesFilter('${monthKey}')">&#x2715; Clear</button>
        </div>
      </div>
      <button class="dl-btn" onclick="downloadExcel('${monthKey}')">&#x2B07; Download Excel</button>
    </div>
    <div id="summary-${monthKey}"></div>
    <div id="days-${monthKey}">
      ${tradeDays.map((d) => buildDayBlock(d)).join('')}
    </div>`;
      }

      // Rebuild summary for the given month key
      function renderSummary(monthKey) {
        const filter = monthFilters[monthKey] || 'ALL';
        const months = groupByMonth();
        const selectedDate = monthDateFilter[monthKey] || null;
        const dates = (months[monthKey] || [])
          .map((d) => allData[d])
          .filter(Boolean)
          .filter((d) => {
            const instrOk = filter === 'ALL' || (d.instrument || '').toUpperCase() === filter;
            const dateOk = !selectedDate || d.date === selectedDate;
            return instrOk && dateOk;
          });
        const el = document.getElementById(`summary-${monthKey}`);
        if (!el) return;

        if (dates.length === 0) {
          el.innerHTML = '';
          return;
        }

        // Collect per-day P&Ls for each type (for max drawdown)
        const dayPnl = { sl: [], nsl: [], tgt: [] };
        let totalTrades = 0;
        let winSL = 0,
          winNSL = 0,
          winTgt = 0;

        const dayDates = [];
        for (const day of dates.sort((a, b) => (a.date < b.date ? -1 : 1))) {
          let dSL = 0,
            dNSL = 0,
            dTgt = 0;
          const filteredTrades = (day.trades || []).filter((t) => tradePassesFilters(t, monthKey));
          for (const t of filteredTrades) {
            const tq = qty(day.instrument, t.lots);
            if (t.exitSL !== null && t.entryPrice !== null) {
              dSL += (t.exitSL - t.entryPrice) * tq;
            }
            if (t.exitNSL !== null && t.entryPrice !== null) {
              dNSL += (t.exitNSL - t.entryPrice) * tq;
            }
            if (t.tgtPts !== null) {
              dTgt += t.tgtPts * tq;
            }
            totalTrades++;
            if (t.exitSL !== null && t.entryPrice !== null && t.exitSL - t.entryPrice > 0) winSL++;
            if (t.exitNSL !== null && t.entryPrice !== null && t.exitNSL - t.entryPrice > 0)
              winNSL++;
            if (t.tgtPts !== null && t.tgtPts > 0) winTgt++;
          }
          dayPnl.sl.push(Math.round(dSL));
          dayPnl.nsl.push(Math.round(dNSL));
          dayPnl.tgt.push(Math.round(dTgt));
          dayDates.push(day.date);
        }

        const netSL = dayPnl.sl.reduce((a, b) => a + b, 0);
        const netNSL = dayPnl.nsl.reduce((a, b) => a + b, 0);
        const netTgt = dayPnl.tgt.reduce((a, b) => a + b, 0);

        const {
          maxDown: ddSL,
          maxUp: duSL,
          maxDownDate: ddSLDate,
          maxUpDate: duSLDate,
        } = calcMonthPeaks(dayPnl.sl, dayDates);
        const {
          maxDown: ddNSL,
          maxUp: duNSL,
          maxDownDate: ddNSLDate,
          maxUpDate: duNSLDate,
        } = calcMonthPeaks(dayPnl.nsl, dayDates);
        const {
          maxDown: ddTgt,
          maxUp: duTgt,
          maxDownDate: ddTgtDate,
          maxUpDate: duTgtDate,
        } = calcMonthPeaks(dayPnl.tgt, dayDates);

        const wrSL = totalTrades ? Math.round((winSL / totalTrades) * 100) : 0;
        const wrNSL = totalTrades ? Math.round((winNSL / totalTrades) * 100) : 0;
        const wrTgt = totalTrades ? Math.round((winTgt / totalTrades) * 100) : 0;

        const capSL = INITIAL_CAPITAL + netSL;
        const capNSL = INITIAL_CAPITAL + netNSL;
        const capTgt = INITIAL_CAPITAL + netTgt;

        el.innerHTML = `
    <div class="summary">
      <div class="scard">
        <div class="scard-lbl">Capital</div>
        <div class="scard-val c-white">${fmtCapital(INITIAL_CAPITAL)}</div>
        <div class="scard-sub">Opening this month</div>
        <div style="margin-top:10px;">
          ${statRow('Trades', `${totalTrades}`, 'c-white', `${dates.length} day(s)`)}
        </div>
      </div>
      <div class="scard">
        <div class="scard-lbl">Exit w/ SL</div>
        ${statRow('Net P&amp;L', fmtRs(netSL), pnlClass(netSL))}
        ${statRow('Net Capital', fmtCapital(capSL), pnlClass(capSL - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrSL}%`, 'c-purple', `${winSL} of ${totalTrades}`)}
        ${statRow('Max Drawdown', ddSL < 0 ? `${fmtRs(ddSL)}` : '—', 'c-orange', ddSLDate ? fmtDateShort(ddSLDate) : '')}
        ${statRow('Max Run-Up', duSL > 0 ? `${fmtRs(duSL)}` : '—', 'c-green', duSLDate ? fmtDateShort(duSLDate) : '')}
      </div>
      <div class="scard">
        <div class="scard-lbl">Exit w/o SL</div>
        ${statRow('Net P&amp;L', fmtRs(netNSL), pnlClass(netNSL))}
        ${statRow('Net Capital', fmtCapital(capNSL), pnlClass(capNSL - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrNSL}%`, 'c-purple', `${winNSL} of ${totalTrades}`)}
        ${statRow('Max Drawdown', ddNSL < 0 ? `${fmtRs(ddNSL)}` : '—', 'c-orange', ddNSLDate ? fmtDateShort(ddNSLDate) : '')}
        ${statRow('Max Run-Up', duNSL > 0 ? `${fmtRs(duNSL)}` : '—', 'c-green', duNSLDate ? fmtDateShort(duNSLDate) : '')}
      </div>
      <div class="scard">
        <div class="scard-lbl">Target Pts</div>
        ${statRow('Net P&amp;L', fmtRs(netTgt), pnlClass(netTgt))}
        ${statRow('Net Capital', fmtCapital(capTgt), pnlClass(capTgt - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrTgt}%`, 'c-purple', `${winTgt} of ${totalTrades}`)}
        ${statRow('Max Drawdown', ddTgt < 0 ? `${fmtRs(ddTgt)}` : '—', 'c-orange', ddTgtDate ? fmtDateShort(ddTgtDate) : '')}
        ${statRow('Max Run-Up', duTgt > 0 ? `${fmtRs(duTgt)}` : '—', 'c-green', duTgtDate ? fmtDateShort(duTgtDate) : '')}
      </div>
    </div>`;
      }

      function statRow(key, val, cls, sub = '') {
        return `<div class="stat-row">
    <span class="stat-key">${key}</span>
    <div>
      <div class="stat-val ${cls}">${val}</div>
      ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
    </div>
  </div>`;
      }

      // ── Build day block HTML ──────────────────────────────────────────────────────
      function buildDayBlock(day) {
        const dayKey = day.date.replace(/-/g, '');
        const dateObj = new Date(day.date + 'T00:00:00');
        const weekDay = [
          'Sunday',
          'Monday',
          'Tuesday',
          'Wednesday',
          'Thursday',
          'Friday',
          'Saturday',
        ][dateObj.getDay()];
        const dd = String(dateObj.getDate()).padStart(2, '0');
        const mon = MONTH_NAMES[dateObj.getMonth()];
        const dateLabel = `${dd} ${mon} ${dateObj.getFullYear()} — ${weekDay}`;

        return `
    <div class="day-block" id="dayblock-${dayKey}" data-instrument="${(day.instrument || '').toUpperCase()}" data-date="${day.date}">
      <div class="day-header open" onclick="toggleDay(this)">
        <span class="day-chevron">&#x25BA;</span>
        <span class="day-date">${dateLabel}</span>
        <span class="day-badge">${day.instrument || ''}</span>
        <span class="day-badge">${(day.trades || []).length} trade(s)</span>
        <span class="day-pnl" id="day-pnl-${dayKey}"></span>
      </div>
      <div class="day-body open">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th style="text-align:left">Symbol</th>
              <th>Lots</th>
              <th>Entry</th>
              <th>Exit w/SL</th>
              <th>Exit w/Tgt</th>
              <th>Exit w/oSL</th>
              <th>Tgt Pts</th>
              <th style="text-align:left">Notes</th>
              <th>P&amp;L w/SL &#x20B9;</th>
              <th>P&amp;L w/Tgt &#x20B9;</th>
              <th>P&amp;L w/oSL &#x20B9;</th>
              <th style="text-align:center">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody-${dayKey}"></tbody>
        </table>
      </div>
    </div>`;
      }

      // ── Render day tbody + header P&L ─────────────────────────────────────────────
      function renderDay(dateStr) {
        const day = allData[dateStr];
        const dayKey = dateStr.replace(/-/g, '');
        const tbody = document.getElementById(`tbody-${dayKey}`);
        if (!tbody || !day) return;
        // Keep trades sorted by entry time at all times
        (day.trades || []).sort((a, b) =>
          (a.entryTime || a.time || '').localeCompare(b.entryTime || b.time || '')
        );
        tbody.innerHTML = '';

        const monthKey = dateStr.slice(0, 7);
        const trades = (day.trades || []).filter((t) => tradePassesFilters(t, monthKey));

        let totSL = 0,
          totNSL = 0,
          totTgt = 0;
        const seriesSL = [],
          seriesNSL = [],
          seriesTgt = [];

        trades.forEach((t, idx) => {
          const tq = qty(day.instrument, t.lots);
          const pSL =
            t.exitSL !== null && t.entryPrice !== null
              ? Math.round((t.exitSL - t.entryPrice) * tq)
              : null;
          const pTgt = t.tgtPts !== null ? Math.round(t.tgtPts * tq) : null;
          const pNSL =
            t.exitNSL !== null && t.entryPrice !== null
              ? Math.round((t.exitNSL - t.entryPrice) * tq)
              : null;
          if (pSL !== null) {
            totSL += pSL;
            seriesSL.push(pSL);
          }
          if (pTgt !== null) {
            totTgt += pTgt;
            seriesTgt.push(pTgt);
          }
          if (pNSL !== null) {
            totNSL += pNSL;
            seriesNSL.push(pNSL);
          }

          // Add-row button before this row
          const addTr = document.createElement('tr');
          addTr.className = 'add-row-tr';
          addTr.innerHTML = `<td colspan="13" style="position:relative;height:6px;">
      <button class="add-row-btn" onclick="insertRow('${dateStr}', ${idx})">+ Add Row Here</button>
    </td>`;
          tbody.appendChild(addTr);

          const tr = document.createElement('tr');
          tr.dataset.id = t.id;
          tr.innerHTML = `
      <td>${(t.entryTime || t.time || '').slice(0, 5)}</td>
      <td class="sym-text">${t.entrySymbol || '—'}</td>
      <td>${t.lots}</td>
      <td>${fmt(t.entryPrice)}</td>
      <td>${fmt(t.exitSL)}</td>
      <td>${fmt(t.entryPrice !== null ? parseFloat((t.entryPrice + (TGT_L[day.instrument] || 31)).toFixed(2)) : null)}</td>
      <td>${fmt(t.exitNSL)}</td>
      <td class="${pnlClass(t.tgtPts)}">${t.tgtPts !== null && t.tgtPts !== undefined ? fmtPts(t.tgtPts) : '—'}</td>
      <td class="notes-cell ${notesClass(t.notes)}" title="${t.notes || ''}">${t.notes || '—'}</td>
      <td class="${pnlClass(pSL)}">${pSL !== null ? fmtRs(pSL) : '—'}</td>
      <td class="${pnlClass(pTgt)}">${pTgt !== null ? fmtRs(pTgt) : '—'}</td>
      <td class="${pnlClass(pNSL)}">${pNSL !== null ? fmtRs(pNSL) : '—'}</td>
      <td style="text-align:center">
        <button class="act-btn" onclick="editRow('${dateStr}', '${t.id}', this)">&#x270F; Edit</button>
        <button class="act-btn del" onclick="deleteRow('${dateStr}', '${t.id}')">&#x2715;</button>
      </td>`;
          tbody.appendChild(tr);
        });

        // Add-row at end

      function applyNotesType() {
        const sel = document.getElementById('e-notes-sel');
        const ptsEl = document.getElementById('e-notes-pts');
        const hidden = document.getElementById('e-notes');
        if (!sel) return;
        if (sel.value === 'reach') {
          ptsEl.style.display = '';
          hidden.value = ptsEl.value ? `price reach upto ${ptsEl.value} points` : '';
        } else {
          ptsEl.style.display = 'none';
          hidden.value = sel.value;
        }

      function recalcEditRow() {
        const entry = parseFloat(document.getElementById('e-entry')?.value);
        const exitNSL = parseFloat(document.getElementById('e-exitNSL')?.value);
        const lots = parseInt(document.getElementById('e-lots')?.value);
        if (isNaN(entry) || isNaN(exitNSL)) return;

        const tr = document.getElementById('e-entry')?.closest('tr');
        const instr = tr?.dataset?.editInstr || 'NIFTY';
        const slPts = SL_PTS[instr] || 15;
        const tgG = TGT_G[instr] || 50;
        const tgL = TGT_L[instr] || 31;
        const lotSz = LOT_SIZES[instr] || 65;
        const nLots = isNaN(lots) ? 10 : lots;

        const exitSL = parseFloat(
          Math.max(entry - slPts, Math.min(entry + tgG, exitNSL)).toFixed(2)
        );
        const exitTgt = parseFloat((entry + tgL).toFixed(2));
        // Read tgtPts from the input — user controls it; fall back to calculation only if empty
        const tgtRaw = parseFloat(document.getElementById('e-tgt')?.value);
        const tgtPts = isNaN(tgtRaw)
          ? parseFloat(Math.max(-slPts, Math.min(tgL, exitNSL - entry)).toFixed(2))
          : tgtRaw;
        const pSL = Math.round((exitSL - entry) * nLots * lotSz);
        const pTgt = Math.round(tgtPts * nLots * lotSz);
        const pNSL = Math.round((exitNSL - entry) * nLots * lotSz);

        const set = (id, v) => {
          const el = document.getElementById(id);
          if (el) el.value = v;
        };
        set('e-exitSL', exitSL);
        set('e-exitTgt', exitTgt);
        // e-tgt is NOT set here — user edits it directly

        const pnl = document.getElementById('e-pnl-cell');
        if (pnl) {
          const c = (v) => (v >= 0 ? 'c-green' : 'c-red');
          pnl.innerHTML =
            `<span class="${c(pSL)}">${fmtRs(pSL)}</span>` +
            `<span style="color:#374151"> | </span>` +
            `<span class="${c(pTgt)}">${fmtRs(pTgt)}</span>` +
            `<span style="color:#374151"> | </span>` +
            `<span class="${c(pNSL)}">${fmtRs(pNSL)}</span>`;
        }
      }

      async function saveRow(dateStr, id, btn) {

        t.entryTime = document.getElementById('e-time').value.trim();
        t.time = t.entryTime;
        t.entrySymbol = document.getElementById('e-sym').value.trim();
        t.lots = parseInt(document.getElementById('e-lots').value) || t.lots;
        t.entryPrice = parseFloat(document.getElementById('e-entry').value) || null;
        t.exitSL = parseFloat(document.getElementById('e-exitSL').value) || null;
        t.exitTgt = parseFloat(document.getElementById('e-exitTgt').value) || null;
        t.exitNSL = parseFloat(document.getElementById('e-exitNSL').value) || null;
        t.tgtPts = parseFloat(document.getElementById('e-tgt').value) || null;
        t.notes = document.getElementById('e-notes').value.trim();
        await persistDay(dateStr);
        renderDay(dateStr);
        renderSummary(activeMonth);

      // ── Insert / Delete ───────────────────────────────────────────────────────────
      function insertRow(dateStr, atIndex) {

      // ── Persist to disk ───────────────────────────────────────────────────────────
      async function persistDay(dateStr) {
        try {
          const r = await fetch(apiSaveUrl(), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

          });

      function switchMonth(key) {

        document.querySelectorAll('.month-panel').forEach((p) => p.classList.remove('active'));

      // ── Helpers ───────────────────────────────────────────────────────────────────
      function qty(instrument, lots) {
        return (lots || 1) * (LOT_SIZES[instrument] || 65);
      }
      function fmt(v) {
        return v !== null && v !== undefined ? Number(v).toFixed(2) : '—';
      }
      // Max Drawdown  = largest peak-to-trough decline  (returned as negative)
      // Max Run-Up    = largest trough-to-peak gain      (returned as positive)
      function calcDayPeaks(series) {
        let cum = 0,
          peak = 0,
          minSoFar = 0,
          maxDD = 0,
          maxRU = 0;
        for (const v of series) {
          cum += v;
          if (cum > peak) peak = cum;
          if (cum < minSoFar) minSoFar = cum;
          const dd = peak - cum;
          const ru = cum - minSoFar;
          if (dd > maxDD) maxDD = dd;
          if (ru > maxRU) maxRU = ru;
        }
        return { maxDown: maxDD > 0 ? -maxDD : 0, maxUp: maxRU };
      }

      // Same but day-by-day for monthly summary, tracking the date of each extreme
      function calcMonthPeaks(series, dates) {
        let cum = 0,
          peak = 0,
          minSoFar = 0,
          maxDD = 0,
          maxRU = 0;
        let maxDownDate = null,
          maxUpDate = null;
        for (let i = 0; i < series.length; i++) {
          cum += series[i];
          if (cum > peak) peak = cum;
          if (cum < minSoFar) minSoFar = cum;
          const dd = peak - cum;
          const ru = cum - minSoFar;
          if (dd > maxDD) {
            maxDD = dd;
            maxDownDate = dates[i];
          }
          if (ru > maxRU) {
            maxRU = ru;
            maxUpDate = dates[i];
          }
        }
        return {
          maxDown: maxDD > 0 ? -maxDD : 0,
          maxDownDate,
          maxUp: maxRU,
          maxUpDate,
        };
      }

      function fmtDateShort(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr + 'T00:00:00');
        return `${String(d.getDate()).padStart(2, '0')} ${MONTH_NAMES[d.getMonth()]}`;
      }

      function fmtRs(v) {
        if (v === null || v === undefined) return '—';
        const abs = Math.abs(Math.round(v)).toLocaleString('en-IN');
        return v >= 0 ? `+₹${abs}` : `-₹${abs}`;
      }
      function fmtCapital(v) {
        if (v === null || v === undefined) return '—';
        return `₹${Math.round(v).toLocaleString('en-IN')}`;
      }
      function fmtPts(v) {
        if (v === null || v === undefined) return '—';
        return (v >= 0 ? '+' : '') + Number(v).toFixed(2);
      }
      function pnlClass(v) {
        if (v === null || v === undefined) return 'c-gray';
        return v > 0 ? 'c-green' : v < 0 ? 'c-red' : 'c-gray';
      }
      function showToast(msg, err = false) {
        const t = document.createElement('div');
        t.style.cssText = `position:fixed;bottom:70px;right:24px;background:${err ? '#7f1d1d' : '#052e16'};
    color:${err ? '#fca5a5' : '#4ade80'};border:1px solid ${err ? '#991b1b' : '#166534'};
    border-radius:8px;padding:10px 18px;font-size:12px;font-weight:700;z-index:999;`;
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
      }

      // ── Excel Export ─────────────────────────────────────────────────────────────
      function loadSheetJS() {
        return new Promise((resolve, reject) => {
          if (typeof XLSX !== 'undefined') return resolve();
          const s = document.createElement('script');
          s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
          s.onload = resolve;
          s.onerror = () => reject(new Error('Failed to load SheetJS'));
          document.head.appendChild(s);
        });
      }

      async function downloadExcel(monthKey) {
        try {
          await loadSheetJS();
        } catch (e) {
          showToast('Could not load Excel library — check internet', true);
          return;
        }
        const months = groupByMonth();
        const dates = (months[monthKey] || []).sort();
        if (!dates.length) {
          showToast('No trades to export', true);
          return;
        }

        const HEADERS = [
          'Date',
          'Instrument',
          'Entry Time',
          'Lots',
          'Entry',
          'Exit w/SL',
          'Exit w/oSL',
          'Tgt Pts',
          'P&L w/SL (₹)',
          'P&L w/oSL (₹)',
          'P&L Tgt (₹)',
        ];

        const rows = [HEADERS];
        let totSL = 0,
          totNSL = 0,
          totTgt = 0,
          totalCount = 0;
        let winSL = 0,
          winNSL = 0,
          winTgt = 0;

        for (const date of dates) {
          const day = allData[date];
          if (!day) continue;
          for (const t of day.trades || []) {
            const tq = qty(day.instrument, t.lots);
            const pSL =
              t.exitSL !== null && t.entryPrice !== null
                ? Math.round((t.exitSL - t.entryPrice) * tq)
                : '';
            const pNSL =
              t.exitNSL !== null && t.entryPrice !== null
                ? Math.round((t.exitNSL - t.entryPrice) * tq)
                : '';
            const pTgt = t.tgtPts !== null ? Math.round(t.tgtPts * tq) : '';

            rows.push([
              date,
              day.instrument || '',
              (t.entryTime || t.time || '').slice(0, 5),
              t.lots,
              t.entryPrice ?? '',
              t.exitSL ?? '',
              t.exitNSL ?? '',
              t.tgtPts ?? '',
              pSL,
              pNSL,
              pTgt,
            ]);

            if (pSL !== '') {
              totSL += pSL;
              if (pSL > 0) winSL++;
            }
            if (pNSL !== '') {
              totNSL += pNSL;
              if (pNSL > 0) winNSL++;
            }
            if (pTgt !== '') {
              totTgt += pTgt;
              if (pTgt > 0) winTgt++;
            }
            totalCount++;
          }
        }

        // Blank separator
        rows.push([]);

        // Totals row
        rows.push(['TOTAL', '', '', '', '', '', '', '', totSL, totNSL, totTgt]);

        // Win rate row
        const wrFmt = (w) =>
          totalCount ? `${Math.round((w / totalCount) * 100)}% (${w}/${totalCount})` : '—';
        rows.push([
          'WIN RATE',
          '',
          '',
          '',
          '',
          '',
          '',
          '',
          wrFmt(winSL),
          wrFmt(winNSL),
          wrFmt(winTgt),
        ]);

        // Build workbook
        const ws = XLSX.utils.aoa_to_sheet(rows);

        // Column widths
        ws['!cols'] = [
          { wch: 12 },
          { wch: 10 },
          { wch: 10 },
          { wch: 6 },
          { wch: 8 },
          { wch: 10 },
          { wch: 11 },
          { wch: 8 },
          { wch: 14 },
          { wch: 14 },
          { wch: 12 },
        ];

        // Freeze header row
        ws['!freeze'] = { xSplit: 0, ySplit: 1 };

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, monthLabel(monthKey));

        const fileName = `ST_Trades_${monthKey}.xlsx`;
        XLSX.writeFile(wb, fileName);
        showToast(`Downloaded ${fileName}`);
      }

      // ── Time filter (multiple ranges) ────────────────────────────────────────────
      function tradeInAnyRange(entryTime, ranges) {
        if (!ranges || ranges.length === 0) return true;
        const t = (entryTime || '').slice(0, 5); // 'HH:MM'
        if (!t) return true;
        return ranges.some(({ from, to }) => {
          if (!from && !to) return true;
          if (from && t < from) return false;
          if (to && t > to) return false;
          return true;
        });
      }

      // Extract reach value: use maxReach field if present, else parse from notes text
      // e.g. "price reach upto 100 points" → 100
      function getEffectiveMaxReach(t) {
        if (t.maxReach !== undefined && t.maxReach !== null) return t.maxReach;
        const m = (t.notes || '').match(/reach\s+(?:up\s*to\s+)?(\d+(?:\.\d+)?)/i);
        return m ? parseFloat(m[1]) : 0;
      }

      // Combined filter: time ranges AND notes type AND reach >= X
      function tradePassesFilters(t, monthKey) {
        const ranges = monthTimeFilters[monthKey] || [];
        if (!tradeInAnyRange(t.entryTime || t.time, ranges)) return false;

        const nf = monthNoteFilters[monthKey] || {};
        const anyNoteChecked = nf.slHit || nf.pineSL;
        if (anyNoteChecked) {
          const n = (t.notes || '').toUpperCase();
          // Use includes() to match both "SL Hit" and "SL HIT", "Pine Script SL Hit" etc.
          const pass =
            (nf.slHit && n.includes('SL HIT') && !n.includes('PINE SCRIPT')) ||
            (nf.pineSL && n.includes('PINE SCRIPT'));
          if (!pass) return false;
        }

        const minReach = monthReachFilter[monthKey];
        if (minReach !== null && minReach !== undefined && minReach > 0) {
          if (getEffectiveMaxReach(t) < minReach) return false;
        }

        return true;
      }

      function addTimeRange(monthKey) {
        if (!monthTimeFilters[monthKey]) monthTimeFilters[monthKey] = [];
        monthTimeFilters[monthKey].push({ from: '', to: '' });
        renderTimeRanges(monthKey);
      }

      function removeTimeRange(monthKey, idx) {
        if (!monthTimeFilters[monthKey]) return;
        monthTimeFilters[monthKey].splice(idx, 1);
        renderTimeRanges(monthKey);
      }

      function updateTimeRange(monthKey, idx, field, value) {
        if (!monthTimeFilters[monthKey]) monthTimeFilters[monthKey] = [];
        if (!monthTimeFilters[monthKey][idx])
          monthTimeFilters[monthKey][idx] = { from: '', to: '' };
        monthTimeFilters[monthKey][idx][field] = value;
        renderTimeRangeActiveState(monthKey, idx);
      }

      function applyTimeRanges(monthKey) {
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }

      function renderTimeRangeActiveState(monthKey, idx) {
        const rangesEl = document.getElementById(`tf-ranges-${monthKey}`);
        if (!rangesEl) return;
        const rows = rangesEl.querySelectorAll('.time-range-row');
        if (!rows[idx]) return;
        const r = (monthTimeFilters[monthKey] || [])[idx] || {};
        rows[idx].classList.toggle('active', !!(r.from || r.to));
      }

      function clearAllRanges(monthKey) {
        monthTimeFilters[monthKey] = [];
        renderTimeRanges(monthKey);
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }

      function renderTimeRanges(monthKey) {
        const el = document.getElementById(`tf-ranges-${monthKey}`);
        if (!el) return;
        const ranges = monthTimeFilters[monthKey] || [];
        const clearBtn = document.getElementById(`tf-clear-${monthKey}`);

        el.innerHTML = ranges
          .map(
            ({ from, to }, i) => `
    <div class="time-range-row${from || to ? ' active' : ''}">
      <input class="time-input" type="time" value="${from || ''}"
             onchange="updateTimeRange('${monthKey}', ${i}, 'from', this.value)" title="From time">
      <span class="time-sep">–</span>
      <input class="time-input" type="time" value="${to || ''}"
             onchange="updateTimeRange('${monthKey}', ${i}, 'to', this.value)" title="To time">
      <button class="time-del-btn" onclick="removeTimeRange('${monthKey}', ${i})" title="Remove range">✕</button>
    </div>`
          )
          .join('');

        const applyBtn = document.getElementById(`tf-apply-${monthKey}`);
        if (applyBtn) applyBtn.style.display = ranges.length > 0 ? '' : 'none';
        if (clearBtn) clearBtn.style.display = ranges.length > 0 ? '' : 'none';
      }

      // ── Notes / Reach filter ─────────────────────────────────────────────────────
      function notesClass(notes) {
        if (!notes) return '';
        const n = notes.toUpperCase();
        if (n.includes('PINE SCRIPT')) return 'pine-sl';
        if (n.includes('SL HIT')) return 'sl-hit';
        return '';
      }

      function applyNotesFilter(monthKey) {
        if (!monthNoteFilters[monthKey]) monthNoteFilters[monthKey] = {};
        const cbSL = document.getElementById(`nc-cb-${monthKey}-sl`);
        const cbPine = document.getElementById(`nc-cb-${monthKey}-pine`);
        const rfInput = document.getElementById(`rf-${monthKey}`);

        monthNoteFilters[monthKey].slHit = cbSL?.checked || false;
        monthNoteFilters[monthKey].pineSL = cbPine?.checked || false;

        const v = parseFloat(rfInput?.value);
        monthReachFilter[monthKey] = isNaN(v) ? null : v;

        document
          .getElementById(`nc-${monthKey}-sl`)
          ?.classList.toggle('active', monthNoteFilters[monthKey].slHit);
        document
          .getElementById(`nc-${monthKey}-pine`)
          ?.classList.toggle('active', monthNoteFilters[monthKey].pineSL);

        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }

      function clearNotesFilter(monthKey) {
        monthNoteFilters[monthKey] = { slHit: false, pineSL: false };
        monthReachFilter[monthKey] = null;

        const cbSL = document.getElementById(`nc-cb-${monthKey}-sl`);
        const cbPine = document.getElementById(`nc-cb-${monthKey}-pine`);
        const rfInput = document.getElementById(`rf-${monthKey}`);
        if (cbSL) cbSL.checked = false;
        if (cbPine) cbPine.checked = false;
        if (rfInput) rfInput.value = '';

        document.getElementById(`nc-${monthKey}-sl`)?.classList.remove('active');
        document.getElementById(`nc-${monthKey}-pine`)?.classList.remove('active');

        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }

      // ── Date filter ───────────────────────────────────────────────────────────────
      function applyDateFilter(monthKey, dateStr) {
        monthDateFilter[monthKey] = dateStr || null;
        applyFilter(monthKey, monthFilters[monthKey] || 'ALL');
      }

      // ── Instrument filter ─────────────────────────────────────────────────────────
      function applyFilter(monthKey, filter) {
        monthFilters[monthKey] = filter;

        // Update button active states
        ['ALL', 'NIFTY', 'SENSEX'].forEach((f) => {
          const btn = document.getElementById(`fb-${monthKey}-${f}`);
          if (!btn) return;
          btn.classList.toggle('active', f === filter);
        });

        // Show/hide day blocks (instrument + date filters)
        const selectedDate = monthDateFilter[monthKey] || null;
        const panel = document.getElementById(`panel-${monthKey}`);
        if (panel) {
          panel.querySelectorAll('.day-block').forEach((block) => {
            const instr = block.dataset.instrument || '';
            const date = block.dataset.date || '';
            const instrOk = filter === 'ALL' || instr === filter;
            const dateOk = !selectedDate || date === selectedDate;
            block.style.display = instrOk && dateOk ? '' : 'none';
          });
        }

        // Recalculate summary with filter applied
        renderSummary(monthKey);
      }

      // ── Boot ──────────────────────────────────────────────────────────────────────
      loadData().then(() => {
        if (activeMonth) renderMonthDays(activeMonth);
      });
    </script>
  </body>
</html>
