<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supertrend Monitor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f1117;
        color: #d1d5db;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ── */
      header {
        background: #1a1d27;
        border-bottom: 1px solid #2a2d3a;
        padding: 0 16px;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .logo {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        white-space: nowrap;
      }
      .logo span {
        color: #a78bfa;
      }
      .nav-link {
        font-size: 11px;
        color: #6b7280;
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 5px;
        border: 1px solid #2a2d3a;
        white-space: nowrap;
      }
      .nav-link:hover {
        color: #d1d5db;
        border-color: #4b5563;
      }
      .divider {
        width: 1px;
        height: 24px;
        background: #2a2d3a;
      }

      .proc-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .proc-label {
        font-size: 11px;
        color: #6b7280;
        font-weight: 600;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot-running {
        background: #4ade80;
        box-shadow: 0 0 5px #4ade80;
      }
      .dot-starting {
        background: #facc15;
        animation: pulse 1s infinite;
      }
      .dot-stopped {
        background: #4b5563;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .proc-status {
        font-size: 12px;
        font-weight: 600;
        min-width: 56px;
      }
      .text-green {
        color: #4ade80;
      }
      .text-yellow {
        color: #facc15;
      }
      .text-gray {
        color: #6b7280;
      }

      .hdr-btn {
        padding: 5px 12px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: opacity 0.15s;
        letter-spacing: 0.3px;
      }
      .hdr-btn:hover {
        opacity: 0.8;
      }
      .hdr-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .btn-green {
        background: #14532d;
        color: #4ade80;
      }
      .btn-red {
        background: #7f1d1d;
        color: #fca5a5;
      }
      .btn-blue {
        background: #1e3a5f;
        color: #93c5fd;
      }
      .confirm-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 999;
        align-items: center;
        justify-content: center;
      }
      .confirm-overlay.open {
        display: flex;
      }
      .confirm-box {
        background: #1a1d27;
        border: 1px solid #374151;
        border-radius: 12px;
        padding: 24px 28px;
        min-width: 260px;
        text-align: center;
      }
      .confirm-box p {
        color: #e5e7eb;
        font-size: 14px;
        margin: 0 0 20px;
      }
      .confirm-btns {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .confirm-btns button {
        padding: 7px 20px;
        border-radius: 8px;
        border: none;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .confirm-yes {
        background: #b91c1c;
        color: #fff;
      }
      .confirm-no {
        background: #374151;
        color: #d1d5db;
      }

      .spacer {
        flex: 1;
      }

      .pos-chips {
        display: flex;
        gap: 6px;
      }
      .pos-chip {
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
      }
      .chip-open {
        background: #052e16;
        color: #4ade80;
      }
      .chip-closed {
        background: #1c1917;
        color: #6b7280;
        border: 1px solid #2a2d3a;
      }

      /* ── Main ── */
      .main {
        display: grid;
        grid-template-columns: 260px 1fr;
        flex: 1;
        overflow: hidden;
      }

      /* ── Left Panel ── */
      .left {
        background: #13151f;
        border-right: 1px solid #2a2d3a;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card {
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 10px;
        padding: 12px;
      }
      .sec {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #6b7280;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      /* ITM Override button group */
      .itm-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
      }
      .itm-btn {
        padding: 7px 4px;
        border-radius: 6px;
        border: 1px solid #2a2d3a;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        background: #0f1117;
        color: #4b5563;
        transition: all 0.15s;
        text-align: center;
      }
      .itm-btn:hover {
        border-color: #4b5563;
        color: #9ca3af;
      }
      .itm-active {
        background: #2e1065;
        border-color: #7c3aed;
        color: #a78bfa;
      }

      /* Position toggles */
      .pos-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #1f2937;
      }
      .pos-row:last-of-type {
        border-bottom: none;
      }
      .pos-name {
        font-size: 13px;
        font-weight: 700;
        color: #d1d5db;
      }
      .pos-toggle {
        display: flex;
        gap: 4px;
      }
      .pos-btn {
        padding: 4px 12px;
        border-radius: 5px;
        border: 1px solid #2a2d3a;
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        background: #0f1117;
        color: #4b5563;
        transition: all 0.15s;
      }
      .pos-btn-open-active {
        background: #052e16;
        border-color: #166534;
        color: #4ade80;
      }
      .pos-btn-closed-active {
        background: #7f1d1d;
        border-color: #991b1b;
        color: #fca5a5;
      }

      .itm-hint {
        font-size: 10px;
        color: #4b5563;
        margin-top: 6px;
        line-height: 1.5;
      }

      label {
        display: block;
        font-size: 11px;
        color: #6b7280;
        margin-bottom: 3px;
        font-weight: 500;
      }

      .save-btn {
        width: 100%;
        padding: 9px;
        background: #4c1d95;
        color: #e9d5ff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.5px;
      }
      .save-btn:hover {
        background: #5b21b6;
      }
      .save-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .apply-btn {
        width: 100%;
        padding: 9px;
        background: #1d4ed8;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.5px;
        margin-top: 10px;
      }
      .apply-btn:hover {
        background: #2563eb;
      }
      .saved-msg {
        text-align: center;
        font-size: 11px;
        color: #4ade80;
        margin-top: 6px;
        min-height: 16px;
      }

      /* ── Right Panel ── */
      .right {
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        padding: 14px;
        border-bottom: 1px solid #2a2d3a;
        background: #13151f;
      }
      .stat {
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 10px;
        padding: 10px 12px;
      }
      .stat-lbl {
        font-size: 10px;
        color: #6b7280;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .stat-val {
        font-size: 18px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .stat-sub {
        font-size: 10px;
        color: #6b7280;
        margin-top: 2px;
      }
      .c-green {
        color: #4ade80;
      }
      .c-red {
        color: #f87171;
      }
      .c-yellow {
        color: #facc15;
      }
      .c-white {
        color: #f9fafb;
      }
      .c-purple {
        color: #a78bfa;
      }
      .c-gray {
        color: #6b7280;
      }

      /* Log */
      .log {
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .log-row {
        display: flex;
        gap: 8px;
        font-size: 11px;
        padding: 3px 0;
        border-bottom: 1px solid #13151f;
        font-family: 'Consolas', 'Courier New', monospace;
      }
      .log-t {
        color: #374151;
        flex-shrink: 0;
        min-width: 52px;
      }
      .l-ok {
        color: #4ade80;
      }
      .l-fail {
        color: #f87171;
      }
      .l-pos {
        color: #a78bfa;
        font-weight: 700;
      }
      .l-atm {
        color: #facc15;
        font-weight: 700;
      }
      .l-info {
        color: #6b7280;
      }
      .l-ui {
        color: #3b82f6;
      }
      .l-err {
        color: #f87171;
      }
      .l-warn {
        color: #f97316;
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2d3a;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="confirm-overlay" id="confirm-overlay">
      <div class="confirm-box">
        <p id="confirm-msg">Are you sure?</p>
        <div class="confirm-btns">
          <button class="confirm-yes" id="confirm-yes">Yes</button>
          <button class="confirm-no" onclick="closeConfirm()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- HEADER -->
    <header>
      <div class="logo">Supertrend<span>Monitor</span></div>
      <a class="nav-link" href="/">← Dashboard</a>
      <div class="divider"></div>

      <!-- TradingView -->
      <div class="proc-group">
        <div class="proc-label">TRADINGVIEW</div>
        <div class="status-dot dot-stopped" id="tv-dot"></div>
        <div class="proc-status text-gray" id="tv-status">Stopped</div>
        <button class="hdr-btn btn-green" id="btn-tv-toggle" onclick="tvStart()">▶ Start TV</button>
      </div>

      <div class="divider"></div>

      <!-- Supertrend Monitor -->
      <div class="proc-group">
        <div class="proc-label">SUPERTREND</div>
        <div class="status-dot dot-stopped" id="st-dot"></div>
        <div class="proc-status text-gray" id="st-status">Stopped</div>
        <button class="hdr-btn btn-green" id="btn-st-toggle" onclick="stStart()" disabled>
          ▶ Start
        </button>
        <button
          class="hdr-btn btn-blue"
          id="btn-st-restart"
          onclick="confirm2('Restart Supertrend Monitor?', stRestart)"
          disabled
        >
          ↺ Restart
        </button>
      </div>

      <div class="divider"></div>
      <div class="spacer"></div>

      <div class="pos-chips">
        <div class="pos-chip chip-closed" id="chip-ce">CE: CLOSED</div>
        <div class="pos-chip chip-closed" id="chip-pe">PE: CLOSED</div>
      </div>
    </header>

    <!-- MAIN -->
    <div class="main">
      <!-- LEFT PANEL -->
      <div class="left">
        <!-- ITM Override -->
        <div class="card">
          <div class="sec">ITM Override</div>
          <div class="itm-group">
            <button class="itm-btn itm-active" id="itm-auto" onclick="setITM(null)">
              Auto<br /><span style="font-size: 9px; opacity: 0.7">day rule</span>
            </button>
            <button class="itm-btn" id="itm-0" onclick="setITM(0)">
              ATM<br /><span style="font-size: 9px; opacity: 0.7">ITM-0</span>
            </button>
            <button class="itm-btn" id="itm-1" onclick="setITM(1)">
              ITM-1<br /><span style="font-size: 9px; opacity: 0.7"> </span>
            </button>
            <button class="itm-btn" id="itm-2" onclick="setITM(2)">
              ITM-2<br /><span style="font-size: 9px; opacity: 0.7"> </span>
            </button>
          </div>
          <div class="itm-hint">
            Auto: Mon/Tue = ITM-2, Fri = ITM-1 (NIFTY), SENSEX always ITM-2
          </div>
        </div>

        <!-- Save Config -->
        <div class="card">
          <button class="save-btn" onclick="saveConfig()">SAVE ITM CONFIG</button>
          <div class="saved-msg" id="saved-msg"></div>
        </div>

        <!-- Position -->
        <div class="card">
          <div class="sec">Position Override</div>
          <div class="pos-row">
            <div class="pos-name">CE</div>
            <div class="pos-toggle">
              <button class="pos-btn" id="ce-open" onclick="setCE('open')">OPEN</button>
              <button
                class="pos-btn pos-btn-closed-active"
                id="ce-closed"
                onclick="setCE('closed')"
              >
                CLOSED
              </button>
            </div>
          </div>
          <div class="pos-row" style="margin-top: 8px">
            <div class="pos-name">PE</div>
            <div class="pos-toggle">
              <button class="pos-btn" id="pe-open" onclick="setPE('open')">OPEN</button>
              <button
                class="pos-btn pos-btn-closed-active"
                id="pe-closed"
                onclick="setPE('closed')"
              >
                CLOSED
              </button>
            </div>
          </div>
          <button class="apply-btn" onclick="applyPosition()">APPLY POSITION</button>
          <div class="saved-msg" id="pos-msg"></div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right">
        <!-- Stats -->
        <div class="stats">
          <div class="stat">
            <div class="stat-lbl">Instrument</div>
            <div class="stat-val c-purple" id="s-instr">—</div>
            <div class="stat-sub" id="s-instr-sub">waiting...</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Spot</div>
            <div class="stat-val c-white" id="s-spot">—</div>
            <div class="stat-sub" id="s-spot-sub">—</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">ATM Strike</div>
            <div class="stat-val c-yellow" id="s-atm">—</div>
            <div class="stat-sub" id="s-atm-sub">—</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">CE Position</div>
            <div class="stat-val c-gray" id="s-ce">CLOSED</div>
            <div class="stat-sub" id="s-ce-sub">—</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">PE Position</div>
            <div class="stat-val c-gray" id="s-pe">CLOSED</div>
            <div class="stat-sub" id="s-pe-sub">—</div>
          </div>
        </div>

        <!-- Log -->
        <div class="log" id="log-panel"></div>
      </div>
    </div>

    <script>
      // ── State ─────────────────────────────────────────────────────────
      let itmOverride = null; // null | 0 | 1 | 2
      let ceState = 'closed';
      let peState = 'closed';

      // ── Init ──────────────────────────────────────────────────────────
      async function loadConfig() {
        try {
          const cfg = await fetch('/api/st/config').then((r) => r.json());
          const v = cfg.itmOverride;
          itmOverride = [0, 1, 2].includes(v) ? v : null;
          renderITM();
        } catch (_) {}
      }

      async function loadPosition() {
        try {
          const pos = await fetch('/api/st/position').then((r) => r.json());
          ceState = pos.CE || 'closed';
          peState = pos.PE || 'closed';
          renderPosition();
          updatePositionStats(ceState, peState);
          if (pos.lastATM) {
            document.getElementById('s-atm').textContent = pos.lastATM;
          }
          if (pos.lastInstrument) {
            document.getElementById('s-instr').textContent = pos.lastInstrument;
            document.getElementById('s-instr-sub').textContent = `ITM-${pos.lastITMDepth ?? '?'}`;
          }
        } catch (_) {}
      }

      function renderITM() {
        const ids = ['itm-auto', 'itm-0', 'itm-1', 'itm-2'];
        const vals = [null, 0, 1, 2];
        ids.forEach((id, i) => {
          document.getElementById(id).className =
            'itm-btn' + (itmOverride === vals[i] ? ' itm-active' : '');
        });
      }

      function setITM(v) {
        itmOverride = v;
        renderITM();
      }

      function renderPosition() {
        const ceOpen = document.getElementById('ce-open');
        const ceClosed = document.getElementById('ce-closed');
        const peOpen = document.getElementById('pe-open');
        const peClosed = document.getElementById('pe-closed');

        ceOpen.className = 'pos-btn' + (ceState === 'open' ? ' pos-btn-open-active' : '');
        ceClosed.className = 'pos-btn' + (ceState === 'closed' ? ' pos-btn-closed-active' : '');
        peOpen.className = 'pos-btn' + (peState === 'open' ? ' pos-btn-open-active' : '');
        peClosed.className = 'pos-btn' + (peState === 'closed' ? ' pos-btn-closed-active' : '');
      }

      function setCE(v) {
        ceState = v;
        renderPosition();
      }
      function setPE(v) {
        peState = v;
        renderPosition();
      }

      function updatePositionStats(ce, pe) {
        const ceEl = document.getElementById('s-ce');
        ceEl.textContent = ce.toUpperCase();
        ceEl.className = 'stat-val ' + (ce === 'open' ? 'c-green' : 'c-gray');

        const peEl = document.getElementById('s-pe');
        peEl.textContent = pe.toUpperCase();
        peEl.className = 'stat-val ' + (pe === 'open' ? 'c-red' : 'c-gray');

        document.getElementById('chip-ce').className =
          'pos-chip ' + (ce === 'open' ? 'chip-open' : 'chip-closed');
        document.getElementById('chip-ce').textContent = `CE: ${ce.toUpperCase()}`;
        document.getElementById('chip-pe').className =
          'pos-chip ' + (pe === 'open' ? 'chip-open' : 'chip-closed');
        document.getElementById('chip-pe').textContent = `PE: ${pe.toUpperCase()}`;
      }

      async function saveConfig() {
        const payload = { itmOverride };
        const res = await fetch('/api/st/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        const msg = document.getElementById('saved-msg');
        if (data.ok) {
          msg.textContent = '✓ Saved — applies within 60s';
          setTimeout(() => (msg.textContent = ''), 3000);
        } else {
          msg.textContent = '✗ ' + data.error;
        }
      }

      async function applyPosition() {
        const res = await fetch('/api/st/position', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ CE: ceState, PE: peState }),
        });
        const data = await res.json();
        const msg = document.getElementById('pos-msg');
        if (data.ok) {
          msg.textContent = '✓ Position updated';
          updatePositionStats(ceState, peState);
          setTimeout(() => (msg.textContent = ''), 3000);
        } else {
          msg.textContent = '✗ ' + data.error;
        }
      }

      // ── Process control ───────────────────────────────────────────────
      function confirm2(msg, action) {
        document.getElementById('confirm-msg').textContent = msg;
        document.getElementById('confirm-yes').onclick = () => {
          closeConfirm();
          action();
        };
        document.getElementById('confirm-overlay').classList.add('open');
      }
      function closeConfirm() {
        document.getElementById('confirm-overlay').classList.remove('open');
      }
      document.getElementById('confirm-overlay').addEventListener('click', (e) => {
        if (e.target.id === 'confirm-overlay') closeConfirm();
      });

      async function tvStart() {
        document.getElementById('btn-tv-toggle').disabled = true;
        await fetch('/api/tv/start', { method: 'POST' });
      }
      async function tvStop() {
        await fetch('/api/tv/stop', { method: 'POST' });
      }
      async function stStart() {
        document.getElementById('btn-st-toggle').disabled = true;
        await fetch('/api/st/start', { method: 'POST' });
      }
      async function stStop() {
        await fetch('/api/st/stop', { method: 'POST' });
      }
      async function stRestart() {
        await fetch('/api/st/restart', { method: 'POST' });
      }
      async function monStart() {
        document.getElementById('btn-mon-toggle').disabled = true;
        await fetch('/api/monitor/start', { method: 'POST' });
      }
      async function monStop() {
        await fetch('/api/monitor/stop', { method: 'POST' });
      }
      async function monRestart() {
        await fetch('/api/monitor/restart', { method: 'POST' });
      }

      function applyStatus(s) {
        const tvRunning = s.tv === 'running';

        // TradingView
        const tvDot = document.getElementById('tv-dot');
        const tvStat = document.getElementById('tv-status');
        const btnTvT = document.getElementById('btn-tv-toggle');
        if (s.tv === 'running') {
          tvDot.className = 'status-dot dot-running';
          tvStat.className = 'proc-status text-green';
          tvStat.textContent = 'Running';
          btnTvT.textContent = '■ Stop TV';
          btnTvT.className = 'hdr-btn btn-red';
          btnTvT.onclick = () => confirm2('Stop TradingView?', tvStop);
          btnTvT.disabled = false;
        } else if (s.tv === 'starting') {
          tvDot.className = 'status-dot dot-starting';
          tvStat.className = 'proc-status text-yellow';
          tvStat.textContent = 'Starting';
          btnTvT.disabled = true;
        } else {
          tvDot.className = 'status-dot dot-stopped';
          tvStat.className = 'proc-status text-gray';
          tvStat.textContent = 'Stopped';
          btnTvT.textContent = '▶ Start TV';
          btnTvT.className = 'hdr-btn btn-green';
          btnTvT.onclick = tvStart;
          btnTvT.disabled = false;
        }

        // Supertrend Monitor
        const stDot = document.getElementById('st-dot');
        const stStat = document.getElementById('st-status');
        const btnStT = document.getElementById('btn-st-toggle');
        const btnStR = document.getElementById('btn-st-restart');
        if (s.st === 'running') {
          stDot.className = 'status-dot dot-running';
          stStat.className = 'proc-status text-green';
          stStat.textContent = 'Running';
          btnStT.textContent = '■ Stop';
          btnStT.className = 'hdr-btn btn-red';
          btnStT.onclick = () => confirm2('Stop Supertrend Monitor?', stStop);
          btnStT.disabled = false;
          btnStR.disabled = false;
        } else {
          stDot.className = 'status-dot dot-stopped';
          stStat.className = 'proc-status text-gray';
          stStat.textContent = 'Stopped';
          btnStT.textContent = '▶ Start';
          btnStT.className = 'hdr-btn btn-green';
          btnStT.onclick = stStart;
          btnStT.disabled = !tvRunning;
          btnStR.disabled = true;
        }
      }

      // ── SSE log ───────────────────────────────────────────────────────
      const logPanel = document.getElementById('log-panel');

      function logClass(line) {
        if (line.includes('[OK]')) return 'l-ok';
        if (line.includes('[FAIL]')) return 'l-fail';
        if (line.includes('[POSITION]')) return 'l-pos';
        if (line.includes('ATM shifted') || line.includes('cooldown')) return 'l-atm';
        if (line.includes('[ERROR]') || line.includes('[CRASH]') || line.includes('[ERR]'))
          return 'l-err';
        if (line.includes('[MANUAL]') || line.includes('[UI]') || line.includes('[TV]'))
          return 'l-ui';
        if (line.includes('Outside market') || line.includes('Tick skipped')) return 'l-warn';
        return 'l-info';
      }

      function extractTime(line) {
        const m = line.match(/\[(\d{2}:\d{2}:\d{2})\]/);
        return m ? m[1] : '';
      }

      function escHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function appendLog(line) {
        const t = extractTime(line);
        const text = t ? line.replace(`[${t}]`, '').trim() : line;
        const cls = logClass(line);
        const row = document.createElement('div');
        row.className = 'log-row';
        row.innerHTML = `<span class="log-t">${t}</span><span class="${cls}">${escHtml(text)}</span>`;
        logPanel.appendChild(row);
        while (logPanel.children.length > 200) logPanel.removeChild(logPanel.firstChild);
        logPanel.scrollTop = logPanel.scrollHeight;

        parseStatsFromLog(line);
      }

      function parseStatsFromLog(line) {
        // NIFTY: 23623.50  ATM: 23600  ITM-1  (prev ATM: ?)  CE:CLOSED  PE:CLOSED
        const instrM = line.match(/^(NIFTY|SENSEX):\s*([\d.]+)\s+ATM:\s*(\d+)\s+ITM-(\d+)/);
        if (instrM) {
          document.getElementById('s-instr').textContent = instrM[1];
          document.getElementById('s-instr-sub').textContent =
            instrM[1] === 'NIFTY' ? 'NSE' : 'BSE';
          document.getElementById('s-spot').textContent = parseFloat(instrM[2]).toLocaleString(
            'en-US',
            { maximumFractionDigits: 2 }
          );
          document.getElementById('s-atm').textContent = instrM[3];
          document.getElementById('s-atm-sub').textContent = `ITM-${instrM[4]}`;

          const ceM = line.match(/CE:(OPEN|CLOSED)/);
          const peM = line.match(/PE:(OPEN|CLOSED)/);
          if (ceM) updatePositionStats(ceM[1].toLowerCase(), peM ? peM[1].toLowerCase() : peState);
        }

        // [POSITION] CE OPENED / CE CLOSED
        const posM = line.match(/\[POSITION\] (CE|PE) (OPENED|CLOSED)/);
        if (posM) {
          const side = posM[1];
          const newState = posM[2] === 'OPENED' ? 'open' : 'closed';
          if (side === 'CE') {
            ceState = newState;
          } else {
            peState = newState;
          }
          updatePositionStats(ceState, peState);
          renderPosition();
        }

        // Last tick time
        const tm = line.match(/\[(\d{2}:\d{2}:\d{2})\]/);
        if (tm && !line.includes('[UI]') && !line.includes('[TV]')) {
          document.getElementById('s-spot-sub').textContent = `Last: ${tm[1]}`;
        }
      }

      const es = new EventSource('/api/st/events');
      es.addEventListener('log', (e) => appendLog(JSON.parse(e.data).line));
      es.addEventListener('status', (e) => applyStatus(JSON.parse(e.data)));
      es.addEventListener('position', (e) => {
        const pos = JSON.parse(e.data);
        ceState = pos.CE || 'closed';
        peState = pos.PE || 'closed';
        renderPosition();
        updatePositionStats(ceState, peState);
        if (pos.lastATM) document.getElementById('s-atm').textContent = pos.lastATM;
        if (pos.lastInstrument) {
          document.getElementById('s-instr').textContent = pos.lastInstrument;
          document.getElementById('s-instr-sub').textContent = `ITM-${pos.lastITMDepth ?? '?'}`;
        }
      });
      es.onerror = () => {};

      loadConfig();
      loadPosition();
      fetch('/api/status')
        .then((r) => r.json())
        .then(applyStatus);
    </script>
  </body>
</html>
