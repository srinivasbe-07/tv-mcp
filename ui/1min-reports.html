<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1-Min Strategy Reports</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f1117;
        color: #d1d5db;
        min-height: 100vh;
      }
      header {
        background: #1a1d27;
        border-bottom: 1px solid #2a2d3a;
        padding: 0 20px;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }
      .logo span {
        color: #a78bfa;
      }
      .nav-link {
        font-size: 11px;
        color: #6b7280;
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 5px;
        border: 1px solid #2a2d3a;
      }
      .nav-link:hover {
        color: #d1d5db;
        border-color: #4b5563;
      }
      .divider {
        width: 1px;
        height: 24px;
        background: #2a2d3a;
      }
      .hdr-title {
        font-size: 13px;
        font-weight: 700;
        color: #4ade80;
      }
      .spacer {
        flex: 1;
      }
      .month-bar {
        display: flex;
        gap: 6px;
        padding: 16px 20px 0;
        flex-wrap: wrap;
      }
      .month-tab {
        padding: 7px 18px;
        border-radius: 8px 8px 0 0;
        border: 1px solid #2a2d3a;
        border-bottom: none;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #13151f;
        color: #6b7280;
        transition: all 0.15s;
      }
      .month-tab:hover {
        color: #d1d5db;
      }
      .month-tab.active {
        background: #1a1d27;
        color: #a78bfa;
        border-color: #3b3f55;
      }
      .month-panel {
        display: none;
        padding: 0 20px 80px;
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-top: none;
        margin: 0 20px;
        border-radius: 0 8px 8px 8px;
      }
      .month-panel.active {
        display: block;
      }
      .summary {
        display: grid;

        padding: 16px 0 20px;
      }
      .scard {
        background: #0f1117;

      }
      .scard-lbl {

      }
      .scard-val {
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .scard-sub {
        font-size: 10px;

      }
      .stat-row {

        align-items: baseline;
        padding: 4px 0;
        border-bottom: 1px solid #1f2937;
      }
      .stat-row:last-child {

      }
      .stat-key {

        font-weight: 600;

      .stat-val {

      }
      .stat-sub {

      }
      .c-green {

      }
      .c-red {

      }
      .c-yellow {

      }
      .c-purple {

      }
      .c-white {

      }
      .c-gray {

      }
      .c-orange {

      }
      .day-block {

      .day-header {

      .shot-gallery { display:flex; flex-wrap:wrap; gap:8px; padding:6px 0 2px; }

      .shot-thumb .shot-label { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.65); color:#94a3b8; font-size:10px; padding:2px 6px; text-align:center; }
      .shot-thumb .shot-del { position:absolute; top:4px; right:4px; width:22px; height:22px; border:none; border-radius:4px; background:rgba(0,0,0,0.6); color:#f87171; font-size:14px; line-height:1; cursor:pointer; opacity:0; transition:opacity 0.15s, background 0.15s; }
      .shot-thumb:hover .shot-del { opacity:1; }
      .shot-thumb .shot-del:hover { background:#dc2626; color:#fff; }
      .shot-thumb .shot-open { position:absolute; top:4px; right:30px; width:22px; height:22px; border:none; border-radius:4px; background:rgba(0,0,0,0.6); color:#60a5fa; font-size:13px; line-height:1; cursor:pointer; opacity:0; transition:opacity 0.15s, background 0.15s; }
      .shot-thumb:hover .shot-open { opacity:1; }
      .shot-thumb .shot-open:hover { background:#2563eb; color:#fff; }
      #snap-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:1000; cursor:not-allowed; flex-direction:column; align-items:center; justify-content:center; gap:22px; }
      #snap-overlay.active { display:flex; }
      .snap-spinner { position:relative; width:56px; height:56px; }
      .snap-spinner span { position:absolute; left:50%; top:50%; width:5px; height:16px; margin-left:-2.5px; margin-top:-8px; background:#ccc; border-radius:3px; transform-origin:center 28px; animation:snap-fade 0.9s linear infinite; }
      .snap-spinner span:nth-child(1) { transform:rotate(0deg);   animation-delay:-0.8s; }
      .snap-spinner span:nth-child(2) { transform:rotate(45deg);  animation-delay:-0.7s; }
      .snap-spinner span:nth-child(3) { transform:rotate(90deg);  animation-delay:-0.6s; }
      .snap-spinner span:nth-child(4) { transform:rotate(135deg); animation-delay:-0.5s; }
      .snap-spinner span:nth-child(5) { transform:rotate(180deg); animation-delay:-0.4s; }
      .snap-spinner span:nth-child(6) { transform:rotate(225deg); animation-delay:-0.3s; }
      .snap-spinner span:nth-child(7) { transform:rotate(270deg); animation-delay:-0.2s; }
      .snap-spinner span:nth-child(8) { transform:rotate(315deg); animation-delay:-0.1s; }
      @keyframes snap-fade { 0%{opacity:1} 100%{opacity:0.12} }
      #snap-status { color:#d1d5db; font-size:14px; font-family:'Segoe UI',system-ui,sans-serif; letter-spacing:0.3px; }

  <body>
    <header>
      <div class="logo">Supertrend<span>Monitor</span></div>
      <a class="nav-link" href="/supertrend-reports">&#x2190; Reports</a>
      <a class="nav-link" href="/">&#x2190; Dashboard</a>
      <div class="divider"></div>
      <div class="hdr-title">&#x23F1; 1-Min Strategy Reports</div>
      <div class="spacer"></div>
    </header>

    <div id="month-bar" class="month-bar"></div>
    <div id="panels-container"></div>
    <div id="save-bar" style="display: none"></div>

    <script>
      const DATA_URL = '/api/report/data';
      const SAVE_URL = '/api/report/save';

      const LOT_SIZES = { NIFTY: 65, SENSEX: 20 };
      const SL_PTS = { NIFTY: 15, SENSEX: 35 };
      const TGT_G = { NIFTY: 50, SENSEX: 100 };
      const TGT_L = { NIFTY: 31, SENSEX: 70 };
      const INITIAL_CAPITAL = 200000;

      let allData = {};
      let nextId = 1000;
      let activeMonth = null;
      let monthFilters = {};
      let monthTimeFilters = {};
      let monthNoteFilters = {};
      let monthReachFilter = {};
      let monthCandleFilter = {};
      let monthDateFilter = {};
      let pbTypeSelection = {};
      let NSE_HOLIDAYS = new Set();

      async function loadData() {
        try {
          const [data, holidays] = await Promise.all([
            fetch(DATA_URL).then((r) => r.json()),
            fetch('/api/holidays').then((r) => r.json()),
          ]);
          NSE_HOLIDAYS = new Set(Object.values(holidays).flat());
          allData = data;
          for (const day of Object.values(allData)) {
            for (const t of day.trades || []) {
              if (t.id == null) t.id = nextId++;
            }
          }
          renderPage();
        } catch (e) {
          document.getElementById('panels-container').innerHTML =
            `<div class="empty-msg">Failed to load data: ${e.message}</div>`;
        }
      }

      function groupByMonth() {
        const months = {};
        for (const date of Object.keys(allData).sort().reverse()) {
          const [y, m] = date.split('-');
          const key = `${y}-${m}`;
          if (!months[key]) months[key] = [];
          months[key].push(date);
        }
        return months;
      }

      const MONTH_NAMES = [
        'Jan',
        'Feb',
        'Mar',
        'Apr',
        'May',
        'Jun',
        'Jul',
        'Aug',
        'Sep',
        'Oct',
        'Nov',
        'Dec',
      ];
      function monthLabel(key) {
        const [y, m] = key.split('-');
        return `${MONTH_NAMES[parseInt(m) - 1]} ${y}`;
      }

      function renderPage() {
        const months = groupByMonth();
        const keys = Object.keys(months);
        const bar = document.getElementById('month-bar');
        const con = document.getElementById('panels-container');
        bar.innerHTML = '';
        con.innerHTML = '';
        if (keys.length === 0) {
          con.innerHTML =
            '<div class="empty-msg">No trade records found. Run "Generate Report" after market close.</div>';
          return;
        }
        if (!activeMonth || !months[activeMonth]) activeMonth = keys[0];
        keys.forEach((key) => {
          const tab = document.createElement('div');
          tab.className = 'month-tab' + (key === activeMonth ? ' active' : '');
          tab.textContent = monthLabel(key);
          tab.onclick = () => switchMonth(key);
          bar.appendChild(tab);
          const panel = document.createElement('div');
          panel.className = 'month-panel' + (key === activeMonth ? ' active' : '');
          panel.id = `panel-${key}`;
          panel.innerHTML = buildMonthHTML(key, months[key]);
          con.appendChild(panel);
        });
      }

      function buildMonthHTML(monthKey, dates) {
        const tradeDays = dates.map((d) => allData[d]).filter(Boolean);
        if (!monthFilters[monthKey]) monthFilters[monthKey] = 'ALL';
        return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0 0;flex-wrap:wrap;gap:8px;">
      <div style="flex:1;min-width:0;">
        <div class="filter-bar" style="flex-wrap:wrap;gap:6px;">
          <span style="font-size:10px;color:#6b7280;font-weight:700;margin-right:2px;">INSTRUMENT</span>
          <button class="filter-btn active"  id="fb-${monthKey}-ALL"    onclick="applyFilter('${monthKey}','ALL')">All</button>
          <button class="filter-btn nifty"   id="fb-${monthKey}-NIFTY"  onclick="applyFilter('${monthKey}','NIFTY')">NIFTY</button>
          <button class="filter-btn sensex"  id="fb-${monthKey}-SENSEX" onclick="applyFilter('${monthKey}','SENSEX')">SENSEX</button>
          <span style="font-size:10px;color:#6b7280;font-weight:700;margin-left:12px;">DATE</span>
          <select class="date-filter-select" id="df-${monthKey}" onchange="applyDateFilter('${monthKey}', this.value)">
            <option value="">All dates</option>
            ${dates
              .filter((d) => (allData[d]?.trades || []).length > 0)
              .map((d) => {
                const dateObj = new Date(d + 'T00:00:00');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                const mon = MONTH_NAMES[dateObj.getMonth()];
                return `<option value="${d}">${dd} ${mon}</option>`;
              })
              .join('')}
          </select>
        </div>
        <div class="time-section">
          <span class="time-section-label">TIME RANGES</span>
          <div class="time-ranges" id="tf-ranges-${monthKey}"></div>
          <button class="add-range-btn" onclick="addTimeRange('${monthKey}')">+ Add Range</button>
          <button class="add-range-btn" id="tf-apply-${monthKey}" style="display:none" onclick="applyTimeRanges('${monthKey}')">&#x25BA; Apply</button>
          <button class="time-clear-all" id="tf-clear-${monthKey}" style="display:none" onclick="clearAllRanges('${monthKey}')">&#x2715; Clear All</button>
        </div>
        <div class="time-section">
          <span class="time-section-label">NOTES</span>
          <label class="note-chip" id="nc-${monthKey}-sl"><input type="checkbox" id="nc-cb-${monthKey}-sl"> SL HIT</label>
          <label class="note-chip" id="nc-${monthKey}-pine"><input type="checkbox" id="nc-cb-${monthKey}-pine"> PINE SCRIPT SL</label>
          <span class="reach-label" style="margin-left:8px;">REACH &ge;</span>
          <input type="number" class="reach-input" id="rf-${monthKey}" min="0" step="1" placeholder="pts">
          <span class="reach-label" style="margin-left:8px;">CANDLE &ge;</span>
          <input type="number" class="reach-input" id="cf-${monthKey}" min="0" step="0.5" placeholder="pts">
          <button class="add-range-btn" onclick="applyNotesFilter('${monthKey}')">&#x25BA; Apply</button>
          <button class="time-clear-all" id="nf-clear-${monthKey}" onclick="clearNotesFilter('${monthKey}')">&#x2715; Clear</button>
        </div>
      </div>
      <button class="dl-btn" onclick="downloadExcel('${monthKey}')">&#x2B07; Download Excel</button>
    </div>
    <div id="summary-${monthKey}"></div>
    <div id="days-${monthKey}">
      ${tradeDays.map((d) => buildDayBlock(d)).join('')}
    </div>`;
      }

      function renderSummary(monthKey) {
        const filter = monthFilters[monthKey] || 'ALL';
        const months = groupByMonth();
        const selectedDate = monthDateFilter[monthKey] || null;
        const dates = (months[monthKey] || [])
          .map((d) => allData[d])
          .filter(Boolean)
          .filter((d) => {
            const instrOk = filter === 'ALL' || (d.instrument || '').toUpperCase() === filter;
            const dateOk = !selectedDate || d.date === selectedDate;
            return instrOk && dateOk;
          });
        const el = document.getElementById(`summary-${monthKey}`);
        if (!el) return;
        if (dates.length === 0) {
          el.innerHTML = '';
          return;
        }

        const dayPnl = { sl: [], nsl: [], tgt: [] };
        const pbTrades = { sl: [], nsl: [], tgt: [], dates: [] };
        let totalTrades = 0,
          winSL = 0,
          winNSL = 0,
          winTgt = 0,
          winPBSL = 0,
          winPBNSL = 0,
          winPBTgt = 0,
          pbTradeCount = 0,
          pbExplicitCount = 0;
        const dayDates = [];
        for (const day of dates.sort((a, b) => (a.date < b.date ? -1 : 1))) {
          let dSL = 0,
            dNSL = 0,
            dTgt = 0;
          const filteredTrades = (day.trades || []).filter((t) => tradePassesFilters(t, monthKey));
          for (const t of filteredTrades) {
            const tq = qty(day.instrument, t.lots);
            if (t.exitSL !== null && t.entryPrice !== null) dSL += (t.exitSL - t.entryPrice) * tq;
            if (t.exitNSL !== null && t.entryPrice !== null)
              dNSL += (t.exitNSL - t.entryPrice) * tq;
            if (t.tgtPts !== null) dTgt += t.tgtPts * tq;
            totalTrades++;
            if (t.exitSL !== null && t.entryPrice !== null && t.exitSL - t.entryPrice > 0) winSL++;
            if (t.exitNSL !== null && t.entryPrice !== null && t.exitNSL - t.entryPrice > 0)
              winNSL++;
            if (t.tgtPts !== null && t.tgtPts > 0) winTgt++;
            if (t.entryPrice !== null) {
              const hasPB = t.pbEntry !== null && t.pbEntry !== undefined;
              let pSL = null,
                pNSL = null,
                pTgt = null;
              if (hasPB && t.pbEntry === 0) {
                pSL = 0;
                pNSL = 0;
                pTgt = 0;
              } else if (hasPB && t.exitNSL !== null) {
                const pbVals = calcPBValues(
                  t.pbEntry,
                  t.exitNSL,
                  day.instrument,
                  t.pbTgtPts ?? null,
                  t.pbExitSL ?? null,
                  t.pbExitTgt ?? null
                );
                if (pbVals) {
                  pSL = (pbVals.pbExitSL - t.pbEntry) * tq;
                  pNSL = (pbVals.pbExitNSL - t.pbEntry) * tq;
                  pTgt = pbVals.pbTgtPts * tq;
                }
              } else if (!hasPB && t.exitSL !== null && t.exitNSL !== null && t.tgtPts !== null) {
                pSL = (t.exitSL - t.entryPrice) * tq;
                pNSL = (t.exitNSL - t.entryPrice) * tq;
                pTgt = t.tgtPts * tq;
              }
              if (pSL !== null) {
                pbTrades.sl.push(Math.round(pSL));
                pbTrades.nsl.push(Math.round(pNSL));
                pbTrades.tgt.push(Math.round(pTgt));
                pbTrades.dates.push(day.date);
                pbTradeCount++;
                if (hasPB) pbExplicitCount++;
                if (pSL > 0) winPBSL++;
                if (pNSL > 0) winPBNSL++;
                if (pTgt > 0) winPBTgt++;
              }
            }
          }
          dayPnl.sl.push(Math.round(dSL));
          dayPnl.nsl.push(Math.round(dNSL));
          dayPnl.tgt.push(Math.round(dTgt));
          dayDates.push(day.date);
        }
        const netSL = dayPnl.sl.reduce((a, b) => a + b, 0);
        const netNSL = dayPnl.nsl.reduce((a, b) => a + b, 0);
        const netTgt = dayPnl.tgt.reduce((a, b) => a + b, 0);
        const netPBSL = pbTrades.sl.reduce((a, b) => a + b, 0);
        const {
          maxDown: ddSL,
          maxUp: duSL,
          maxDownDate: ddSLDate,
          maxUpDate: duSLDate,
        } = calcMonthPeaks(dayPnl.sl, dayDates);
        const {
          maxDown: ddNSL,
          maxUp: duNSL,
          maxDownDate: ddNSLDate,
          maxUpDate: duNSLDate,
        } = calcMonthPeaks(dayPnl.nsl, dayDates);
        const {
          maxDown: ddTgt,
          maxUp: duTgt,
          maxDownDate: ddTgtDate,
          maxUpDate: duTgtDate,
        } = calcMonthPeaks(dayPnl.tgt, dayDates);
        const {
          maxDown: ddPBSL,
          maxUp: duPBSL,
          maxDownDate: ddPBSLDate,
          maxUpDate: duPBSLDate,
        } = calcMonthPeaks(pbTrades.sl, pbTrades.dates);
        const netPBNSL = pbTrades.nsl.reduce((a, b) => a + b, 0);
        const netPBTgt = pbTrades.tgt.reduce((a, b) => a + b, 0);
        const {
          maxDown: ddPBNSL,
          maxUp: duPBNSL,
          maxDownDate: ddPBNSLDate,
          maxUpDate: duPBNSLDate,
        } = calcMonthPeaks(pbTrades.nsl, pbTrades.dates);
        const {
          maxDown: ddPBTgt,
          maxUp: duPBTgt,
          maxDownDate: ddPBTgtDate,
          maxUpDate: duPBTgtDate,
        } = calcMonthPeaks(pbTrades.tgt, pbTrades.dates);
        const wrSL = totalTrades ? Math.round((winSL / totalTrades) * 100) : 0;
        const wrNSL = totalTrades ? Math.round((winNSL / totalTrades) * 100) : 0;
        const wrTgt = totalTrades ? Math.round((winTgt / totalTrades) * 100) : 0;
        const wrPBSL = pbTradeCount ? Math.round((winPBSL / pbTradeCount) * 100) : 0;
        const wrPBNSL = pbTradeCount ? Math.round((winPBNSL / pbTradeCount) * 100) : 0;
        const wrPBTgt = pbTradeCount ? Math.round((winPBTgt / pbTradeCount) * 100) : 0;
        const capSL = INITIAL_CAPITAL + netSL,
          capNSL = INITIAL_CAPITAL + netNSL,
          capTgt = INITIAL_CAPITAL + netTgt,
          capPBSL = INITIAL_CAPITAL + netPBSL,
          capPBNSL = INITIAL_CAPITAL + netPBNSL,
          capPBTgt = INITIAL_CAPITAL + netPBTgt;
        el.innerHTML = `
    <div class="summary" style="grid-template-columns:160px repeat(4,1fr)">
      <div class="scard">
        <div class="scard-lbl">Capital</div>
        <div class="scard-val c-white">${fmtCapital(INITIAL_CAPITAL)}</div>
        <div class="scard-sub">Opening this month</div>
        <div style="margin-top:10px;">${statRow('Trades', `${totalTrades}`, 'c-white', `${dates.length} day(s)`)}</div>
      </div>
      <div class="scard">
        <div class="scard-lbl">Exit w/ SL</div>
        ${statRow('Net P&amp;L', fmtRs(netSL), pnlClass(netSL))}
        ${statRow('Net Capital', fmtCapital(capSL), pnlClass(capSL - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrSL}%`, 'c-purple', `${winSL} of ${totalTrades}`)}
        ${statRow('Max Drawdown', ddSL < 0 ? fmtRs(ddSL) : '—', 'c-orange', ddSLDate ? fmtDateShort(ddSLDate) : '')}
        ${statRow('Max Run-Up', duSL > 0 && duSL !== netSL ? fmtRs(duSL) : '—', 'c-green', duSL > 0 && duSL !== netSL && duSLDate ? fmtDateShort(duSLDate) : '')}
      </div>
      <div class="scard">
        <div class="scard-lbl">Exit w/o SL</div>
        ${statRow('Net P&amp;L', fmtRs(netNSL), pnlClass(netNSL))}
        ${statRow('Net Capital', fmtCapital(capNSL), pnlClass(capNSL - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrNSL}%`, 'c-purple', `${winNSL} of ${totalTrades}`)}
        ${statRow('Max Drawdown', ddNSL < 0 ? fmtRs(ddNSL) : '—', 'c-orange', ddNSLDate ? fmtDateShort(ddNSLDate) : '')}
        ${statRow('Max Run-Up', duNSL > 0 && duNSL !== netNSL ? fmtRs(duNSL) : '—', 'c-green', duNSL > 0 && duNSL !== netNSL && duNSLDate ? fmtDateShort(duNSLDate) : '')}
      </div>
      <div class="scard">
        <div class="scard-lbl">Target Pts</div>
        ${statRow('Net P&amp;L', fmtRs(netTgt), pnlClass(netTgt))}
        ${statRow('Net Capital', fmtCapital(capTgt), pnlClass(capTgt - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrTgt}%`, 'c-purple', `${winTgt} of ${totalTrades}`)}
        ${statRow('Max Drawdown', ddTgt < 0 ? fmtRs(ddTgt) : '—', 'c-orange', ddTgtDate ? fmtDateShort(ddTgtDate) : '')}
        ${statRow('Max Run-Up', duTgt > 0 && duTgt !== netTgt ? fmtRs(duTgt) : '—', 'c-green', duTgt > 0 && duTgt !== netTgt && duTgtDate ? fmtDateShort(duTgtDate) : '')}
      </div>
      <div class="scard" style="border-color:#4b3d7a">
        <div class="scard-lbl" style="color:#a78bfa;display:flex;align-items:center;gap:6px">PB Entry
          <select style="font-size:10px;background:#1e1e2e;color:#a78bfa;border:1px solid #4b3d7a;border-radius:4px;padding:1px 4px;cursor:pointer"
                  onchange="togglePBCard('${monthKey}', this.value)">
            <option value="tgt">w/ Tgt</option>
            <option value="sl">w/ SL</option>
            <option value="nsl">w/o SL</option>
          </select>
        </div>
        ${
          pbTradeCount === 0
            ? `<div class="scard-sub" style="margin-top:10px;color:#4b5563">No pullback entries yet</div>`
            : `<div id="pb-stats-${monthKey}-tgt">
        ${statRow('Net P&amp;L', fmtRs(netPBTgt), pnlClass(netPBTgt))}
        ${statRow('Net Capital', fmtCapital(capPBTgt), pnlClass(capPBTgt - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrPBTgt}%`, 'c-purple', `${winPBTgt} of ${pbTradeCount}`)}
        ${statRow('Max Drawdown', ddPBTgt < 0 ? fmtRs(ddPBTgt) : '—', 'c-orange', ddPBTgtDate ? fmtDateShort(ddPBTgtDate) : '')}
        ${statRow('Max Run-Up', duPBTgt > 0 && duPBTgt !== netPBTgt ? fmtRs(duPBTgt) : '—', 'c-green', duPBTgt > 0 && duPBTgt !== netPBTgt && duPBTgtDate ? fmtDateShort(duPBTgtDate) : '')}
        </div>
        <div id="pb-stats-${monthKey}-sl" style="display:none">
        ${statRow('Net P&amp;L', fmtRs(netPBSL), pnlClass(netPBSL))}
        ${statRow('Net Capital', fmtCapital(capPBSL), pnlClass(capPBSL - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrPBSL}%`, 'c-purple', `${winPBSL} of ${pbTradeCount}`)}
        ${statRow('Max Drawdown', ddPBSL < 0 ? fmtRs(ddPBSL) : '—', 'c-orange', ddPBSLDate ? fmtDateShort(ddPBSLDate) : '')}
        ${statRow('Max Run-Up', duPBSL > 0 && duPBSL !== netPBSL ? fmtRs(duPBSL) : '—', 'c-green', duPBSL > 0 && duPBSL !== netPBSL && duPBSLDate ? fmtDateShort(duPBSLDate) : '')}
        </div>
        <div id="pb-stats-${monthKey}-nsl" style="display:none">
        ${statRow('Net P&amp;L', fmtRs(netPBNSL), pnlClass(netPBNSL))}
        ${statRow('Net Capital', fmtCapital(capPBNSL), pnlClass(capPBNSL - INITIAL_CAPITAL))}
        ${statRow('Win Rate', `${wrPBNSL}%`, 'c-purple', `${winPBNSL} of ${pbTradeCount}`)}
        ${statRow('Max Drawdown', ddPBNSL < 0 ? fmtRs(ddPBNSL) : '—', 'c-orange', ddPBNSLDate ? fmtDateShort(ddPBNSLDate) : '')}
        ${statRow('Max Run-Up', duPBNSL > 0 && duPBNSL !== netPBNSL ? fmtRs(duPBNSL) : '—', 'c-green', duPBNSL > 0 && duPBNSL !== netPBNSL && duPBNSLDate ? fmtDateShort(duPBNSLDate) : '')}
        </div>`
        }
        <div class="scard-sub" style="margin-top:6px">${pbTradeCount} trades &nbsp;·&nbsp; ${pbExplicitCount} w/ pb entry</div>
      </div>
    </div>`;
        const savedPBType = pbTypeSelection[monthKey];
        if (savedPBType && savedPBType !== 'tgt') {
          togglePBCard(monthKey, savedPBType);
          const sel = el.querySelector('select');
          if (sel) sel.value = savedPBType;
        }
      }

      function statRow(key, val, cls, sub = '') {
        return `<div class="stat-row"><span class="stat-key">${key}</span><div><div class="stat-val ${cls}">${val}</div>${sub ? `<div class="stat-sub">${sub}</div>` : ''}</div></div>`;
      }

      function togglePBCard(monthKey, type) {
        pbTypeSelection[monthKey] = type;
        ['sl', 'nsl', 'tgt'].forEach((t) => {
          const el = document.getElementById(`pb-stats-${monthKey}-${t}`);
          if (el) el.style.display = t === type ? '' : 'none';
        });
      }

      function buildDayBlock(day) {
        const dateStr = day.date;
        const dayKey = dateStr.replace(/-/g, '');
        const dateObj = new Date(dateStr + 'T00:00:00');
        const weekDay = [
          'Sunday',
          'Monday',
          'Tuesday',
          'Wednesday',
          'Thursday',
          'Friday',
          'Saturday',
        ][dateObj.getDay()];
        const dd = String(dateObj.getDate()).padStart(2, '0');
        const mon = MONTH_NAMES[dateObj.getMonth()];
        const dateLabel = `${dd} ${mon} ${dateObj.getFullYear()} — ${weekDay}`;
        return `
    <div class="day-block" id="dayblock-${dayKey}" data-instrument="${(day.instrument || '').toUpperCase()}" data-date="${dateStr}">
      <div class="day-header open" onclick="toggleDay(this)">
        <span class="day-chevron">&#x25BA;</span>
        <span class="day-date">${dateLabel}</span>
        <span class="day-badge">${day.instrument || ''}</span>
        <span class="day-badge">${(day.trades || []).length} trade(s)</span>
        <span class="day-pnl" id="day-pnl-${dayKey}"></span>
        <button class="act-btn" style="margin-left:auto;font-size:11px" onclick="captureScreenshots('${dateStr}');event.stopPropagation()">&#128247; Screenshots</button>
      </div>
      <div class="day-body open">
        <div class="day-note-bar" id="note-bar-${dayKey}">
          <span class="note-text${day.note ? '' : ' empty'}" id="note-text-${dayKey}">${day.note ? escHtml(day.note) : 'Add a day note…'}</span>
          <button class="note-edit-btn" onclick="editDayNote('${dateStr}');event.stopPropagation()">&#x270E; Edit</button>
        </div>
        <table>
          <thead><tr>
            <th>Time</th><th style="text-align:left">Symbol</th><th>Lots</th>
            <th>Entry</th><th>Exit w/SL</th><th>Exit w/Tgt</th><th>Exit w/oSL</th>
            <th>Tgt Pts</th><th>Candle</th><th style="text-align:left">Notes</th>
            <th>P&amp;L w/SL &#x20B9;</th><th>P&amp;L w/Tgt &#x20B9;</th><th>P&amp;L w/oSL &#x20B9;</th>
            <th style="text-align:center">Actions</th>
          </tr></thead>
          <tbody id="tbody-${dayKey}"></tbody>
        </table>
      </div>
      <div id="shot-log-${dayKey}" style="display:none;background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:8px 12px;margin:4px 0;font-size:11px;font-family:monospace;color:#94a3b8;max-height:120px;overflow-y:auto"></div>
      <div id="shot-gallery-${dayKey}" class="shot-gallery" style="display:none"></div>
    </div>`;
      }

      function renderDay(dateStr) {
        const day = allData[dateStr];
        const dayKey = dateStr.replace(/-/g, '');
        const tbody = document.getElementById(`tbody-${dayKey}`);
        if (!tbody || !day) return;
        (day.trades || []).sort((a, b) =>
          (a.entryTime || a.time || '').localeCompare(b.entryTime || b.time || '')
        );
        tbody.innerHTML = '';
        const monthKey = dateStr.slice(0, 7);
        const trades = (day.trades || []).filter((t) => tradePassesFilters(t, monthKey));
        let totSL = 0,
          totNSL = 0,
          totTgt = 0;
        let totPBSL = 0,
          totPBTgt = 0,
          totPBNSL = 0;
        const seriesSL = [],
          seriesNSL = [],
          seriesTgt = [];

        trades.forEach((t, idx) => {
          const tq = qty(day.instrument, t.lots);
          const pSL =
            t.exitSL !== null && t.entryPrice !== null
              ? Math.round((t.exitSL - t.entryPrice) * tq)
              : null;
          const pTgt = t.tgtPts !== null ? Math.round(t.tgtPts * tq) : null;
          const pNSL =
            t.exitNSL !== null && t.entryPrice !== null
              ? Math.round((t.exitNSL - t.entryPrice) * tq)
              : null;
          if (pSL !== null) {
            totSL += pSL;
            seriesSL.push(pSL);
          }
          if (pTgt !== null) {
            totTgt += pTgt;
            seriesTgt.push(pTgt);
          }
          if (pNSL !== null) {
            totNSL += pNSL;
            seriesNSL.push(pNSL);
          }

          const hasPBEntry = t.pbEntry !== null && t.pbEntry !== undefined;
          let pbSL = null,
            pbTgt = null,
            pbNSL = null,
            pbVals = null,
            pbTgtPtsDisplay = null;
          if (hasPBEntry && t.pbEntry === 0) {
            pbSL = 0;
            pbTgt = 0;
            pbNSL = 0;
            pbTgtPtsDisplay = 0;
          } else {
            const effectivePBEntry = hasPBEntry ? t.pbEntry : t.entryPrice;
            pbVals =
              effectivePBEntry !== null && t.exitNSL !== null
                ? calcPBValues(
                    effectivePBEntry,
                    t.exitNSL,
                    day.instrument,
                    hasPBEntry ? (t.pbTgtPts ?? null) : null,
                    hasPBEntry ? (t.pbExitSL ?? null) : null,
                    hasPBEntry ? (t.pbExitTgt ?? null) : null
                  )
                : null;
            pbSL = pbVals !== null ? Math.round((pbVals.pbExitSL - effectivePBEntry) * tq) : null;
            pbTgt =
              pbVals !== null
                ? Math.round((hasPBEntry ? pbVals.pbTgtPts : (t.tgtPts ?? 0)) * tq)
                : null;
            pbNSL =
              pbVals !== null ? Math.round((pbVals.pbExitNSL - effectivePBEntry) * tq) : null;
            pbTgtPtsDisplay = pbVals ? pbVals.pbTgtPts : null;
          }
          if (pbSL !== null) totPBSL += pbSL;
          if (pbTgt !== null) totPBTgt += pbTgt;
          if (pbNSL !== null) totPBNSL += pbNSL;

          const pb = (v, cls) =>
            v !== null && v !== 0
              ? `<div style="color:#a78bfa;font-size:10px">${cls ? `<span class="${pnlClass(v)}">${fmtRs(v)}</span>` : fmt(v)}</div>`
              : '';

      function applyPBNotesType() {

      function recalcEditRow() {
        const entry = parseFloat(document.getElementById('e-entry')?.value);
        const exitNSL = parseFloat(document.getElementById('e-exitNSL')?.value);
        const lots = parseInt(document.getElementById('e-lots')?.value);
        if (isNaN(entry) || isNaN(exitNSL)) return;
        const tr = document.getElementById('e-entry')?.closest('tr');
        const instr = tr?.dataset?.editInstr || 'NIFTY';
        const slPts = SL_PTS[instr] || 15,
          tgG = TGT_G[instr] || 50,
          tgL = TGT_L[instr] || 31,
          lotSz = LOT_SIZES[instr] || 65;
        const nLots = isNaN(lots) ? 10 : lots;
        const exitSL = parseFloat(
          Math.max(entry - slPts, Math.min(entry + tgG, exitNSL)).toFixed(2)
        );
        const tgtRaw = parseFloat(document.getElementById('e-tgt')?.value);
        const tgtPts = isNaN(tgtRaw)
          ? parseFloat(Math.max(-slPts, Math.min(tgL, exitNSL - entry)).toFixed(2))
          : tgtRaw;
        const exitTgt = parseFloat((entry + tgtPts).toFixed(2));
        const pSL = Math.round((exitSL - entry) * nLots * lotSz);
        const pTgt = Math.round(tgtPts * nLots * lotSz);
        const pNSL = Math.round((exitNSL - entry) * nLots * lotSz);
        const set = (id, v) => {
          const el = document.getElementById(id);
          if (el) el.value = v;
        };
        set('e-exitSL', exitSL);
        set('e-exitTgt', exitTgt);
        const pnl = document.getElementById('e-pnl-cell');
        if (pnl) {
          const c = (v) => (v >= 0 ? 'c-green' : 'c-red');
          let html = `<span class="${c(pSL)}">${fmtRs(pSL)}</span><span style="color:#374151"> | </span><span class="${c(pTgt)}">${fmtRs(pTgt)}</span><span style="color:#374151"> | </span><span class="${c(pNSL)}">${fmtRs(pNSL)}</span>`;
          const pbEntry = parseFloat(document.getElementById('e-pbEntry')?.value);
          if (!isNaN(pbEntry)) {
            if (pbEntry === 0) {
              html += `<div style="color:#a78bfa;font-size:10px;margin-top:3px"><span class="${c(0)}">${fmtRs(0)}</span><span style="color:#374151"> | </span><span class="${c(0)}">${fmtRs(0)}</span><span style="color:#374151"> | </span><span class="${c(0)}">${fmtRs(0)}</span></div>`;
            } else {
              const pbTgtPtsInput = parseFloat(document.getElementById('e-pbTgtPts')?.value);
              const pbExitSLInput = parseFloat(document.getElementById('e-pbExitSL')?.value);
              const pbExitTgtInput = parseFloat(document.getElementById('e-pbExitTgt')?.value);
              const pbVals = calcPBValues(
                pbEntry,
                exitNSL,
                instr,
                pbTgtPtsInput,
                pbExitSLInput,
                pbExitTgtInput
              );
              if (pbVals) {
                const pbPSL = Math.round((pbVals.pbExitSL - pbEntry) * nLots * lotSz);
                const pbPTgt = Math.round(pbVals.pbTgtPts * nLots * lotSz);
                const pbPNSL = Math.round((pbVals.pbExitNSL - pbEntry) * nLots * lotSz);
                html += `<div style="color:#a78bfa;font-size:10px;margin-top:3px"><span class="${c(pbPSL)}">${fmtRs(pbPSL)}</span><span style="color:#374151"> | </span><span class="${c(pbPTgt)}">${fmtRs(pbPTgt)}</span><span style="color:#374151"> | </span><span class="${c(pbPNSL)}">${fmtRs(pbPNSL)}</span></div>`;
              }
            }
          }
          pnl.innerHTML = html;
        }
      }

      async function saveRow(dateStr, id, btn) {
        const day = allData[dateStr];
        const t = (day.trades || []).find((x) => String(x.id) === String(id));

        t.entryTime = document.getElementById('e-time').value.trim();

        t.entrySymbol = document.getElementById('e-sym').value.trim();
        t.lots = parseInt(document.getElementById('e-lots').value) || t.lots;
        t.entryPrice = parseFloat(document.getElementById('e-entry').value) || null;
        t.exitSL = parseFloat(document.getElementById('e-exitSL').value) || null;
        t.exitTgt = parseFloat(document.getElementById('e-exitTgt').value) || null;
        t.exitNSL = parseFloat(document.getElementById('e-exitNSL').value) || null;
        t.tgtPts = parseFloat(document.getElementById('e-tgt').value) || null;
        const cr = parseFloat(document.getElementById('e-candle').value);
        t.candleRange = isNaN(cr) ? null : cr;
        t.notes = document.getElementById('e-notes').value.trim();
        t.pbNotes = document.getElementById('e-pb-notes')?.value.trim() || '';

        t.pbEntry = isNaN(pbEV) ? null : pbEV;
        const pbTgtV = parseFloat(document.getElementById('e-pbTgtPts')?.value);
        t.pbTgtPts = isNaN(pbTgtV) ? null : pbTgtV;
        const pbExitSLV = parseFloat(document.getElementById('e-pbExitSL')?.value);
        t.pbExitSL = isNaN(pbExitSLV) ? null : pbExitSLV;
        const pbExitTgtV = parseFloat(document.getElementById('e-pbExitTgt')?.value);
        t.pbExitTgt = isNaN(pbExitTgtV) ? null : pbExitTgtV;

        renderDay(dateStr);

      async function persistDay(dateStr) {
        try {
          const r = await fetch(SAVE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              date: dateStr,
              trades: allData[dateStr].trades,
              instrument: allData[dateStr].instrument,
              note: allData[dateStr].note || '',
            }),
          });
          const j = await r.json();
          if (j.ok) showToast('Saved');
          else showToast('Save failed: ' + (j.error || 'unknown'), true);
        } catch (e) {
          showToast('Save error: ' + e.message, true);
        }
      }

      function addScreenshotThumb(dateStr, filename, instrument) {
        const dayKey = dateStr.replace(/-/g, '');
        const gallery = document.getElementById(`shot-gallery-${dayKey}`);
        if (!gallery) return;
        gallery.style.display = 'flex';
        const instr = (instrument || 'nifty').toLowerCase();
        const wrap = document.createElement('div');
        wrap.className = 'shot-thumb';
        wrap.title = `Click to open full size — ${filename}`;
        wrap.onclick = () => window.open(`/api/screenshots/${instr}/${dateStr}/${filename}`, '_blank');
        const label = filename.replace(/\.png$/, '');
        wrap.innerHTML = `<img src="/api/screenshots/${instr}/${dateStr}/${filename}" loading="lazy" alt="${label}"><div class="shot-label">${label}</div><button class="shot-open" title="Open folder in Explorer">&#128193;</button><button class="shot-del" title="Delete this snapshot">&times;</button>`;
        wrap.querySelector('.shot-del').onclick = (e) => {
          e.stopPropagation();
          deleteScreenshot(dateStr, filename, instr, wrap);
        };
        wrap.querySelector('.shot-open').onclick = (e) => {
          e.stopPropagation();
          revealScreenshot(dateStr, filename, instr);
        };
        gallery.appendChild(wrap);
      }

      async function revealScreenshot(dateStr, filename, instr) {
        try {
          const r = await fetch(`/api/screenshots/${instr}/${dateStr}/${filename}/reveal`, { method: 'POST' })
            .then(res => res.json());
          if (!r.ok) alert('Could not open folder: ' + (r.error || 'unknown error'));
        } catch (e) {
          alert('Could not open folder: ' + e.message);
        }
      }

      async function deleteScreenshot(dateStr, filename, instr, wrap) {
        if (!confirm(`Delete this snapshot?\n\n${filename}`)) return;
        try {
          const r = await fetch(`/api/screenshots/${instr}/${dateStr}/${filename}`, { method: 'DELETE' })
            .then(res => res.json());
          if (!r.ok) { alert('Delete failed: ' + (r.error || 'unknown error')); return; }
          const gallery = wrap.parentElement;
          wrap.remove();
          if (gallery && gallery.children.length === 0) gallery.style.display = 'none';
        } catch (e) {
          alert('Delete failed: ' + e.message);
        }
      }

      const _capturingDates = new Set();

      async function loadScreenshots(dateStr, instrument) {
        if (_capturingDates.has(dateStr)) return;
        const dayKey = dateStr.replace(/-/g, '');
        const gallery = document.getElementById(`shot-gallery-${dayKey}`);
        if (!gallery) return;
        try {
          const instr = (instrument || 'nifty').toLowerCase();
          const files = await fetch(`/api/report/screenshots/list?date=${dateStr}&instrument=${instr}`).then(r => r.json());
          if (_capturingDates.has(dateStr)) return;
          if (!Array.isArray(files) || !files.length) return;
          gallery.innerHTML = '';
          gallery.style.display = 'flex';
          files.forEach(f => addScreenshotThumb(dateStr, f, instr));
        } catch { /* silent */ }
      }

      function captureScreenshots(dateStr) {
        const dayKey = dateStr.replace(/-/g, '');
        const total = (allData[dateStr]?.trades || []).length;
        let captured = 0;

        const logEl = document.getElementById(`shot-log-${dayKey}`);
        logEl.style.display = 'block';
        logEl.innerHTML = '<span style="color:#60a5fa">Starting…</span>';

        // Block loadScreenshots for this date while capturing
        _capturingDates.add(dateStr);

        // Clear existing thumbnails from gallery
        const gallery = document.getElementById(`shot-gallery-${dayKey}`);
        if (gallery) { gallery.innerHTML = ''; gallery.style.display = 'none'; }

        // Scroll to gallery area first, then show overlay after scroll settles
        if (gallery) gallery.scrollIntoView({ behavior: 'smooth', block: 'start' });

        const statusEl = document.getElementById('snap-status');
        statusEl.textContent = `Capturing Snapshots… 0 / ${total}`;
        setTimeout(() => document.getElementById('snap-overlay').classList.add('active'), 400);

        const addLine = (msg, color) => {
          const line = document.createElement('div');
          line.style.color = color || '#94a3b8';
          line.textContent = msg;
          logEl.appendChild(line);
          logEl.scrollTop = logEl.scrollHeight;
        };

        const finish = () => {
          _capturingDates.delete(dateStr);
          document.getElementById('snap-overlay').classList.remove('active');
          if (gallery && gallery.children.length > 0)
            gallery.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        try {
          const es = new EventSource(`/api/report/screenshots?date=${dateStr}`);
          es.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'log') addLine(d.msg);
            else if (d.type === 'file') {
              captured++;
              statusEl.textContent = `Capturing Snapshots… ${captured} / ${total}`;
              addLine(`✓ ${d.name}`, '#4ade80');
              addScreenshotThumb(dateStr, d.name, d.instrument);
            }
            else if (d.type === 'done') {
              addLine(d.msg, d.ok ? '#4ade80' : '#f87171');
              es.close();
              finish();
            }
          };
          es.onerror = () => { addLine('Connection lost', '#f87171'); es.close(); finish(); };
        } catch (e) {
          addLine('Error: ' + e.message, '#f87171');
          finish();
        }
      }

      function switchMonth(key) {
        activeMonth = key;
        document.querySelectorAll('.month-tab').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.month-panel').forEach((p) => p.classList.remove('active'));
        const keys = Object.keys(groupByMonth());
        const idx = keys.indexOf(key);
        const tabs = document.querySelectorAll('.month-tab');
        const panels = document.querySelectorAll('.month-panel');
        if (tabs[idx]) tabs[idx].classList.add('active');
        if (panels[idx]) panels[idx].classList.add('active');
        renderMonthDays(key);
      }

      function qty(instrument, lots) {
        return (lots || 1) * (LOT_SIZES[instrument] || 65);
      }
      function fmt(v) {
        return v !== null && v !== undefined ? Number(v).toFixed(2) : '—';
      }

      function calcDayPeaks(series) {
        let cum = 0,
          peak = 0,
          minSoFar = 0,
          maxDD = 0,
          maxRU = 0;
        for (const v of series) {
          cum += v;
          if (cum > peak) peak = cum;
          if (cum < minSoFar) minSoFar = cum;
          const dd = peak - cum,
            ru = cum - minSoFar;
          if (dd > maxDD) maxDD = dd;
          if (ru > maxRU) maxRU = ru;
        }
        return { maxDown: maxDD > 0 ? -maxDD : 0, maxUp: maxRU };
      }

      function calcMonthPeaks(series, dates) {
        let cum = 0,
          peak = 0,
          minSoFar = 0,
          maxDD = 0,
          maxRU = 0,
          maxDownDate = null,
          maxUpDate = null;
        for (let i = 0; i < series.length; i++) {
          cum += series[i];
          if (cum > peak) peak = cum;
          if (cum < minSoFar) minSoFar = cum;
          const dd = peak - cum,
            ru = cum - minSoFar;
          if (dd > maxDD) {
            maxDD = dd;
            maxDownDate = dates[i];
          }
          if (ru > maxRU) {
            maxRU = ru;
            maxUpDate = dates[i];
          }
        }
        return { maxDown: maxDD > 0 ? -maxDD : 0, maxDownDate, maxUp: maxRU, maxUpDate };
      }

      function fmtDateShort(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr + 'T00:00:00');
        return `${String(d.getDate()).padStart(2, '0')} ${MONTH_NAMES[d.getMonth()]}`;
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }
      function fmtRs(v) {
        if (v === null || v === undefined) return '—';
        const abs = Math.abs(Math.round(v)).toLocaleString('en-IN');
        return v > 0 ? `+₹${abs}` : v < 0 ? `-₹${abs}` : `₹${abs}`;
      }
      function fmtCapital(v) {
        if (v === null || v === undefined) return '—';
        return `₹${Math.round(v).toLocaleString('en-IN')}`;
      }
      function fmtPts(v) {
        if (v === null || v === undefined) return '—';
        return (v >= 0 ? '+' : '') + Number(v).toFixed(2);
      }
      function pnlClass(v) {
        if (v === null || v === undefined) return 'c-gray';
        return v > 0 ? 'c-green' : v < 0 ? 'c-red' : 'c-gray';
      }

      function pbMaxReachFor(pbNotes, fallback) {
        if (!pbNotes) return fallback;
        const m = String(pbNotes).match(/(\d+(?:\.\d+)?)/);
        if (String(pbNotes).toLowerCase().includes('reach') && m) return parseFloat(m[1]);
        return 0; // SL HIT / PINE SCRIPT SL → target not reached
      }

      function calcPBValues(
        pbEntry,
        pbExit,
        instr,
        pbTgtPtsOverride,
        pbExitSLOverride,
        pbExitTgtOverride
      ) {
        const pb = parseFloat(pbEntry),
          eNSL = parseFloat(pbExit);
        if (isNaN(pb) || isNaN(eNSL)) return null;
        const slPts = SL_PTS[instr] || 15,
          tgG = TGT_G[instr] || 50,
          tgL = TGT_L[instr] || 31;
        const ovrTgt = parseFloat(pbExitTgtOverride);
        const ovrPts = parseFloat(pbTgtPtsOverride);
        const ovrSL = parseFloat(pbExitSLOverride);
        let pbTgtPts, pbExitTgt;
        if (!isNaN(ovrTgt)) {
          pbExitTgt = ovrTgt;
          pbTgtPts = parseFloat(Math.max(-slPts, Math.min(tgL, ovrTgt - pb)).toFixed(2));
        } else if (!isNaN(ovrPts)) {
          pbTgtPts = ovrPts;
          pbExitTgt = parseFloat((pb + pbTgtPts).toFixed(2));
        } else {
          pbTgtPts = parseFloat(Math.max(-slPts, Math.min(tgL, eNSL - pb)).toFixed(2));
          pbExitTgt = parseFloat((pb + pbTgtPts).toFixed(2));
        }
        const pbExitSL = !isNaN(ovrSL)
          ? ovrSL
          : !isNaN(ovrTgt) || !isNaN(ovrPts)
            ? pbExitTgt
            : parseFloat(Math.max(pb - slPts, Math.min(pb + tgG, eNSL)).toFixed(2));
        return { pbExitSL, pbExitTgt, pbExitNSL: eNSL, pbTgtPts };
      }
      function showToast(msg, err = false) {
        const t = document.createElement('div');
        t.style.cssText = `position:fixed;bottom:70px;right:24px;background:${err ? '#7f1d1d' : '#052e16'};color:${err ? '#fca5a5' : '#4ade80'};border:1px solid ${err ? '#991b1b' : '#166534'};border-radius:8px;padding:10px 18px;font-size:12px;font-weight:700;z-index:999;`;
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
      }

      function loadSheetJS() {
        return new Promise((resolve, reject) => {
          if (typeof XLSX !== 'undefined') return resolve();
          const s = document.createElement('script');
          s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
          s.onload = resolve;
          s.onerror = () => reject(new Error('Failed to load SheetJS'));
          document.head.appendChild(s);
        });
      }

      async function downloadExcel(monthKey) {
        try {
          await loadSheetJS();
        } catch (e) {
          showToast('Could not load Excel library', true);
          return;
        }
        const months = groupByMonth();
        const dates = (months[monthKey] || []).sort();
        if (!dates.length) {
          showToast('No trades to export', true);
          return;
        }
        const HEADERS = [
          'Date',
          'Instrument',
          'Entry Time',
          'Lots',
          'Entry',
          'Exit w/SL',
          'Exit w/oSL',
          'Tgt Pts',
          'P&L w/SL (₹)',
          'P&L w/oSL (₹)',
          'P&L Tgt (₹)',
        ];
        const rows = [HEADERS];
        let totSL = 0,
          totNSL = 0,
          totTgt = 0,
          totalCount = 0,
          winSL = 0,
          winNSL = 0,
          winTgt = 0;
        for (const date of dates) {
          const day = allData[date];
          if (!day) continue;
          for (const t of day.trades || []) {
            const tq = qty(day.instrument, t.lots);
            const pSL =
              t.exitSL !== null && t.entryPrice !== null
                ? Math.round((t.exitSL - t.entryPrice) * tq)
                : '';
            const pNSL =
              t.exitNSL !== null && t.entryPrice !== null
                ? Math.round((t.exitNSL - t.entryPrice) * tq)
                : '';
            const pTgt = t.tgtPts !== null ? Math.round(t.tgtPts * tq) : '';
            rows.push([
              date,
              day.instrument || '',
              (t.entryTime || t.time || '').slice(0, 5),
              t.lots,
              t.entryPrice ?? '',
              t.exitSL ?? '',
              t.exitNSL ?? '',
              t.tgtPts ?? '',
              pSL,
              pNSL,
              pTgt,
            ]);
            if (pSL !== '') {
              totSL += pSL;
              if (pSL > 0) winSL++;
            }
            if (pNSL !== '') {
              totNSL += pNSL;
              if (pNSL > 0) winNSL++;
            }
            if (pTgt !== '') {
              totTgt += pTgt;
              if (pTgt > 0) winTgt++;
            }
            totalCount++;
          }
        }
        rows.push([]);
        rows.push(['TOTAL', '', '', '', '', '', '', '', totSL, totNSL, totTgt]);
        const wrFmt = (w) =>
          totalCount ? `${Math.round((w / totalCount) * 100)}% (${w}/${totalCount})` : '—';
        rows.push([
          'WIN RATE',
          '',
          '',
          '',
          '',
          '',
          '',
          '',
          wrFmt(winSL),
          wrFmt(winNSL),
          wrFmt(winTgt),
        ]);
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [
          { wch: 12 },
          { wch: 10 },
          { wch: 10 },
          { wch: 6 },
          { wch: 8 },
          { wch: 10 },
          { wch: 11 },
          { wch: 8 },
          { wch: 14 },
          { wch: 14 },
          { wch: 12 },
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, monthLabel(monthKey));
        const fileName = `1Min_Trades_${monthKey}.xlsx`;
        XLSX.writeFile(wb, fileName);
        showToast(`Downloaded ${fileName}`);
      }

      function tradeInAnyRange(entryTime, ranges) {
        if (!ranges || ranges.length === 0) return true;
        const t = (entryTime || '').slice(0, 5);
        if (!t) return true;
        return ranges.some(({ from, to }) => {
          if (!from && !to) return true;
          if (from && t < from) return false;
          if (to && t > to) return false;
          return true;
        });
      }

      function getEffectiveMaxReach(t) {
        if (t.maxReach !== undefined && t.maxReach !== null) return t.maxReach;
        const m = (t.notes || '').match(/reach\s+(?:up\s*to\s+)?(\d+(?:\.\d+)?)/i);
        return m ? parseFloat(m[1]) : 0;
      }

      function tradePassesFilters(t, monthKey) {
        const ranges = monthTimeFilters[monthKey] || [];
        if (!tradeInAnyRange(t.entryTime || t.time, ranges)) return false;
        const nf = monthNoteFilters[monthKey] || {};
        const anyNoteChecked = nf.slHit || nf.pineSL;
        if (anyNoteChecked) {
          const n = (t.notes || '').toUpperCase();
          const pass =
            (nf.slHit && n.includes('SL HIT') && !n.includes('PINE SCRIPT')) ||
            (nf.pineSL && n.includes('PINE SCRIPT'));
          if (!pass) return false;
        }
        const minReach = monthReachFilter[monthKey];
        if (minReach !== null && minReach !== undefined && minReach > 0) {
          if (getEffectiveMaxReach(t) < minReach) return false;
        }
        const minCandle = monthCandleFilter[monthKey];
        if (minCandle !== null && minCandle !== undefined && minCandle > 0) {
          if ((t.candleRange ?? 0) < minCandle) return false;
        }
        return true;
      }

      function addTimeRange(monthKey) {
        if (!monthTimeFilters[monthKey]) monthTimeFilters[monthKey] = [];
        monthTimeFilters[monthKey].push({ from: '', to: '' });
        renderTimeRanges(monthKey);
      }
      function removeTimeRange(monthKey, idx) {
        if (!monthTimeFilters[monthKey]) return;
        monthTimeFilters[monthKey].splice(idx, 1);
        renderTimeRanges(monthKey);
      }
      function updateTimeRange(monthKey, idx, field, value) {
        if (!monthTimeFilters[monthKey]) monthTimeFilters[monthKey] = [];
        if (!monthTimeFilters[monthKey][idx])
          monthTimeFilters[monthKey][idx] = { from: '', to: '' };
        monthTimeFilters[monthKey][idx][field] = value;
        renderTimeRangeActiveState(monthKey, idx);
      }
      function applyTimeRanges(monthKey) {
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }
      function renderTimeRangeActiveState(monthKey, idx) {
        const rangesEl = document.getElementById(`tf-ranges-${monthKey}`);
        if (!rangesEl) return;
        const rows = rangesEl.querySelectorAll('.time-range-row');
        if (!rows[idx]) return;
        const r = (monthTimeFilters[monthKey] || [])[idx] || {};
        rows[idx].classList.toggle('active', !!(r.from || r.to));
      }
      function clearAllRanges(monthKey) {
        monthTimeFilters[monthKey] = [];
        renderTimeRanges(monthKey);
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }

      function renderTimeRanges(monthKey) {
        const el = document.getElementById(`tf-ranges-${monthKey}`);
        if (!el) return;
        const ranges = monthTimeFilters[monthKey] || [];
        const clearBtn = document.getElementById(`tf-clear-${monthKey}`);
        el.innerHTML = ranges
          .map(
            ({ from, to }, i) =>
              `<div class="time-range-row${from || to ? ' active' : ''}"><input class="time-input" type="time" value="${from || ''}" onchange="updateTimeRange('${monthKey}', ${i}, 'from', this.value)" title="From time"><span class="time-sep">–</span><input class="time-input" type="time" value="${to || ''}" onchange="updateTimeRange('${monthKey}', ${i}, 'to', this.value)" title="To time"><button class="time-del-btn" onclick="removeTimeRange('${monthKey}', ${i})" title="Remove range">✕</button></div>`
          )
          .join('');
        const applyBtn = document.getElementById(`tf-apply-${monthKey}`);
        if (applyBtn) applyBtn.style.display = ranges.length > 0 ? '' : 'none';
        if (clearBtn) clearBtn.style.display = ranges.length > 0 ? '' : 'none';
      }

      function notesClass(notes) {
        if (!notes) return '';
        const n = notes.toUpperCase();
        if (n.includes('PINE SCRIPT')) return 'pine-sl';
        if (n.includes('SL HIT')) return 'sl-hit';
        return '';
      }

      function applyNotesFilter(monthKey) {
        if (!monthNoteFilters[monthKey]) monthNoteFilters[monthKey] = {};
        const cbSL = document.getElementById(`nc-cb-${monthKey}-sl`),
          cbPine = document.getElementById(`nc-cb-${monthKey}-pine`);
        const rfInput = document.getElementById(`rf-${monthKey}`),
          cfInput = document.getElementById(`cf-${monthKey}`);
        monthNoteFilters[monthKey].slHit = cbSL?.checked || false;
        monthNoteFilters[monthKey].pineSL = cbPine?.checked || false;
        const v = parseFloat(rfInput?.value);
        monthReachFilter[monthKey] = isNaN(v) ? null : v;
        const cv = parseFloat(cfInput?.value);
        monthCandleFilter[monthKey] = isNaN(cv) ? null : cv;
        document
          .getElementById(`nc-${monthKey}-sl`)
          ?.classList.toggle('active', monthNoteFilters[monthKey].slHit);
        document
          .getElementById(`nc-${monthKey}-pine`)
          ?.classList.toggle('active', monthNoteFilters[monthKey].pineSL);
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }

      function clearNotesFilter(monthKey) {
        monthNoteFilters[monthKey] = { slHit: false, pineSL: false };
        monthReachFilter[monthKey] = null;
        monthCandleFilter[monthKey] = null;
        const cbSL = document.getElementById(`nc-cb-${monthKey}-sl`),
          cbPine = document.getElementById(`nc-cb-${monthKey}-pine`);
        const rfInput = document.getElementById(`rf-${monthKey}`),
          cfInput = document.getElementById(`cf-${monthKey}`);
        if (cbSL) cbSL.checked = false;
        if (cbPine) cbPine.checked = false;
        if (rfInput) rfInput.value = '';
        if (cfInput) cfInput.value = '';
        document.getElementById(`nc-${monthKey}-sl`)?.classList.remove('active');
        document.getElementById(`nc-${monthKey}-pine`)?.classList.remove('active');
        renderMonthDays(monthKey);
        renderSummary(monthKey);
      }

      function applyDateFilter(monthKey, dateStr) {
        monthDateFilter[monthKey] = dateStr || null;
        applyFilter(monthKey, monthFilters[monthKey] || 'ALL');
      }

      function applyFilter(monthKey, filter) {
        monthFilters[monthKey] = filter;
        ['ALL', 'NIFTY', 'SENSEX'].forEach((f) => {
          const btn = document.getElementById(`fb-${monthKey}-${f}`);
          if (!btn) return;
          btn.classList.toggle('active', f === filter);
        });
        const selectedDate = monthDateFilter[monthKey] || null;
        const panel = document.getElementById(`panel-${monthKey}`);
        if (panel) {
          panel.querySelectorAll('.day-block').forEach((block) => {
            const instr = block.dataset.instrument || '',
              date = block.dataset.date || '';
            const instrOk = filter === 'ALL' || instr === filter,
              dateOk = !selectedDate || date === selectedDate;
            block.style.display = instrOk && dateOk ? '' : 'none';
          });
        }
        renderSummary(monthKey);
      }

      loadData().then(() => {
        if (activeMonth) renderMonthDays(activeMonth);
      });
    </script>

    <div id="snap-overlay">
      <div class="snap-spinner">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <div id="snap-status">Capturing Snapshots…</div>
    </div>
  </body>
</html>
