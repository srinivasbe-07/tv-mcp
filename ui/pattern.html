<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Monitor</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #0f1117;
        color: #d1d5db;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ── */
      header {
        background: #1a1d27;
        border-bottom: 1px solid #2a2d3a;
        padding: 0 16px;
        height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .logo { font-size: 14px; font-weight: 700; color: #fff; }
      .logo span { color: #34d399; }
      .nav-link {
        font-size: 11px; color: #6b7280; text-decoration: none;
        padding: 4px 8px; border-radius: 5px; border: 1px solid #2a2d3a;
      }
      .nav-link:hover { color: #d1d5db; border-color: #4b5563; }
      .divider { width: 1px; height: 24px; background: #2a2d3a; }
      .spacer { flex: 1; }

      .proc-group { display: flex; align-items: center; gap: 8px; }
      .proc-label { font-size: 11px; color: #6b7280; font-weight: 600; }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .dot-running  { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
      .dot-starting { background: #facc15; animation: pulse 1s infinite; }
      .dot-stopped  { background: #4b5563; }
      @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

      .proc-status { font-size: 12px; font-weight: 600; min-width: 56px; }
      .text-green  { color: #4ade80; }
      .text-yellow { color: #facc15; }
      .text-gray   { color: #6b7280; }

      .hdr-btn {
        padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 700;
        border: none; cursor: pointer; transition: opacity 0.15s;
      }
      .hdr-btn:hover { opacity: 0.8; }
      .hdr-btn:disabled { opacity: 0.3; cursor: not-allowed; }
      .btn-green { background: #14532d; color: #4ade80; }
      .btn-red   { background: #7f1d1d; color: #fca5a5; }
      .btn-blue  { background: #1e3a5f; color: #93c5fd; }

      .monitor-chip {
        padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
      }
      .chip-running { background: #052e16; color: #4ade80; border: 1px solid #166534; }
      .chip-stopped { background: #1c1917; color: #6b7280; border: 1px solid #2a2d3a; }
      .chip-up      { background: #052e16; color: #4ade80; border: 1px solid #166534; }
      .chip-down    { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }

      /* Confirm */
      .confirm-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        z-index: 999; align-items: center; justify-content: center;
      }
      .confirm-overlay.open { display: flex; }
      .confirm-box {
        background: #1a1d27; border: 1px solid #374151; border-radius: 12px;
        padding: 24px 28px; min-width: 260px; text-align: center;
      }
      .confirm-box p { color: #e5e7eb; font-size: 14px; margin: 0 0 20px; }
      .confirm-btns { display: flex; gap: 10px; justify-content: center; }
      .confirm-btns button { padding: 7px 20px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
      .confirm-yes { background: #b91c1c; color: #fff; }
      .confirm-no  { background: #374151; color: #d1d5db; }

      /* ── Layout ── */
      .main { display: grid; grid-template-columns: 260px 1fr; flex: 1; overflow: hidden; }

      /* ── Left ── */
      .left {
        background: #13151f; border-right: 1px solid #2a2d3a;
        overflow-y: auto; padding: 14px;
        display: flex; flex-direction: column; gap: 12px;
      }
      .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 12px; }
      .sec { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #6b7280; text-transform: uppercase; margin-bottom: 8px; }

      /* Bias */
      .bias-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .bias-btn {
        padding: 10px 4px; border-radius: 8px; border: 1px solid #2a2d3a;
        cursor: pointer; font-size: 13px; font-weight: 700;
        background: #0f1117; color: #4b5563; transition: all 0.15s; text-align: center;
      }
      .bias-btn:hover { border-color: #4b5563; color: #9ca3af; }
      .bias-up-active   { background: #052e16; border-color: #166534; color: #4ade80; }
      .bias-down-active { background: #450a0a; border-color: #991b1b; color: #f87171; }
      .bias-msg { text-align: center; font-size: 11px; color: #4ade80; margin-top: 6px; min-height: 16px; }

      /* Important Levels */
      .level-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
      .level-row {
        display: flex; align-items: center; justify-content: space-between;
        background: #0f1117; border: 1px solid #2a2d3a; border-radius: 6px; padding: 5px 8px;
      }
      .level-price { font-size: 13px; font-weight: 700; color: #c4b5fd; font-variant-numeric: tabular-nums; }
      .level-del { background: none; border: none; color: #4b5563; cursor: pointer; font-size: 15px; padding: 0 2px; }
      .level-del:hover { color: #f87171; }
      .level-empty { font-size: 11px; color: #374151; text-align: center; padding: 6px 0; }
      .add-row { display: flex; gap: 6px; }
      .level-input {
        flex: 1; background: #0f1117; border: 1px solid #2a2d3a; border-radius: 6px;
        padding: 6px 8px; color: #d1d5db; font-size: 12px; outline: none;
      }
      .level-input:focus { border-color: #6b7280; }
      .level-input::placeholder { color: #374151; }
      .add-btn { padding: 6px 12px; background: #1e3a5f; color: #93c5fd; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
      .add-btn:hover { background: #1e40af; }
      .apply-btn {
        width: 100%; padding: 9px; background: #1d4ed8; color: #fff;
        border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
        cursor: pointer; margin-top: 8px;
      }
      .apply-btn:hover { background: #2563eb; }
      .apply-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .saved-msg { text-align: center; font-size: 11px; color: #4ade80; margin-top: 6px; min-height: 16px; }
      .err-msg { color: #f87171; }

      /* ── Right ── */
      .right { display: grid; grid-template-rows: auto 1fr; overflow: hidden; }

      /* Stats */
      .stats {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 10px; padding: 14px; border-bottom: 1px solid #2a2d3a; background: #13151f;
      }
      .stat { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 10px 12px; }
      .stat-lbl { font-size: 10px; color: #6b7280; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
      .stat-val { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
      .stat-sub { font-size: 10px; color: #6b7280; margin-top: 2px; }

      .c-green  { color: #4ade80; }
      .c-red    { color: #f87171; }
      .c-yellow { color: #facc15; }
      .c-white  { color: #f9fafb; }
      .c-purple { color: #c4b5fd; }
      .c-orange { color: #fb923c; }
      .c-gray   { color: #6b7280; }

      /* Panels (feed + log) */
      .panels { display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }

      /* Candle feed */
      .feed { border-right: 1px solid #2a2d3a; overflow-y: auto; padding: 12px; }
      .feed-hdr { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #6b7280; text-transform: uppercase; margin-bottom: 8px; }
      .feed-row {
        display: flex; align-items: center; gap: 8px;
        padding: 5px 8px; border-radius: 5px; font-size: 11px;
        font-variant-numeric: tabular-nums; border-bottom: 1px solid #13151f;
      }
      .feed-row:hover { background: #1a1d27; }
      .feed-time { color: #4b5563; width: 44px; flex-shrink: 0; }
      .feed-ohlc { flex: 1; color: #9ca3af; font-size: 10px; }
      .feed-tag {
        padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap;
      }
      .t-watch  { background: #1f2937; color: #6b7280; }
      .t-break  { background: #422006; color: #fdba74; }
      .t-flip   { background: #450a0a; color: #f87171; }

      /* Log */
      .log-wrap { display: flex; flex-direction: column; overflow: hidden; }
      .log { overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 1px; flex: 1; }
      .log-row {
        display: flex; gap: 8px; font-size: 11px; padding: 3px 0;
        border-bottom: 1px solid #13151f;
        font-family: 'Consolas', 'Courier New', monospace;
      }
      .log-t   { color: #374151; flex-shrink: 0; min-width: 52px; }
      .l-ok    { color: #4ade80; }
      .l-fail  { color: #f87171; }
      .l-flip  { color: #fb923c; font-weight: 700; }
      .l-break { color: #facc15; }
      .l-info  { color: #6b7280; }
      .l-ui    { color: #3b82f6; }
      .l-err   { color: #f87171; }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }
    </style>
  </head>
  <body>

    <div class="confirm-overlay" id="confirm-overlay">
      <div class="confirm-box">
        <p id="confirm-msg">Are you sure?</p>
        <div class="confirm-btns">
          <button class="confirm-yes" id="confirm-yes">Yes</button>
          <button class="confirm-no" onclick="closeConfirm()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- HEADER -->
    <header>
      <div class="logo">Pattern<span>Monitor</span></div>
      <a class="nav-link" href="/">← Dashboard</a>
      <a class="nav-link" href="/supertrend">Supertrend →</a>
      <div class="divider"></div>

      <div class="proc-group">
        <div class="proc-label">TRADINGVIEW</div>
        <div class="status-dot dot-stopped" id="tv-dot"></div>
        <div class="proc-status text-gray" id="tv-status">Stopped</div>
        <button class="hdr-btn btn-green" id="btn-tv-toggle" onclick="tvStart()">▶ Start TV</button>
      </div>

      <div class="divider"></div>

      <div class="proc-group">
        <div class="proc-label">PATTERN</div>
        <div class="status-dot dot-stopped" id="pm-dot"></div>
        <div class="proc-status text-gray" id="pm-status">Stopped</div>
        <button class="hdr-btn btn-green" id="btn-pm-toggle" onclick="pmStart()" disabled>▶ Start</button>
        <button class="hdr-btn btn-blue" id="btn-pm-restart" onclick="confirm2('Restart Pattern Monitor?', pmRestart)" disabled style="display:none">↺ Restart</button>
      </div>

      <div class="divider"></div>
      <div class="spacer"></div>

      <div class="monitor-chip chip-stopped" id="bias-chip">BIAS: —</div>
    </header>

    <!-- MAIN -->
    <div class="main">

      <!-- LEFT -->
      <div class="left">

        <div class="card">
          <div class="sec">Bias</div>
          <div class="bias-group">
            <button class="bias-btn" id="bias-up"   onclick="setBias('up')">▲ BUY / CALL</button>
            <button class="bias-btn" id="bias-down" onclick="setBias('down')">▼ SELL / PUT</button>
          </div>
          <div class="bias-msg" id="bias-msg"></div>
        </div>

        <div class="card">
          <div class="sec">Important Levels</div>
          <div class="level-list" id="level-list">
            <div class="level-empty">No levels added</div>
          </div>
          <div class="add-row">
            <input class="level-input" id="level-input" type="number" placeholder="e.g. 24450" />
            <button class="add-btn" onclick="addLevel()">+ Add</button>
          </div>
          <button class="apply-btn" id="apply-btn" onclick="applyLevels()">APPLY LEVELS</button>
          <div class="saved-msg" id="levels-msg"></div>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="right">

        <!-- Stats -->
        <div class="stats">
          <div class="stat">
            <div class="stat-lbl">Bias</div>
            <div class="stat-val c-gray" id="s-bias">—</div>
            <div class="stat-sub" id="s-bias-sub">not set</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Resistance</div>
            <div class="stat-val c-red" id="s-resist">—</div>
            <div class="stat-sub" id="s-resist-sub">nearest day H</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Support</div>
            <div class="stat-val c-green" id="s-support">—</div>
            <div class="stat-sub" id="s-support-sub">nearest day L</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Last Event</div>
            <div class="stat-val c-yellow" id="s-event">—</div>
            <div class="stat-sub" id="s-event-sub">—</div>
          </div>
        </div>

        <!-- Candle Feed + Log -->
        <div class="panels">

          <div class="feed">
            <div class="feed-hdr">▤ 15-Min Candle Feed</div>
            <div id="candle-feed"></div>
          </div>

          <div class="log-wrap">
            <div class="feed-hdr">≡ Monitor Log</div>
            <div class="log" id="log-panel"></div>
          </div>

        </div>
      </div>
    </div>

    <script>
      let currentBias     = null;
      let pendingBias     = null;
      let importantLevels = [];

      // ── Load config ────────────────────────────────────────────────────────
      async function loadConfig() {
        try {
          const cfg = await fetch('/api/pm/config').then(r => r.json());
          currentBias = cfg.bias || null;
          pendingBias = currentBias;
          importantLevels = cfg.importantLevels || [];
          renderBias();
          renderLevels();
        } catch (_) {}
      }

      // ── Bias ───────────────────────────────────────────────────────────────
      function renderBias() {
        document.getElementById('bias-up').className   = 'bias-btn' + (pendingBias === 'up'   ? ' bias-up-active'   : '');
        document.getElementById('bias-down').className = 'bias-btn' + (pendingBias === 'down' ? ' bias-down-active' : '');

        const chip = document.getElementById('bias-chip');
        if (currentBias === 'up')        { chip.textContent = '▲ BUY / CALL'; chip.className = 'monitor-chip chip-up'; }
        else if (currentBias === 'down') { chip.textContent = '▼ SELL / PUT'; chip.className = 'monitor-chip chip-down'; }
        else                             { chip.textContent = 'BIAS: —';       chip.className = 'monitor-chip chip-stopped'; }

        const el = document.getElementById('s-bias');
        el.textContent  = currentBias ? currentBias.toUpperCase() : '—';
        el.className    = 'stat-val ' + (currentBias === 'up' ? 'c-green' : currentBias === 'down' ? 'c-red' : 'c-gray');
        document.getElementById('s-bias-sub').textContent = currentBias ? '15-min trend' : 'not set';
      }

      async function setBias(b) {
        pendingBias = b;
        renderBias();
        try {
          const res  = await fetch('/api/pm/bias', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ bias: b }) });
          const data = await res.json();
          const msg  = document.getElementById('bias-msg');
          if (data.ok) {
            currentBias = b; renderBias();
            msg.textContent = '✓ Applied — TV updated';
            setTimeout(() => (msg.textContent = ''), 2500);
          } else {
            msg.className = 'bias-msg err-msg'; msg.textContent = '✗ ' + (data.error || 'Failed');
            setTimeout(() => { msg.textContent = ''; msg.className = 'bias-msg'; }, 3000);
          }
        } catch (_) {
          const msg = document.getElementById('bias-msg');
          msg.className = 'bias-msg err-msg'; msg.textContent = '✗ Server error';
          setTimeout(() => { msg.textContent = ''; msg.className = 'bias-msg'; }, 3000);
        }
      }

      // ── Levels ─────────────────────────────────────────────────────────────
      function renderLevels() {
        const list = document.getElementById('level-list');
        if (!importantLevels.length) { list.innerHTML = '<div class="level-empty">No levels added</div>'; return; }
        list.innerHTML = [...importantLevels].sort((a,b) => b-a).map(p =>
          `<div class="level-row"><span class="level-price">${p.toLocaleString()}</span><button class="level-del" onclick="removeLevel(${p})">×</button></div>`
        ).join('');
      }

      function addLevel() {
        const inp = document.getElementById('level-input');
        const val = parseFloat(inp.value);
        if (!val || val <= 0) return;
        if (!importantLevels.includes(val)) { importantLevels.push(val); renderLevels(); }
        inp.value = ''; inp.focus();
      }

      function removeLevel(p) { importantLevels = importantLevels.filter(l => l !== p); renderLevels(); }

      document.getElementById('level-input').addEventListener('keydown', e => { if (e.key === 'Enter') addLevel(); });

      async function applyLevels() {
        const btn = document.getElementById('apply-btn');
        btn.disabled = true;
        try {
          const res  = await fetch('/api/pm/levels', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ importantLevels }) });
          const data = await res.json();
          const msg  = document.getElementById('levels-msg');
          if (data.ok) { msg.textContent = '✓ Applied — TV updated'; setTimeout(() => (msg.textContent = ''), 2500); }
          else { msg.className = 'saved-msg err-msg'; msg.textContent = '✗ ' + (data.error || 'Failed'); setTimeout(() => { msg.textContent = ''; msg.className = 'saved-msg'; }, 3000); }
        } catch (_) {}
        finally { btn.disabled = false; }
      }

      // ── Candle feed ────────────────────────────────────────────────────────
      const candleFeed = document.getElementById('candle-feed');

      function addCandle(time, ohlc, tag) {
        const tagClass = tag === 'BREAK' ? 't-break' : tag === 'FLIP' ? 't-flip' : 't-watch';
        const row = document.createElement('div');
        row.className = 'feed-row';
        row.innerHTML = `<span class="feed-time">${time}</span><span class="feed-ohlc">${ohlc}</span><span class="feed-tag ${tagClass}">${tag}</span>`;
        candleFeed.prepend(row);
        while (candleFeed.children.length > 100) candleFeed.removeChild(candleFeed.lastChild);
      }

      // ── Log ────────────────────────────────────────────────────────────────
      const logPanel = document.getElementById('log-panel');

      function logClass(line) {
        if (line.includes('[FLIP]'))  return 'l-flip';
        if (line.includes('[BREAK]')) return 'l-break';
        if (line.includes('[OK]'))    return 'l-ok';
        if (line.includes('[ERROR]') || line.includes('[CRASH]')) return 'l-err';
        if (line.includes('[UI]'))    return 'l-ui';
        return 'l-info';
      }

      function extractTime(line) { const m = line.match(/\[(\d{2}:\d{2}:\d{2})\]/); return m ? m[1] : ''; }
      function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

      function appendLog(line) {
        const t    = extractTime(line);
        const text = t ? line.replace(`[${t}]`, '').trim() : line;
        const row  = document.createElement('div');
        row.className = 'log-row';
        row.innerHTML = `<span class="log-t">${t}</span><span class="${logClass(line)}">${escHtml(text)}</span>`;
        logPanel.appendChild(row);
        while (logPanel.children.length > 200) logPanel.removeChild(logPanel.firstChild);
        logPanel.scrollTop = logPanel.scrollHeight;
        parseStats(line);
      }

      function parseStats(line) {
        const flipM = line.match(/\[FLIP\].*→\s*(UP|DOWN)/i);
        if (flipM) { currentBias = flipM[1].toLowerCase(); pendingBias = currentBias; renderBias(); document.getElementById('s-event').textContent = 'FLIP ↔'; document.getElementById('s-event-sub').textContent = extractTime(line); }

        const breakM = line.match(/\[BREAK\].*?(\d[\d,]+)/);
        if (breakM) { document.getElementById('s-event').textContent = 'BREAK'; document.getElementById('s-event-sub').textContent = breakM[1] + ' @ ' + extractTime(line); }

        const rlM = line.match(/R=([\d.]+).*S=([\d.]+)/);
        if (rlM) { document.getElementById('s-resist').textContent = parseFloat(rlM[1]).toLocaleString(); document.getElementById('s-support').textContent = parseFloat(rlM[2]).toLocaleString(); }

        // Candle feed entries
        const candleM = line.match(/O:([\d.]+)\s+H:([\d.]+)\s+L:([\d.]+)\s+C:([\d.]+)/);
        if (candleM) {
          const t    = extractTime(line);
          const ohlc = `O:${candleM[1]} H:${candleM[2]} L:${candleM[3]} C:${candleM[4]}`;
          const tag  = line.includes('[FLIP]') ? 'FLIP' : line.includes('[BREAK]') ? 'BREAK' : 'WATCH';
          addCandle(t, ohlc, tag);
        }
      }

      // ── Process control ────────────────────────────────────────────────────
      function confirm2(msg, action) {
        document.getElementById('confirm-msg').textContent = msg;
        document.getElementById('confirm-yes').onclick = () => { closeConfirm(); action(); };
        document.getElementById('confirm-overlay').classList.add('open');
      }
      function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
      document.getElementById('confirm-overlay').addEventListener('click', e => { if (e.target.id === 'confirm-overlay') closeConfirm(); });

      async function tvStart()  { document.getElementById('btn-tv-toggle').disabled = true; await fetch('/api/tv/start',  { method: 'POST' }); }
      async function tvStop()   { await fetch('/api/tv/stop',    { method: 'POST' }); }
      async function pmStart()  { document.getElementById('btn-pm-toggle').disabled = true; await fetch('/api/pm/start',  { method: 'POST' }); }
      async function pmStop()   { await fetch('/api/pm/stop',    { method: 'POST' }); }
      async function pmRestart(){ await fetch('/api/pm/restart', { method: 'POST' }); }

      function applyStatus(s) {
        const tvRunning = s.tv === 'running';
        const tvDot = document.getElementById('tv-dot'), tvStat = document.getElementById('tv-status'), btnTvT = document.getElementById('btn-tv-toggle');
        if (s.tv === 'running')       { tvDot.className = 'status-dot dot-running';  tvStat.className = 'proc-status text-green';  tvStat.textContent = 'Running'; btnTvT.textContent = '■ Stop TV'; btnTvT.className = 'hdr-btn btn-red'; btnTvT.onclick = () => confirm2('Stop TradingView?', tvStop); btnTvT.disabled = false; }
        else if (s.tv === 'starting') { tvDot.className = 'status-dot dot-starting'; tvStat.className = 'proc-status text-yellow'; tvStat.textContent = 'Starting'; btnTvT.disabled = true; }
        else                          { tvDot.className = 'status-dot dot-stopped';  tvStat.className = 'proc-status text-gray';   tvStat.textContent = 'Stopped'; btnTvT.textContent = '▶ Start TV'; btnTvT.className = 'hdr-btn btn-green'; btnTvT.onclick = tvStart; btnTvT.disabled = false; }

        const pmDot = document.getElementById('pm-dot'), pmStat = document.getElementById('pm-status'), btnPmT = document.getElementById('btn-pm-toggle'), btnPmR = document.getElementById('btn-pm-restart');
        if (s.pm === 'running') { pmDot.className = 'status-dot dot-running'; pmStat.className = 'proc-status text-green'; pmStat.textContent = 'Running'; btnPmT.textContent = '■ Stop'; btnPmT.className = 'hdr-btn btn-red'; btnPmT.onclick = () => confirm2('Stop Pattern Monitor?', pmStop); btnPmT.disabled = false; btnPmR.style.display = ''; btnPmR.disabled = false; }
        else                   { pmDot.className = 'status-dot dot-stopped';  pmStat.className = 'proc-status text-gray';  pmStat.textContent = 'Stopped'; btnPmT.textContent = '▶ Start'; btnPmT.className = 'hdr-btn btn-green'; btnPmT.onclick = pmStart; btnPmT.disabled = !tvRunning; btnPmR.style.display = 'none'; }
      }

      // ── SSE ────────────────────────────────────────────────────────────────
      const es = new EventSource('/api/pm/events');
      es.addEventListener('log',    e => appendLog(JSON.parse(e.data).line));
      es.addEventListener('status', e => applyStatus(JSON.parse(e.data)));
      es.addEventListener('config', e => { const c = JSON.parse(e.data); currentBias = c.bias||null; pendingBias = currentBias; importantLevels = c.importantLevels||[]; renderBias(); renderLevels(); });
      es.onerror = () => {};

      // ── Dummy data for preview ─────────────────────────────────────────────
      function loadDummyData() {
        currentBias = 'up'; pendingBias = 'up';
        importantLevels = [24580, 24450, 24380];
        renderBias();
        renderLevels();

        document.getElementById('s-resist').textContent = '24,580';
        document.getElementById('s-resist-sub').textContent = 'D-2 H';
        document.getElementById('s-support').textContent = '24,320';
        document.getElementById('s-support-sub').textContent = 'D-1 L';
        document.getElementById('s-event').textContent = 'BREAK';
        document.getElementById('s-event').className = 'stat-val c-yellow';
        document.getElementById('s-event-sub').textContent = '24450 @ 10:45';

        const dummyCandles = [
          { time: '11:00', ohlc: 'O:24462 H:24491 L:24448 C:24478', tag: 'WATCH' },
          { time: '10:45', ohlc: 'O:24435 H:24468 L:24430 C:24462', tag: 'BREAK' },
          { time: '10:30', ohlc: 'O:24410 H:24442 L:24405 C:24438', tag: 'WATCH' },
          { time: '10:15', ohlc: 'O:24388 H:24425 L:24382 C:24412', tag: 'WATCH' },
          { time: '10:00', ohlc: 'O:24370 H:24395 L:24362 C:24390', tag: 'WATCH' },
          { time: '09:45', ohlc: 'O:24340 H:24378 L:24335 C:24370', tag: 'WATCH' },
          { time: '09:30', ohlc: 'O:24298 H:24352 L:24291 C:24342', tag: 'WATCH' },
          { time: '09:15', ohlc: 'O:24261 H:24305 L:24258 C:24298', tag: 'FLIP'  },
        ];
        dummyCandles.forEach(c => addCandle(c.time, c.ohlc, c.tag));

        const dummyLog = [
          '[11:00:02] NIFTY | bias:UP | O:24462 H:24491 L:24448 C:24478',
          '[11:00:02] Price between levels — no action',
          '[10:45:02] NIFTY | bias:UP | O:24435 H:24468 L:24430 C:24462',
          '[10:45:02] [BREAK] Level 24450 broken — close 24462 above resistance',
          '[10:45:03] Drew next level: D-3 H 24580  R=24580  S=24320',
          '[10:30:02] NIFTY | bias:UP | O:24410 H:24442 L:24405 C:24438',
          '[10:30:02] Price between levels — no action',
          '[10:00:02] NIFTY | bias:UP | O:24370 H:24395 L:24362 C:24390',
          '[10:00:02] Price between levels — no action',
          '[09:15:04] Fetched Day H/L: D-1 to D-10',
          '[09:15:04] Day levels: R=24450  S=24320',
          '[09:15:04] Drew 2 level lines on chart',
          '[09:15:04] Important levels drawn: 24580, 24450, 24380',
          '[09:15:03] CDP connected',
          '[09:15:02] === Pattern Monitor started ===',
        ];
        dummyLog.reverse().forEach(appendLog);
      }

      async function init() {
        try {
          const [cfg, status] = await Promise.all([
            fetch('/api/pm/config').then(r => r.json()),
            fetch('/api/status').then(r => r.json()),
          ]);
          currentBias = cfg.bias || null;
          pendingBias = currentBias;
          importantLevels = cfg.importantLevels || [];
          renderBias();
          renderLevels();
          applyStatus(status);
        } catch (_) {
          loadDummyData();
          applyStatus({ tv: 'stopped', pm: 'stopped' });
        }
      }

      init();
    </script>
  </body>
</html>
